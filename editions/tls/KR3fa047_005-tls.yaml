body:
  text: 卷三之首界説十則第一界凡圜之徑線等或從心至圜界線等為等圜三卷將論圜之情故先為圜界説此解圜之等者如上圖甲乙乙丙两徑等或丁己戊庚從心至圜界等即甲己乙乙庚丙两圜等若下圖甲乙乙丙两徑不等或丁己戊庚從心至圜界不等則两圜亦不等矣第二界凡直線切圜界過之而不與界交為切線甲乙線切乙己丁圜之界乙又引長之至丙而不與界交其甲丙線全在圜外為切線若戊己線先切圜界而引之至庚入圜内則交線也第三界凡两圜相切而不相交為切圜甲乙两圜不相交而相切于丙或切于外如第一圖或切于内如第三圖其第二第四圖則交圜也第四界凡圜内直線從心下垂線其垂線大小之度即直線距心逺近之度凡一點至一直線上惟垂線至近其他即逺垂線一而已逺者無數也故欲知點與線相去逺近必用垂線為度試如前圖甲點與乙丙線相去逺近必以甲丁垂線為度為甲丁一線獨去直線至近他若甲戊甲己諸線愈大愈逺乃至無數故如後圖説甲乙丙丁圜内之甲乙丙丁两線其去戊心逺近等為己戊庚戊两垂線等故若辛壬線去戊心近矣為戊癸垂線小故第五界凡直線割圜之形為圜分甲乙丙丁圜之乙丁直線任割圜之一分如甲乙丁及乙丙丁两形皆為圜分凡分有三形其過心者為半圜分函心者為圜大分不函心者為圜小分又割圜之直線為弦所割圜界之一分為弧第六界凡圜界偕直線内角為圜分角以下三界論圜角三種本界所言雜圜也其在半圜分内為半圜角在大分内為大分角在小分内為小分角第七界凡圜界任于一點出两直線作一角為負圜分角甲乙丙圜分甲丙為底于乙點出两直線作甲乙丙角形其甲乙丙角為負甲乙丙圜分角第八界若两直線之角乘圜之一分為乘圜分角甲乙丙丁圜内于甲點出甲乙甲丁两線其乙甲丁角為乘乙丙丁圜分角圜角三種之外又有一種為切邊角或直線切圜或两圜相切其两圜相切者又或内或外如上圖甲乙線切丙丁戊圜于丙即甲丙丁乙丙戊两角為切邊角又丙丁戊己戊庚两圜外相切于戊及己戊庚己辛壬两圜内相切于己即丙戊己戊己辛壬己庚三角俱為切邊角第九界凡從圜心以两直線作角偕圜界作三角形為分圜形甲乙丙丁圜從戊心出戊甲戊丙两線偕甲丁丙圜界作角形為分圜形第十界凡圜内两負圜分角相等即所負之圜分相似甲乙丙丁圜内有甲乙己與丁丙戊两負圜分角等則所負甲乙丁己與丁丙甲戊两圜分相似又有两圜或等或不等其負圜分角等即圜分俱相似如上三圖三圜之甲乙丙丁戊己庚辛壬三負圜分角等即所負甲乙丙丁戊己庚辛壬三圜分相似相似者如云同為幾分圜之幾也卷三第一題有圜求尋其心法曰甲乙丙丁圜求尋其心先于圜之两界任作一甲丙直線次两平分之于戊一卷十次于戊上作乙丁垂線两平分之于己即己為圜心一卷八論曰如云不然令言心何在彼不得言在己之上下何者乙丁線既平分于己離平分不能為心故必言心在乙丁線外為庚即令自庚至丙至戊至甲各作直線則甲庚戊角形之甲戊既與丙庚戊角形之丙戊两邊等戊庚同邊而庚甲庚丙两線俱從心至界宜亦等即對等邊之庚戊甲庚戊丙两角宜亦等而為两直角矣一卷界説十夫乙戊甲既直角而庚戊甲又為直角可不可也系因此推顯圜内有直線分他線為两平分而作直角即圜心在其内第二題圜界任取二點以直線相聯則直線全在圜内解曰甲乙丙圜界上任取甲丙二點作直線相聨題言甲丙線全在圜内本篇一論曰如云在外若甲丁丙線令尋取甲乙丙圜之戊心次作戊甲戊丙两直線次于甲丁丙線上作一卷五戊乙丁線而與圜界遇于乙即戊甲丁丙當為三角形以甲丁丙為底戊甲戊丙两腰等其戊甲丙戊丙甲两角宜等而戊丁甲為戊丙丁之外角宜大一卷十六于戊丙丁角即亦宜大于戊甲丁角則對戊丁一卷十九甲大角之戊甲線宜大于戊丁線矣夫戊甲與戊乙本同圜之半徑等據如所論則戊乙亦大于戊丁不可通也若云不在圜外而在圜界依前論令戊甲大于戊乙亦不可通也第三題直線過圜心分他直線為两平分其分處必為两直角為两直角必两平分解曰乙丙丁圜有丙戊線過甲心分乙丁線為两平分于己題言甲己必是垂線而己旁為两直角又言己旁既為两直角則甲己分乙丁必两平分一卷八先論曰試從甲作甲乙甲丁两線即甲乙己角形之乙己與甲丁己角形之丁己两邊等甲己同邊甲乙甲丁两線俱從心至界又等即两形等則其對等邊之甲己乙甲己丁亦等而為两直角矣一卷五後論曰如前作甲乙甲丁两線甲乙丁角形之甲乙甲丁两邊既等則甲乙丁甲丁乙两角亦等又一卷廿六甲乙己角形之甲己乙甲乙己两角與甲丁己角形之甲己丁甲丁己两角各等而對直角之甲乙甲丁两邊又等則己乙己丁两邊亦等一卷四七欲顯次論之㫖又有一説如甲丁上直角方形與甲己己丁上两直角方形并等而甲乙上直角方形與甲己乙己上两直角方形并亦等即甲己己乙上两直角方形并與甲己己丁上两直角方形并亦等此二率者每減一甲己上直角方形則所存乙己己丁上两直角方形自相等而两邊亦等第四題圜内不過心两直線相交不得俱為两平分解曰甲丙乙丁圜内有甲乙丙丁两直線俱不過己心若一過心一不過心即两線不得俱為两平分其理易顯而交于戊題言两直線或有一線為两平分不得俱為两平分本篇一論曰若云不然而甲乙丙丁能俱两平分于戊試令尋本圜心于己從己至戊作甲乙之垂線其己本篇三戊既分甲乙為两平分即為两直角而又能分丙丁為两平分亦宜為两直角是己戊甲為直角而己戊丙亦直角全與其分等矣第五題两圜相交必不同心解曰甲乙丁戊乙丁两圜交于乙于丁題言两圜不同心論曰若言丙為同心令自丙至乙至甲各作直線其丙乙至圜交而丙甲截两圜之界于戊于甲夫丙既為戊乙丁圜之心則丙乙與丙戊等而又為甲乙丁圜之心則丙乙與丙甲又等是丙戊與丙甲亦等而全與其分等也第六題两圜内相切必不同心解曰甲乙丙乙两圜内相切于乙題言两圜不同心論曰若言丁為同心令自丁至乙至丙各作直線其丁乙至切界而丁丙截两圜之界于甲于丙夫丁既為甲乙圜之心則丁乙與丁甲等而又為丙乙圜之心則丁乙與丁丙又等是丁甲與丁丙亦等而全與其分等也第七題圜徑離心任取一點從點至圜界任出幾線其過心線最大不過心線最小餘線愈近心者愈大愈近不過心線者愈小而諸線中止两線等解曰甲丙丁戊乙圜其徑甲乙其心己離心任取一點為庚從庚至圜界任出幾線為庚丙庚丁庚戊題先言從庚所出諸線惟過心庚甲最大次言不過心庚乙最小三言庚丙大于庚丁庚丁大于庚戊愈近心愈大愈近庚乙愈小後言庚乙两旁止可出两線等一卷二十先論曰試從已心出三線至丙至丁至戊其丙己庚角形之丙己己庚两邊并大于丙庚一邊而丙己己庚等于甲己己庚則庚甲大于庚丙依顯庚丁庚戊俱小于庚甲是庚甲最大一卷二十次論曰己庚戊角形之己戊一邊小于己庚庚戊两邊并而己戊與己乙等則己乙小于己庚庚戊并矣次各減同用之己庚則庚乙小于庚戊依顯庚戊小于庚丁庚丁小于庚丙是庚乙最小全大于分三論曰丙己庚角形之丙己與丁己庚角形之丁己两邊等己庚同邊而丙己庚角大于丁己庚角一卷廿四則對大角之庚丙邊大于對小角之庚丁邊依顯庚丁大于庚戊而愈近心愈大愈近庚乙愈小一卷四後論曰試依戊己乙作乙己辛相等角而抵圜界為己辛線次從庚作庚辛線其戊己庚角形之戊己腰與庚己辛角形之辛巳腰既等己庚同腰两腰間角又等則對等角之庚戊庚辛两底亦等而庚乙两旁之庚戊庚辛等矣此外若有從庚出線在辛之上即依第三論大于庚辛在辛之下即小于庚辛故云庚乙两旁止可出庚戊庚辛两線等第八題圜外任取一㸃從㸃任出幾線其至規内則過圜心線最大餘線愈離心愈小其至規外則過圜心線為徑之餘者最小餘線愈近徑餘愈小而諸線中止两線等解曰乙丙丁戊圜之外從甲㸃任出幾線其一為過癸心之甲壬其餘為甲辛為甲庚為甲己皆至規内規内線者如車輻之指牙題先言過心之甲規外壬最大次言近心之甲辛大于離心之甲庚甲庚又大于甲己三反上言規外之甲乙為乙壬徑餘者線者如車輻之湊轂最小四言甲丙近徑餘小于甲丁甲丁又小于甲戊後言甲乙两旁止可出两線等一卷二十先論曰試從癸心至丙丁戊己庚辛各出直線其甲癸辛角形之甲癸癸辛两邊并大于甲辛一邊而甲癸癸辛與甲壬等則甲壬大于甲辛依顯甲壬更大于甲庚甲己而過心之甲壬最大全大于分次論曰甲癸辛角形之癸辛與甲癸庚角形之癸庚两邊等甲癸同邊而甲癸辛角大于甲癸庚角一卷廿四則對大角之甲辛邊大于對小角之甲庚邊依顯甲庚大于甲己而規内線愈離心愈小一卷二十三論曰甲癸丙角形之甲癸一邊小于甲丙丙癸两邊并次每減一相等之乙癸丙癸則甲乙小于甲丙矣依顯甲乙更小于甲丁甲戊而規外甲乙最小一卷廿一四論曰甲丁癸角形之内從甲與癸出甲丙丙癸两邊并小于甲丁丁癸两邊并此二率者每減一相等之丙癸丁癸則甲丙小于甲丁矣依顯甲丙更小于甲戊而愈近徑餘甲乙者愈小一卷四後論曰試依乙癸丙作乙癸子相等角抵圜界次作甲子線其甲子癸角形之甲癸癸子两腰與甲癸丙角形之甲癸癸丙两腰各等而两腰間角又等則對等角之甲子甲丙两底亦等也此外若有從甲出線在子之上即依第四論小于甲丙在子之下即大于甲丙故云甲乙两旁止可出甲丙甲子两線等第九題圜内從一㸃至界作三線以上皆等即此㸃必圜心解曰從甲㸃至乙丙丁圜界作甲乙甲丙甲丁三直線若等題言甲㸃為圜心三以上等者更不待論論曰試于乙丙丙丁界作乙丙丙丁两直線相聨此两線各两平分于戊于己從甲出两直線為甲戊為甲己其甲乙戊角形一卷八之甲乙與甲戊丙角形之甲丙两腰既等甲戊同腰乙戊戊丙两底又等即甲戊乙與甲戊丙两角亦等為两直角依顯甲己丙甲己丁亦等為两直角則甲戊甲己之分乙丙丙丁俱平分為直角而此两線俱為函心線本篇一之系定相遇于甲甲為圜心矣又論曰若言甲非心心在于戊者令戊甲相聨引作己庚徑線即甲是戊心外所取一㸃而從甲所出線愈近心者宜愈大矣本篇七則甲丁宜大于甲丙而先設等何也第十題两圜相交止于两㸃論曰若言甲乙丙丁戊己圜與甲庚乙丁辛戊圜三相交于甲于乙于丁令作甲乙乙丁两直線相聯此两線各两平分于壬于癸次從壬癸作子壬子癸两垂線其子壬分甲乙子癸分乙丁既皆两平分而各為两直角即子壬子癸两線俱為甲庚乙丁辛戊圜之函心線本篇一之系而子為其心矣依顯甲乙丙丁戊己圜亦以子為心也夫两交之圜尚不得同心本篇五何縁得有三交又論曰若言两圜三相交于甲于乙于丁令先尋甲庚乙丁辛戊圜之心于壬本篇一次從心至三交界作壬甲壬乙壬丁三線此三線等也一卷界説十五又甲乙丙丁戊己圜内有從壬出之壬甲壬乙壬丁三相等線本篇九則壬又為甲乙丙丁戊己圜之心不亦交圜同本篇五心乎第十一題两圜内相切作直線聯两心引出之必至切界解曰甲乙丙甲丁戊两圜内相切于甲而己為甲乙丙之心庚為甲丁戊之心題言作直線聨庚己两心引抵圜界必至甲一卷二十論曰如云不至甲而截两圜界于乙丁及丙戊令從甲作甲己甲庚两線其甲己庚角形之庚己己甲两邊并大于庚甲一邊而同圜心所出之庚甲庚一卷二十丁宜等即庚己己甲大于庚丁矣此二率者各減同用之庚己即己甲亦大于己丁矣夫己甲與己乙是内圜同心所出等線則己乙亦大于己丁而分大于全也可乎若曰庚為甲乙丙心己為甲丁戊心亦依前轉説之甲己庚角形之己庚庚甲两邊并大于甲己一邊而同圜心所出之己甲己戊宜等即己庚庚甲大于己戊矣此二率者各減同用之己庚即庚甲大于庚戊矣夫庚甲與庚丙是内圜同心所出等線則庚丙亦大于庚戊而分大子全也可乎第十二題两圜外相切以直線聯两心必過切界解曰甲乙丙丁乙戊两圜外相切于乙其甲乙丙心為己丁乙戊心為庚題言作己庚直線必過乙論曰如云不然而己庚線截两圜界于戊于丙令于切界作乙己乙庚两線其乙己庚角形之己乙乙庚两邊并大于己庚一邊而乙一卷二十庚與庚戊乙己與己丙俱同心所出線宜各等即庚戊丙己两線并亦大于庚己一線矣夫庚己線分為庚戊丙己尚餘丙戊而云庚戊丙己大于庚己則分大于全也故直線聨己庚必過乙第十三題二支圜相切不論内外止以一㸃先論曰甲乙丙丁與甲戊丙己两圜内相切若云有两㸃相切于甲又于丙令作直線函两圜心庚辛引出之如前圖宜至相切之甲之丙本篇十一則甲丙為两圜之同徑矣而此徑線者两平分于庚又两平分于辛何也一直線止以一㸃两平分若云庚辛引出直線一卷一抵甲一截两圜之界于癸于壬即如後圖令從两心各作直線至又相切之丙次問之甲乙丙丁圜之心為庚邪辛邪如曰庚也而辛為甲戊内己之心則丙庚辛角形之庚辛辛丙两邊并大于庚丙一邊二十而庚辛辛丙與庚癸宜等辛癸辛丙同圜心所出故即庚癸亦一卷二十大于庚丙矣夫庚丙與庚壬者外圜同心所出等線也將庚癸亦大于庚壬可乎如曰辛也而庚為甲戊丙己之心則丙庚辛角形之辛庚庚丙两邊并大于辛丙一邊而辛丙與辛甲宜等即辛庚庚丙亦大于辛甲矣此二率者各減同用之辛庚即庚丙亦大于庚甲也夫庚甲與庚丙者亦同圜心所出等線也而安有大小後論曰甲乙與乙丙两圜外相切于已從甲乙之丁心丙乙之戊心作直線相聨必過已本篇十三若云又相切于乙令自乙至丁至戊各一卷二十作直線其丁乙乙戊并宜與丁戊等而為角形之两腰又宜大于丁戊則两圜相切安得两㸃又後論曰更令于两相切之乙之己作直線相聨其直線當在甲乙圜内本篇二又當在乙丙圜内何所置之第十四題二支圜内两直線等即距心之逺近等距心之逺近等即两直線等先解曰甲乙丙丁圜其心戊圜内甲乙丁丙两線等題言两線距戊心逺近亦等論曰試從戊心向甲乙作戊己向丁丙作戊庚各垂線次自丁自甲至戊各作直線其戊己戊庚既各分甲乙丁丙線為两平本篇三分而甲乙丁丙等則平分之甲己丁庚亦等夫一卷四七甲戊上直角方形與甲己己戊上两直角方形并等等甲戊之丁戊上直角方形與丁庚庚戊上两直角方形并等而甲己丁庚上两直角方形既等即戊己戊庚上两直角方形亦等則戊己戊庚两線亦等是甲乙丁丙两線距心之度等本卷界説四後解曰甲乙丁丙两線距戊心逺近等題言甲乙丁丙两線亦等論曰依前論從戊作戊己戊庚两垂線既等本卷界説四而分甲乙丁丙各為两平分本篇三其甲戊上直角方形與甲己己戊上两一卷四七直角方形并等等甲戊之丁戊上直角方形與丁庚庚戊上两直角方形并等即甲己己戊上两直角方形并與丁庚庚戊上两直角方形并亦等此二率者每減一相等之己戊戊庚上直角方形即所存甲己丁庚上两直角方形亦等是甲己丁庚两線等也夫甲乙倍甲己丁丙倍丁庚其半等其全必等第十五題徑為圜内之大線其餘線者近心大于逺心解曰甲乙丙丁戊己圜其心庚其徑甲己其近心線為辛壬逺心線為丙丁題言甲乙最大辛壬近心大于丙丁逺心論曰試從庚向丙丁作庚癸向辛壬作庚子各垂線其丙丁距心逺于辛壬即庚癸大于庚子本卷界説四次于庚癸線截庚丑與庚子等次從丑作乙戊為庚癸之垂線末于庚乙庚丙庚丁庚戊各作直線相聯其庚丑既等于庚子即乙戊與辛壬各以垂線距心逺近等本卷界説四而两線亦等本篇十四一卷二十夫庚乙庚戊并大于乙戊而與甲己等即甲己大于乙戊亦大于辛壬矣依顯甲己大于他線則甲己最大又乙庚戊角形之乙庚庚戊两腰與丙庚丁角形之丙庚庚丁两一卷廿四腰等而乙庚戊角大于丙庚丁角則乙戊底大于丙丁底故等乙戊之辛壬亦大于丙丁也是近心線大于逺心線也第十六題三支圜徑末之直角線全在圜外而直線偕圜界所作切邊角不得更作一直線入其内其半圜分角大于各直線鋭角切邊角小于各直線鋭角先解曰甲乙丙圜丁為心甲丙為徑從甲作甲丙之垂線題言此線全在圜外論曰若言在内如甲乙令自丁至乙作一卷五直線即丁甲乙與丁乙甲两角等丁甲既為直一卷十七角丁乙又為直角乎夫角形三角并等两直角豈得形内自有两直角也則垂線必在圜外若己戊必不在圜内若甲乙又不在圜界之上如云在界亦依此論故曰全在圜外次解曰題又言戊甲垂線偕乙甲圜界所作切邊角不得更作一直線入其内論曰若云可作如庚甲令從丁心向庚甲作丁辛為庚甲之垂線一卷十二夫丁甲辛角形之丁甲辛丁辛甲两角并小于一卷十七两直角而丁辛甲為直角即對小角之丁辛線一卷十九小于對大角之甲丁線矣甲丁者與丁壬為同圜相等者也將丁壬亦大于丁辛乎則戊甲乙角之内不得更作一直線而戊甲之下但有直線必入本圜之内也後解曰題又言丁甲垂線偕乙甲圜界所作丙甲乙圜分角大于各直線鋭角而戊甲垂線偕乙甲圜界所作切邊角小于各直線鋭角論曰依前論甲戊下有直線既云必入圜内即此直線偕戊甲所作各直線鋭角皆小于圜分角而切邊角小于各直線鋭角系己甲線必切圜以一㸃増先解曰甲乙丙圜其心丁其徑甲丙從甲作戊甲為甲丙之垂線題言戊甲全在圜外増正論曰試于甲戊線内任取一㸃為庚自庚至丁作直線其甲丁庚角形之丁甲庚丁庚甲两角一卷十七小于两直角而丁甲庚為直角即丁庚甲小于直角對大角之丁庚線大于對小角之丁甲線一卷十九矣則庚㸃在圜之外也凡戊甲以内作㸃皆依此論故戊甲線全在圜外増次解曰從甲作甲辛線在戊甲之下題言甲辛必割圜為分増正論曰試作甲丁壬角與戊甲辛角等其甲丁壬辛甲丁两角并等于戊甲丁直角必小于两直分論十一角而丁壬甲辛两線必相遇其相遇又必在圜之内如壬何者壬甲丁壬丁甲两角既與一直一卷卅二角等即甲壬丁必為直角而對大角之甲丁一卷十九線必大于對小角之丁壬線矣夫甲丁線僅至圜界則丁壬不能抵圜界必在圜之内也後支前已正論或難曰切邊角有大有小何以畢不得两分向者聞幾何之分不可窮盡如莊子尺棰之義深著明矣今切邊之内有角非幾何乎此幾何何獨不可分邪又十卷第一題言設一小幾何又設一大幾何若從大者半減之減之又減必至一處小于所設小率此題最明無可疑者今言切邊之角小于直線鋭角是亦小幾何也彼直線鋭角是亦大幾何也若從直線鋭角半減之減之又減何以終竟不得小于切邊角邪既本題推顯切邊角中不得容一直線如此著明便當并無切邊角無角則無幾何此則不可得分耳且幾何原本書中無有至大不可加之率無有至小不可減之率若切邊角不可分豈非至小不可減乎答曰謬矣子之言也有圜有線安得無切邊角且既言直線鋭角大于切邊角即有切邊角矣苟無角安所較大小哉且子言直線與圜界并無切邊角則两圜外相切亦無角乎曰然曰試如作甲己乙圜其心丙而丁戊為切線即丁甲己為切邊角次移心于庚又作甲辛癸圜即丁甲辛為切邊角而小于丁甲己次移心于子又作甲丑寅圜即丁甲丑為切邊角而又小于丁甲辛如是小之又小疑無角焉次又于切線之外以辰為心作甲己午圜而與前圜外相切于甲依子所説疑無角焉然两圜外相切而以丁戊線分之不可分乎更自辰至寅作直線截两圜之界而分丁戊為两平分不可分乎两圜两直線交羅相遇于甲也能不皆以一㸃乎如以一㸃也即此一㸃之外不能無空即不能不為四切邊角矣子所據尺棰之分無盡又言幾何原本書中無至小不可減之率也是也夫切邊角但不可以直線分之耳若用圜線則可分矣如甲乙庚圜與丙甲丁直線相切于甲作丁甲庚切邊大角若移一心作甲戊辛圜又得丁甲辛切邊角即小于丁甲庚也又移一心作甲己壬圜又得丁甲壬切邊小角即又小于丁甲辛也如此以至無窮則切邊角分之無盡何謂不可減邪若十卷第一題所言元無可疑但以圜角分圜角則與其説合矣彼所言大小两幾何者謂夫能相較為大能相較為小者也如以直線分直線角以圜線分圜線角是已此切邊角與直線角豈能相較為大小哉増題有两種幾何一大一小以小率半増之遞増至于無窮以大率半減之遞減至于無窮其元大者恒大元小者恒小解曰戊甲乙切邊角為小率壬庚辛直線鋭角為大率今别作甲丙甲丁等圜俱切戊己線于甲其切邊角愈増愈大如前論别以庚癸庚子線作角分壬庚辛角于庚愈分愈小然直線角恒大切邊角恒小乃至終古不得相比又増題舊有一説以一小率加一大率之上或以一大率加一小率之上不相離逐線漸移之必至一相等之處又一説有率大于此率者有率小于此率者則必有率等于此率者昔人以為皆公論也若用以律本題即不可得故今斥不為公論解曰甲乙丙圜其徑甲丙令甲丙之甲界定在于甲而引丙線逐線漸移之向已其所經丁戊己及中間逐線所經無數然依本題論則甲丙所經凡割圜時皆為鋭角即小于半圜分角纔離鋭角便為直角即大于半圜分角是所經無數線終無有相等線可見前一舊説未為公論又直線鋭角皆小于半圜分角直角與鈍角皆大于半圜分角是有大者有小者終無等者可見後一舊説未為公論也第十七題設一㸃一圜求從㸃作切線法曰甲㸃求作直線切乙丙圜其圜心丁先從甲作甲丁直線截乙丙圜于乙次以丁為心甲為界作甲戊圜次從乙作甲丁之垂線而遇甲戊圜于戊次作戊丁直線而截乙丙圜于丙末作甲丙直線即切乙丙圜于丙論曰乙戊丁角形之戊丁丁乙两腰與甲丙丁角形之甲丁丁丙两腰各等一卷界説十五丁角同即甲丙乙戊两底亦等一卷四而戊乙丁為直角即甲丙丁亦直角則甲丙偕乙丙圜之半徑丁丙為一直角矣豈非圜之切線本篇十六之系第十八題直線切圜從圜心作直線至切界必為切線之垂線解曰甲乙直線切丙丁圜于丙從戊心至切界作戊丙線題言戊丙為甲乙之垂線論曰如云不然令從戊别作垂線如至已一卷十七而截丙丁圜于丁其丙戊己角形之戊己丙既為直角即宜大于己丙戊角而對大角之戊丙邊宜一卷十九大于對小角之戊己邊矣夫戊丙與戊丁等也戊丙大于戊已則戊丁亦大于戊己乎本篇十六又論曰若云丙非直角即其两旁角一鋭一鈍令乙丙戊為鋭角則鋭角乃大于半圜分角乎第十九題直線切圜圜内作切線之垂線則圜心必在垂線之内解曰甲乙線切丙丁戊圜于丙圜内作戊丙為甲乙之垂線題言圜心在戊丙線内論曰如云不然心在于已令從已作己丙直線即己丙亦為甲乙之垂線本篇十八而已丙甲與戊丙甲等為直角是全與其分等矣第二十題負圜角與分圜角所負所分之圜分同則分圜角必倍大于負圜角解曰甲乙丙圜其心丁有乙丁丙分圜角乙甲丙負圜角同以乙丙圜分為底題言乙丁丙角倍大于乙甲丙角先論分圜角在乙甲甲丙之内者曰如上圖試從甲過丁心作甲戊線其甲丁乙角形之丁甲丁乙等即丁甲乙丁乙甲两角一卷五等而乙丁戊外角與内相對两角并等一卷卅二即乙丁戊倍大于乙甲丁矣依顯丙丁戊亦倍大于丙甲丁則乙丁丙全角亦倍大于乙甲丙全角次論分圜角不在乙甲甲丙之内而甲乙線過丁心者曰如上圖依前論推顯乙丁丙外角等于内相對之丁甲丙丁丙甲两一卷卅二角并而丁甲丁丙两腰等即甲丙两角亦等一卷五則乙丁丙角倍大于乙甲丙角後論分圜角在負圜角線之外而甲乙截丁丙者曰如上圖試從甲過丁心作甲戊線其戊丁丙分圜角與戊甲丙負圜角同以戊乙两圜分為底如前次論戊丁丙角倍大于戊甲丙角依顯戊丁乙分圜角亦倍大于戊甲乙負圜角次于戊丁丙角減戊丁乙角戊甲丙角減戊甲乙角則所存乙丁丙角必倍大于乙甲丙角増若乙丁丁丙不作角于心或為半圜或小于半圜則丁心外餘地亦倍大于同底之負圜角論曰試從甲過丁心作甲戊線即丁心外餘地分為乙丁戊戊丁丙两角依前論推顯此两角倍大于乙甲丁丁甲丙两角第二十一題凡同圜分内所作負圜角俱等解曰甲乙丙丁圜其心戊于丁甲乙丙圜分内任作丁甲丙丁乙丙两角題言此两角等本篇十二先論函心大分所作曰試從戊作戊丁戊丙線其丁戊丙分圜角既倍大于丁甲丙角丁乙丙角即甲乙两角自相等公論七後論半圜分不函心小分所作曰丁甲乙丙或為半圜分或為不函心小分俱從甲從乙過戊作甲己乙庚两線若不函心更從戊作戊丁戊丙两線其丁戊己分圜角既倍大于丁甲己負圜角本篇二十依顯丙戊己分圜角亦倍大于丙甲己負圜角而丁戊庚庚戊己两角與丁戊己一角等則丁戊庚庚戊己己戊丙三角必倍大于丁甲丙依顯此三角亦倍大于丁乙丙則丁甲丙丁乙丙两角自相等又後論曰二十題増言分圜不作角其心外餘地倍大于同底各負圜角即各角自相等又後論曰甲丙乙丁線交羅相遇為已試作甲乙線相聯其甲丁己角形之三角并與乙丙己角形之三角并等一卷卅二次每減一交角相等之甲己丁乙己丙一卷十五即己甲丁己丁甲两角并與己丙乙己乙丙两角并等矣而甲丁乙乙丙甲两角同在甲丁丙乙函心大分内又等本題第一論則丁甲丙與丙乙丁亦等又後論曰丁丙之外任取一界為已作丁己丙己两線令俱函心而丁甲乙丙己與丙乙甲丁己俱為大分次于甲己乙己各作直線相聨其丁甲已與丁乙己两角同負于甲乙丙己圜界即等本題第一論依顯丙乙己與丙甲已两角同負丙乙甲丁己圜界又等此二相等率并之則丁甲丙丁乙丙两全角亦等第二十二題圜内切界四邊形每相對两角并與两直角等解曰甲乙丙丁圜其心戊圜内有甲乙丙丁四邊形題言甲乙丙丙丁甲两角并乙丙丁丁甲乙两角并各與两直角等論曰試作甲丙乙丁两對角線其甲乙丁甲丙丁两角同負甲乙丙丁圜分即等本篇廿一依顯丙甲丁丙乙丁两角亦等則甲乙丁丙乙丁两角并為甲乙丙一角與甲丙一卷卅二丁丙甲丁两角并等次每加一丙丁甲角即甲乙丙丙丁甲并與甲丙丁丙甲丁丙丁甲三角并等此三角并元與两直角等則甲乙丙丙丁甲相對两角并與两直角等依顯乙丙丁丁甲乙并亦與两直角等第二十三題一直線上作两圜分不得相似而不相等論曰如云不然令于甲乙線上作同方两圜分相似而不相等必作甲丙乙又作甲丁乙其两圜相交止于甲乙两㸃本篇十即一圜分全在内一圜分全在外矣次令作甲丁線截甲丙乙圜于丙末令作丙乙丁乙两線相聨夫两圜分相似者其負圜角宜等本卷界説十則乙丙甲外角與一卷十六相對之乙丁甲内角等乎第二十四題相等两直線上作相似两圜分必等解曰甲乙丙丁两線上作甲丙乙丙己丁相似两圜分題言两圜分等論曰甲乙丙丁两線既等試以甲乙線加丙丁線上两線必相合即甲丙乙丙己丁两圜分相加亦相合如云不然必两圜分相加或在内或在外或半在内半在外矣若在内在外即一直線上有两圜分相似而不相等也本篇廿三若半在内半在外即两圜三相交也本篇十两俱不可故相似者必等第二十五題有圜之分求成圜法曰甲乙丙圜分求成圜先于分之两端作甲丙線次作乙丁為甲丙之垂線次作甲乙線相聯其丁乙甲角或大于丁甲乙角或等或小若大即甲乙丙當為圜之小分何也乙丁分甲丙為两平分即知圜之心必在乙丁線内本篇一之系而本篇七心在丁㸃之外則從丁㸃所出丁乙為不過心徑線至小故對小邊之丁甲乙角小于對大邊之丁一卷十八乙甲角也即作乙甲戊角與丁乙甲角等次從乙丁引出一線與甲戊線遇于戊即戊為圜心一卷四論曰試從戊作戊丙線其甲丁戊角形之甲丁線與丙丁戊角形之丙丁線等丁戊同線而甲丁戊丙丁戊两皆直角即對直角之甲戊與戊丙两線等一卷六夫甲戊與乙戊以對角等故既等戊丙與甲戊本篇九又等則從戊至界三線皆等而戊為心次法兼論曰若丁乙甲丁甲乙两角等即甲乙丙為半圜而甲丙為徑丁為心何也丁乙丁甲两邊等然後丁乙甲丁甲乙两角等一卷五今丁乙甲丁甲乙两角既等即丁乙丁甲两線必一卷六等丁丙元與丁甲等則從丁所出三線等而丁為圜心本篇九後法曰若丁乙甲小于丁甲乙即甲乙丙當為圜大分何也乙丁分甲丙為两平分即知圜心在乙丁線内本篇一之系而丁㸃在心之外則本篇七所出丁乙為過心徑線至大故對大邊之丁甲一卷十八乙大于對小邊之丁乙甲也即作乙甲戊角與丁乙甲角等而甲戊線與乙丁線遇于戊即戊為圜心一卷四論曰試從戊作戊丙線其甲丁戊角形之甲丁線與丙丁戊角形之丙丁線等丁戊同線而甲丁戊丙丁戊两皆直角即對直角之甲戊戊丙两線亦等一卷五夫乙戊與甲戊以對角等故既等戊丙與甲戊本篇九亦等則從戊至界三線皆等而戊為心増求圜分之心有一簡法于甲乙丙圜分任取三㸃于甲于乙于丙以两直線聯之各两平分于丁于戊從丁從戊作甲乙乙丙之各垂線為己丁為己戊而相遇于己即已為圜心論曰己丁己戊既各以两直角平分甲乙乙丙两線即圜之心當在两垂線内本篇一而相遇于已即已為圜心其用法圜界上任取四㸃為甲為乙為丙為丁每两㸃各自為心相向各任作圜分四圜分两两相交于戊于己于庚于辛從戊己從庚辛各作直線引長之交于壬即壬為圜心論曰試作甲戊戊乙乙己己甲四直線此四線各為同圜等圜之半徑各等即甲戊己角形之甲戊己甲己戊两角等而乙戊己角形之乙戊己乙己戊两角亦等次作甲乙直線分戊己于癸即甲己癸角形之甲己邊與乙己癸角形之乙己邊等己癸同邊而對甲己癸角之甲癸邊與對乙己癸角之乙癸邊亦等一卷八則甲癸己乙癸己俱為直角而戊己線必過心本篇一依顯庚辛線亦過心而相遇于壬為圜心第二十六題二支等圜之乘圜分角或在心或在界等其所乘之圜分亦等先解在心者曰甲乙丙丁戊己两圜等其心為庚為辛有甲庚丙與丁辛己两乘圜角等題言所乘之甲丙丁己两圜分亦等論曰試于甲乙丙丁戊己两圜分之上任取两㸃于乙于戊從乙作乙甲乙丙從戊作戊丁戊己各两線次作甲丙丁己两線相聯其乙與戊两角既各半于庚辛两角即乙與戊自相等本篇二十而所負甲乙丙與丁戊己两圜分相似本卷界説十又甲庚丙角形之甲庚庚丙两邊與丁辛己角形之丁一卷四辛辛己两邊各等庚角與辛角又等即甲丙與丁己两邊亦等而相似之甲乙丙與丁戊己两圜分本篇卄四在等線上亦等夫相等圜減相等圜分則所存甲丙丁己两圜分亦等故云等角所乘之圜分等後解在界者曰两圜之乙與戊两乘圜角等題言所乘之甲丙丁己两圜分亦等本篇二十論曰乙戊两角既等而庚辛两角各倍于乙戊即庚辛自相等依前論甲丙丁己两邊亦自相等而本篇廿四甲乙丙與丁戊己两圜分亦等今于相等圜減相等圜分則所存甲丙丁己两圜分亦等注曰後解極易明蓋庚辛角既各倍于乙戊則依先論甲丙丁己自相等在心之乘圜角即分圜角隨類異名第二十七題二支等圜之角所乘圜分等則其角或在心或在界俱等先解在心者曰甲乙丙丁戊己两圜等其心為庚為辛若甲庚丙乘圜角所乘之甲丙分與丁辛己所乘之丁己分等題言甲庚丙丁辛己两角等本篇論曰如云不然而庚大于辛令作甲庚壬角與丁辛己角等即甲壬圜分宜與丁己圜分等廿六而甲丙與丁己元等則甲壬與甲丙亦等乎後解在界者曰甲丙丁己两圜分等題言其上乙戊两角亦等本篇廿六論曰如云不然而乙大于戊令作甲乙壬角與戊角等其甲乙壬與丁戊己若等即所乘之甲壬丁己宜等而甲丙與丁己元等則甲壬與甲丙亦等乎増題從此推顯两直線不相交而在一圜之内若两線界相去之圜分等則两線必平行若两線平行則两線界相去之圜分等先解曰甲乙丙丁圜内有甲丁乙丙两線其相去之甲乙丁丙两圜分等題言两線必平行論曰試自甲至丙作直線相聯其甲乙丁丙既等即甲丙乙與丙甲丁两乘圜角亦等本題既内相對之两角等即两線必平行一卷廿七後解曰甲丁乙丙為平行線題言甲乙丁丙两圜分必等論曰試作甲丙線其甲丁乙丙既平行一卷廿七即内相對之两角甲丙乙丙甲丁必等而所乘圜分甲乙丁丙亦等本篇廿六第二十八題等圜内之直線等則其割本圜之分大與大小與小各等解曰甲乙丙丁戊己两圜等其心為庚為辛圜内有甲丙丁己两直線等題言甲乙丙與丁戊己两大分甲丙與丁己两小分各等論曰試于甲庚庚丙丁辛辛己各作直線其甲庚丙角形之甲丙與丁辛己角形之一卷八丁己两底既等而甲庚庚丙两腰與丁辛辛己两腰又等即庚辛两角亦等其所乘之甲丙丁己两本篇廿六小分必等次減相等之甲丙丁己两小分則所存甲乙丙丁戊己两大分亦等第二十九題等圜之圜分等則其割圜分之直線亦等解曰依前題两圜之甲乙丙丁戊己两圜分等而甲丙丁己两圜分亦等題言甲丙丁己两線必等論曰依前題作四線其甲庚丙角形之甲庚庚丙两腰與丁辛己角形之丁辛辛己两腰等而庚辛两角所乘之甲丙丁己两圜分等即庚辛两角亦等本篇廿七而對等角之甲丙丁己两線必等一卷四注曰第二十六至二十九四題所説俱等圜其在同圜亦依此論第三十題有圜之分求两平分之法曰甲乙丙圜分求两平分先于分之两界作甲丙線次两平分于丁從丁作乙丁為甲丙之垂線即乙丁分甲乙丙圜分為两平分一卷四論曰從乙作乙甲乙丙两線其甲乙丁角形之甲丁與丙乙丁角形之丙丁两腰等丁乙同腰而甲丁乙與丙丁乙两直角又等即對直角之甲乙乙丙两底亦等而甲乙與乙丙两圜分亦等本篇十八則甲乙丙圜界两平分于乙矣第三十一題五支負半圜角必直角負大分角小于直角負小分角大于直角大圜分角大于直角小圜分角小于直角解曰甲乙丙圜其心丁其徑甲丙于半圜分内任作甲乙丙角形即甲乙丙角負甲乙丙半圜分乙甲丙角負乙甲丙大分又任作乙戊丙角負乙戊丙小分題先言負半圜之甲乙丙為直角二言負大分之乙甲丙角小于直角三言負小分之乙戊丙角大于直角四言丙乙甲大圜分角大于直角後言丙乙戊小圜分角小于直角一卷五先論曰試作乙丁線次以甲乙線引長之至已其丁乙丁甲两線等即丁乙甲丁甲乙两角等依顯一卷卅二丁乙丙丁丙乙两角亦等而甲乙丙全角與乙甲丙甲丙乙两角并等又己乙丙外角亦與相對之乙甲丙甲丙乙两内角并等則己乙丙與甲乙丙等為直角一卷十七二論曰甲乙丙角形之甲乙丙既為直角則乙甲丙小于直角本篇廿二三論曰甲乙戊丙四邊形在圜之内其乙甲丙乙戊丙相對两角并等两直角而乙甲丙小于直角則乙戊丙大于直角四論曰甲乙丙直角為丙乙甲大圜分角之分則大于直角後論曰丙乙戊小圜分角為己乙丙直角之分則小于直角此題别有四解四論先解曰甲乙丙半圜其心丁其上任作甲乙丙角題言此為直角論曰試作乙丁線其丁乙丁甲两線既等即一卷五丁乙甲丁甲乙两角亦等而乙丁丙外角既與一卷卅二丁乙甲丁甲乙相對之两内角并等即倍大于一卷十三丁乙甲角依顯乙丁甲外角亦倍大于丁乙丙角即乙丁甲乙丁丙两角并亦倍大于甲乙丙角夫乙丁甲乙丁丙并等两直角則甲乙丙為直角二解曰甲乙丙大圜分其心丁任作甲乙丙角題言此小于直角論曰試作甲丁戊徑線次作乙戊線相聯本題一論其甲乙戊既為直角即甲乙丙為其分而小于直角三解曰甲乙丙小圜分其心丁任作甲乙丙角題言此大于直角論曰試作甲丁戊徑線而引乙丙圜界至戊次作乙戊線其甲乙戊既負半圜之直角而為甲乙丙角之分則甲乙丙大于直角四五合解曰甲乙丙大圜分丙丁甲小圜分其心戊題言丙甲乙大圜分角大于直角丙甲丁小圜分角小于直角論曰試作乙戊丙徑線次作乙甲線引長之至己其乙甲丙直角為丙甲乙大圜分角之分而丙甲丁小圜分角又為己甲丙直角之分則大分角大于直角小分角小于直角一系凡角形之内一角與两角并等其一角必直角何者其外角與内相對之两角等則與外角等之内交角豈非直角二系大分之角大于直角小分之角小于直角終無有角等于直角又從小過大從大過小非大即小終無相等依此題四五論甚明與本篇十六題増注互相發也第三十二題直線切圜從切界任作直線割圜為两分分内各任為負圜角其切線與割線所作两角與两負圜角交互相等解曰甲乙線切丙丁戊圜于丙從丙任作丙戊直線割圜為两分两分内任作丙丁戊丙庚戊两負圜角題言甲丙戊角與丙庚戊角乙丙戊角與丙丁戊角交互相等先論割圜線過心者曰如前圖甲丙戊乙丙戊两皆直角一卷十八而丙庚戊丙丁戊两負半圜角亦皆直角本篇卅一則交互相等後論割圜線不過心者曰如後圖試作丙己過心直線次作戊己線相聯其己丙為一卷十八甲乙之垂線而丙戊己為直角本篇卅一即戊丙己戊己丙两角并等于一直角亦本卷廿一等于甲丙己角矣此两率者各減同用之戊丙己角即所存戊己丙與甲丙戊等也夫戊己丙與丙庚戊元等則甲丙戊與丙庚戊交互相等又丙丁戊本篇庚四邊形之丙丁戊丙庚戊两對角并等两直角廿二而甲丙戊乙丙戊两交角亦等两直角一卷十三此二率者各減一相等之甲丙戊丙庚戊則所存丙丁戊乙丙戊亦交互相等第三十三題一線上求作圜分而負圜分角與所設直線角等先法曰設甲乙線丙角求線上作圜分而負圜分角與丙等其丙角或直或鋭或鈍若直角先以甲乙两平分于丁次以丁為心甲乙本篇卅一為界作半圜圜分内作甲戊乙角即負半圜角為直角如所求次法曰若設丙鋭角先于甲㸃上作丁甲乙鋭角與丙等次作戊甲為甲丁之垂線于甲乙之上次作己乙甲角與己甲乙角等而乙己線與甲戊線遇于己一卷六即己乙己甲两線等末以己為心甲為界作甲庚圜必過乙即甲庚乙圜分内甲乙線上所作負圜角必為鋭角而與丙等論曰試作甲庚乙角其甲己戊線過己心而丁甲又為戊甲之垂線即丁甲線切甲庚乙圜于甲本篇十六之系本篇卅二則丁甲乙與甲庚乙两角交互相等如所求後法曰若設辛鈍角依前作壬甲乙鈍角與辛等次作戊甲為壬甲之垂線餘倣第二法而于甲乙線上作甲癸乙等即與辛等後論同次第三十四題設圜求割一分而負圜分角與所設直線角等法曰設甲乙丙圜求割一分而負圜分角與丁等先作戊己直線切圜于甲本篇十七次作已甲乙角與丁等即割圜之甲乙線上所作甲丙乙角負甲丙乙圜分而與丁等本篇何者已甲乙角與丁等亦與甲丙乙交互相等故卅二第三十五題圜内两直線交而相分各两分線矩内直角形等解曰甲丙乙丁圜内有甲乙丙丁两線交而相分于戊題言甲戊偕戊乙與丙戊偕戊丁两矩内直角形等其两線或俱過心或一過心一不過心或俱不過心若俱過心者其各分四線等即两矩内直角形亦等本篇三先論曰圜内線獨丙丁過己心者又有二種其一丙丁平分甲乙線于戊即丙戊線在甲乙上為两直角試作已乙線相聯其丙丁線既两平分于己又任两分于戊即丙戊偕戊丁矩内直角形及已戊上直角方形并與等已二卷五丁之已乙上直角方形等夫已乙上直角方形一卷四七與已戊戊乙上两直角方形并等即丙戊偕戊丁矩内直角形及已戊上直角方形并與已戊戊乙上两直角方形并亦等矣次每減同用之已戊上直角方形則所存丙戊偕戊丁矩内直角形不與戊乙上直角方形等乎戊乙與甲戊既等即甲戊偕戊乙矩内直角形與丙戊偕戊丁矩内直角形亦等次論曰若丙丁任分甲乙線于戊即以甲乙線两平分于庚次于庚己巳乙各作直線相聯即已庚為甲乙之垂線而成两直本篇三角其丙戊偕戊丁矩内直角形及巳戊上直角方形并與等已丁之已乙上直角方形等二卷五而已戊上直角方形與已一卷四七庚庚戊上两直角方形并等已乙上直角方形二卷五與已庚庚乙上两直角方形并亦等則丙戊偕戊丁矩内直角形及已庚庚戊上两直角方形并與已庚庚乙上两直角方形并等次每減同用之已庚上直角方形即所存丙戊偕戊丁矩内直角形及庚戊上直角方形不與庚乙上直角方形等乎夫甲戊偕戊乙矩内直角形及庚戊上直角方形并亦與庚乙上直角方形等此二相等率者每減同用之庚戊上直角方形則丙戊偕戊丁與甲戊偕戊乙两矩内直角形等矣後論曰圜内两線俱不過心者又有二種或一線平分或两俱任分皆從已心與戊相聨作直線引長之為庚辛線依上論甲戊偕戊乙矩内直角形不論甲乙線平分任分皆與過心之庚戊偕戊辛矩内直角形等又依上論丙戊偕戊丁矩内直角形不論丙丁線平分任分亦與過心之庚戊偕戊辛矩内直角形等則甲戊偕戊乙與丙戊偕戊丁两矩内直角形等第三十六題圜外任取一㸃從㸃出两直線一切圜一割圜其割圜之全線偕規外線矩内直角形與切圜線上直角方形等本篇十七解曰甲乙丙圜外任取丁㸃從丁作丁乙線切圜于乙作丁甲線截圜界于丙題言甲丁偕丙丁矩内直角形與丁乙上直角方形等先論丁甲過戊心者曰試作乙戊線為丁乙之垂線本篇十八其甲丙線平分于戊又引出一丙丁線即甲丁偕丙丁矩内直角形二卷六及等戊丙之戊乙上直角方形并與戊丁上直角方形等而戊丁上直角方形與戊乙丁乙上两直一卷四七角方形并等即甲丁偕丙丁矩内直角形及戊乙上直角方形與戊乙丁乙上两直角方形并等此两率者每減同用之戊乙上直角方形則所存甲丁偕丙丁矩内直角形與丁乙上直角方形等本篇十八後論丁甲不過戊心者曰試以甲丙線两平分于已次從戊心作戊已戊丙戊丁戊乙四線即戊乙為丁乙之垂線戊已為甲丙之垂本篇三線其甲丙線既两平分于已又引出一丙丁線即甲丁偕丁丙矩内直角形及已丙上直角方形并與已丁上直角方形等二卷六次每加一戊已上直角方形即甲丁偕丁丙矩内直角形及已丙戊已上两直角方形并與己丁戊己上两直角方形并等夫己丙戊己上两直角方形并與等戊丙之戊一卷四七乙上直角方形等而戊丁上直角方形與己丁戊己上两直角方形并等即甲丁偕丁丙矩内直角形及戊乙上直角方形與戊丁上直角方形等矣又戊丁上直角方形與戊乙丁乙上两直角方形并等即甲丁偕丁丙矩内直角形及戊乙上直角方形并與戊乙丁乙上两直角方形并等次每減同用之戊乙上直角方形則所存甲丁偕丁丙矩内直角形與丁乙上直角方形等一系若從圜外一㸃作數線至規内各全線偕規外線矩内直角形俱等如從甲作本題甲丙甲丁甲戊各線截圜界于己于庚于辛其甲丙偕己甲甲丁偕庚甲甲戊偕辛甲各矩内直角形俱等何者試作甲乙切圜線則各矩線内直角形與甲乙上直角方形俱等故二系從圜外一㸃作两直線切圜此两線等如甲㸃作甲乙甲丙两切圜線即甲丙與甲乙等何者試從甲作甲丁線截圜界本題于戊其甲乙甲丙上两直角方形各與甲丁偕甲戊矩内直角形等則此两直角方形自相等三系從圜外一㸃止可作两直線切圜若言從甲既作甲乙甲丙两線切圜又可作甲丁線亦切圜令從戊心作戊乙戊丁两本篇十八線即甲乙戊為直角而甲丁戊亦宜等為直角一卷廿一試作甲戊直線則甲乙戊角形内有甲丁戊角應大于甲乙戊角安得為直角也又甲乙甲丁若俱本題二系切圜即两線宜等試作甲戊線截圜于己則甲本篇八丁為近己線甚小當小于逺己之甲乙線又安得相等也故一㸃上止可作切圜線两也第三十七題圜外任于一㸃出两直線一至規外一割圜至規内而割圜全線偕割圜之規外線矩内直角形與至規外之線上直角方形等則至規外之線必切圜解曰甲乙丙圜其心戊從丁㸃作丁乙至規外之線遇圜界于乙又作丁甲割圜至規内之線而截圜界于丙其丁甲偕丁丙矩内直角形與丁乙上直角方形等題言丁乙為切圜線論曰試從丁作丁己線切圜于己本篇十七次作戊乙戊己两線相聯若丁甲不過戊心者又作丁戊直線其丁己上直角方形與丁甲偕丁丙矩内直角形等本篇卅六而丁乙一卷八上直角方形與丁甲偕丁丙矩内直角形亦等則丁乙丁己上两直角方形自相等而丁乙丁己两線亦等夫丁乙戊角形之丁乙乙戊與丁己戊角形之丁己己戊各两腰等丁戊同底即两角形之三角各等而對丁戊底之丁己戊為直角本篇十八即丁乙戊亦直角故丁乙為切圜線本篇十六之系
