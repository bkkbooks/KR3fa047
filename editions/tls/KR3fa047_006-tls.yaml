body:
  text: 卷四之首界說七則第一界直線形居他直線形内而此形之各角切他形之各邊為形内切形此卷將論切形在圜之内外及作圜在形之内外故解形之切在形内及切在形外者先以直線形為例如前圖丁戊己角形之丁戊己三角切甲乙丙角形之甲乙乙丙丙甲三邊則丁戊己為甲乙丙之形内切形如後圖癸子丑角形雖癸子两角切庚辛壬角形之庚辛壬庚两邊而丑角不切辛壬邊則癸子丑不可謂庚辛壬之形内切形第二界一直線形居他直線形外而此形之各邊切他形之各角為形外切形如第一界圖甲乙丙為丁己戊之形外切形其餘各形倣此二例第三界直線形之各角切圜之界為圜内切形甲乙丙形之三角各切圜界于甲于乙于丙是也第四界直線形之各邊切圜之界為圜外切形甲乙丙形之三邊切圜界于丁于己于戊是也第五界圜之界切直線形之各邊為形内切圜同第四界圖第六界圜之界切直線形之各角為形外切圜同第三界圖第七界直線之两界各抵圜界為合圜線甲乙線两界各抵甲乙丙圜之界為合圜線若丙抵圜而丁不至及戊之两俱不至不為合圜線卷四第一題有圜求作合圜線與所設線等此設線不大于圜之徑線法曰甲乙丙圜求作合線與所設丁線等其丁線不大于圜之徑線徑為圜内之最大線更大不可合見三卷十五先作甲乙圜徑為乙丙若乙丙與丁等者即是合線若丁小于徑者即于乙丙上截取乙戊與丁等次以乙為心戊為界作甲戊圜交甲乙丙圜于甲末作甲乙合線即與丁等何者甲乙與乙戊等則與丁等第二題有圜求作圜内三角切形與所設三角形等角三卷十七法曰甲乙丙圜求作圜内三角切形其三角與所設丁戊己形之三角各等先作庚辛線切圜于甲次作庚甲乙角與設形之己角等次作辛甲丙角與設形之戊角等末作乙丙線即圜内三角切形與所設丁戊己形等角論曰甲丙乙與庚甲乙两角等甲乙丙與三卷卅二辛甲丙两角亦等而庚甲乙辛甲丙两角既與一卷卅二所設己戊两角各等即甲丙乙甲乙丙亦與己戊各等而乙甲丙必與丁等則三角俱等第三題有圜求作圜外三角切形與所設三角形等角法曰甲乙丙圜求作圜外三角切形其三角與所設丁戊己形之三角各等先于戊己一邊引長之為庚辛次于圜界抵心作甲壬線次作甲壬乙角與丁戊庚等次作乙壬丙角與丁己辛等末于甲乙丙上作三卷十六癸子子丑丑癸三垂線此三線各切圜于甲于乙于丙之系而相遇于子于丑于癸若作甲丙線郎癸甲丙癸丙甲两角小于两直角而子癸丑癸两線必相遇餘二倣此此癸子丑三角與所設丁戊己三角各等論曰甲壬乙子四邊形之四角與四直角等一卷卅二題内而壬甲子壬乙子两為直角即甲壬乙甲子乙两角并等两直角彼丁戊一卷十三庚丁戊己两角并亦等两直角此二等率者每一卷卅二減一相等之丁戊庚甲壬乙則所存丁戊己與甲子乙等依顯丑角與丁己戊等則癸與丁亦等而癸子丑與丁戊己两形之各三角俱等第四題三角形求作形内切圜法曰甲乙丙角形求作形内切圜先以甲乙丙角甲丙乙角各两平分之一卷九作乙丁丙丁两直線相遇于丁次自丁至角形之三邊各作垂線為丁己丁庚丁戊其戊丁乙角形一卷之丁戊乙丁乙戊两角與乙丁己角形之丁己乙丁乙己两角各等乙丁同邊即丁戊丁己两邊亦等廿六依顯丁丙己角形與丁庚丙角形之丁己丁庚两邊亦等即丁戊丁己丁庚三線俱等末作圜以丁為心戊為界即過庚己為戊庚己圜而切角形之甲乙乙丙丙甲三邊于戊于己于庚三卷十六之系此為形内切圜第五題三角形求作形外切圜若形是直法曰甲乙丙角形求作形外切圜先平分两邊角鈍角則分直角鈍角之两旁邊于丁于戊次于丁戊上各作垂線為己丁己戊而相遇于己若自丁至戊作直線即己丁戊角形之己丁戊己戊丁两角小于两直角故丁己戊己两線必相遇其己㸃或在形内或在形外俱作己甲己乙己丙三線或在乙丙邊上止作己甲線其甲丁己角形之甲丁與乙丁己角形之乙丁两腰等丁己同腰而丁之两旁角俱直角即甲己己乙两底必等一卷四依顯甲己戊丙己戊两形之甲己己丙两底亦等則己甲己乙己丙三線俱等末作圜以己為心甲為界必切丙乙而為角形之形外切圜一系若圜心在三角形内即三角形為銳角形何者每角在圜大分之上故若在一邊之上即為直角形若在形外即為鈍角形二系若三角形為銳角形即圜心必在形内若直角形必在一邊之上若鈍角形必在形外増從此推得一法任設三㸃不在一直線可作一過三㸃之圜其法先以三㸃作三直線相聯成三角形次依前作其同法甲乙丙三㸃先以甲乙两㸃各自為心相向各任作圜分令两圜分相交于丁于戊次甲丙两㸃亦如之令两圜分相交于己于庚末作丁戊己庚两線各引長之令相交于辛即辛為圜之心論見三卷二十五增第六題有圜求作内切圜直角方形法曰甲乙丙丁圜其心戊求作内切圜直角方形先作甲丙乙丁两徑線以直角相交于戊次作甲乙乙丙丙丁丁甲四線即甲乙丙丁為内切圜直角方形一卷四論曰甲乙戊角形之甲戊與乙戊丙角形之戊丙两腰等乙戊同腰而腰間角两為直角即其底甲乙乙丙等依顯乙丙丙丁亦等則四邊形之四邊俱三卷等而甲乙丙丁四角皆在半圜分之上又皆直角卅一是為内切圜直角方形第七題有圜求作外切圜直角方形法曰甲乙丙丁圜其心戊求作外切圜直角方形先作甲丙乙丁两徑線以直角相交于戊次于甲乙丙丁作庚己己辛辛壬壬庚四線為两徑之垂線而相遇于己于辛于壬于庚即己庚壬辛為外切圜直角方形一卷論曰甲戊乙己乙戊既皆直角即己辛甲丙平行廿八依顯甲丙庚壬亦平行則己庚辛壬亦平行一卷三十一卷卅四又甲丙辛己既直角形即甲丙己辛必等而甲丙辛甲己辛两角亦等甲丙辛既直角即甲己辛亦直角依顯庚壬辛亦直角而辛壬壬庚庚己三邊俱等于甲丙乙丁两徑既四邊俱等于两徑則己庚壬辛為直角方形而四邊各切圜三卷十六之系第八題直角方形求作形内切圜法曰甲乙丙丁直角方形求作形内切圜先以四邊各两平分于戊于己于庚于辛而作一卷卅三辛己戊庚两線交于壬其甲丁與乙丙既平行相等即半減線之甲辛乙己亦平行相等而甲乙與辛己亦平行相等依顯丁丙與辛己亦平行相等甲丁乙丙戊庚俱平行相等而甲壬乙三卷十六壬丙壬丁壬四俱直角形壬戊壬己壬庚壬辛四線與甲辛戊乙丁辛甲戊四線各等夫甲辛戊乙丁辛甲戊各為等線之半即與之等者壬戊壬己壬庚壬辛亦自相等次作圜以壬為心戊為界必過己庚辛而切甲丁丁丙丙乙乙甲四邊是為形内切圜第九題直角方形求作形外切圜法曰甲乙丙丁直角方形求作外切圜先作對角两線為甲丙乙丁而交于戊其甲乙丁一卷五角形之甲乙甲丁两腰等即甲乙丁甲丁乙两角亦等而乙甲丁為直角即甲乙丁甲丁乙俱半直一卷卅二角依顯丙乙丁丙丁乙亦俱半直角而四角俱一卷六等又戊甲丁戊丁甲两角等即戊甲戊丁两邊亦等依顯戊甲戊乙两邊亦等而戊乙戊丙两邊戊丙戊丁两邊各等次作圜以戊為心甲為界必過乙丙丁而為形外切圜第十題求作两邊等三角形而底上两角各倍大于腰間角法曰先任作甲乙線次分之于丙其分法須甲乙偕丙乙矩内直角形與甲丙上直角方形等二卷十一次以甲為心乙為界作乙本篇一丁圜次作乙丁合圜線與甲丙等末作甲丁線相聯其甲乙甲丁等即甲乙丁為两邊等角形而甲乙丁甲丁乙两角各倍大于甲角本篇五論曰試作丙丁線而甲丙丁角形外作甲丙丁切圜其甲乙偕丙乙矩内直角形與甲丙上直角方三卷卅七形等即亦與至規外之乙丁上直角方形等而乙丁線切甲丙丁圜于丁即乙丁切線偕丁丙割線三卷卅二所作乙丁丙角與負丁甲丙圜分之甲角交互相等此二率者毎加一丙丁甲角即甲丁乙全角與一卷卅二丙甲丁丙丁甲两角并等夫乙丙丁外角亦與丙甲丁丙丁甲相對之两内角等即乙丙丁角與甲一卷六丁乙全角等而與相等之甲乙丁亦等丙丁與乙丁两線亦等夫乙丁元與甲丙等即丙丁與甲丙亦等丙甲丁丙丁甲两角亦等而甲角既與乙丁丙角等即乙丁丙與丙丁甲两角亦等是甲丁乙倍大于丙丁甲必倍大于相等之甲角也而相等之甲乙丁亦倍大于甲也第十一題有圜求作圜内五邊切形其形等邊等角法曰甲乙丙丁戊圜求作五邊内切圜形等邊等角先作己庚辛两邊等角形而庚辛两角各倍大于己角本篇十次于圜内作甲丙丁角形與己庚辛角形各等角本篇二一卷九次以甲丙丁甲丁丙两角各两平分作丙戊丁乙两線末作甲乙乙丙丙丁丁戊戊甲五線相聯即甲乙丙丁戊為五邊内切圜形而五邊五角俱自相等三卷廿六論曰甲丙丁甲丁丙两角皆倍大于丙甲丁角而两角又平分即甲丁乙乙丁丙丙甲丁丁丙戊戊丙甲五角皆等而五角所乘之甲乙乙丙丙丁丁戊戊甲五圜分亦等即甲乙乙丙丙丁丁戊戊甲五線三卷廿九亦等是五邊形之五邊等又甲乙戊丁两圜分等而各加一乙丙丁圜分即甲乙丙丁與戊丁丙乙两圜分等乘两圜分之甲戊丁乙甲戊两角亦等依顯餘三角與两角俱等是五邊形之五角等第十二題有圜求作圜外五邊切形其形等邊等角法曰甲乙丙丁戊圜求作五邊外切圜形等邊等角先作圜内甲乙丙丁戊五邊等邊等角切形本篇十一次從己心作己甲己乙庚戊己丙己丁己戊五線次從此五線作庚辛辛壬壬癸癸子子庚五垂線相遇于庚于辛于壬于癸于子甲庚甲戊两角小于两直角故甲庚戊庚線必相遇餘四倣此五垂線既切圜三卷十六即成外切圜五邊形而等邊等角一卷四七論曰試從己心作己庚己辛己壬己癸己子五線其己甲甲辛上两直角方形己乙乙辛上两直角方形之两并各與己辛上直角方形等即两并自相一卷八等此两并率者每減一相等之甲己己乙上直角方形即所存甲辛辛乙上两直角方形等則甲辛辛乙两線等也又甲己辛角形之甲己與乙己辛角形之乙己两腰等己辛同腰而甲辛辛乙两底又等即甲己辛辛己乙两角等而甲辛己乙辛己两角亦一卷四等則甲己乙角倍大于辛己乙角也依顯乙己丙角亦倍大于乙己壬角乙壬丙角亦倍大于乙壬己角也又甲己乙乙己丙两角乘甲乙乙丙相等之两圜分線等故圜分等見三卷廿八即两角自相等三卷廿七半減之一卷廿六辛己乙乙己壬两角亦等乙己辛角形之乙己辛辛乙己两角與乙己壬角形之乙己壬壬乙己两角各等而乙己同邊是辛乙乙壬两邊亦等也乙辛己乙壬己两角亦等也則辛壬線倍大于辛乙線也依顯庚辛線亦倍大于辛甲線也前己顯甲辛辛乙两線等則倍大之庚辛辛壬两線亦等也依顯壬癸癸子子庚與庚辛辛壬俱等也是為庚辛壬癸子形之五邊等又依前所顯乙辛己與乙壬己两角等是乙辛甲之減半角與乙壬丙之減半角等即倍大之乙辛甲與乙壬丙亦等也依顯辛壬癸壬癸子癸子庚子庚辛與庚辛壬俱等也是為庚辛壬癸子形之五角等第十三題五邊等邊等角形求作形内切圜一卷九法曰甲乙丙丁戊五邊等邊等角形求作内切圜先分乙甲戊甲乙丙两角各两平分其線為己甲己乙而相遇于己己甲乙己乙甲两角小于两直角故己甲己乙两線必相遇自己作己丙己丁己戊三線其甲己乙角形之甲乙腰與乙己丙角形之乙一卷四丙腰等乙己同腰而两腰間之甲乙己丙乙己两角等即甲己己丙两底亦等乙甲己乙丙己两角亦等又乙甲戊與乙丙丁两角等而乙甲己為乙甲一卷廿六戊之半即乙丙己亦乙丙丁之半則乙丙丁角亦两平分于己丙線矣依顯丙丁戊丁戊甲两角亦两平分于己丁己戊两線矣次從己向各邊作己庚己辛己壬己癸己子五垂線其甲己庚角形之己甲庚己庚甲两角與甲己子角形之己甲子己子甲两角各等甲己同邊即两形必等己子與己庚两線亦等依顯己辛己壬己三卷十六癸三垂線與己庚己子两垂線俱等末作圜以己為心庚為界必過辛壬癸子而為甲乙丙丁戊五邊形之内切圜第十四題五邊等邊等角形求作形外切圜說見前法曰甲乙丙丁戊五邊等邊等角形求作外切圜先分乙甲戊甲乙丙两角各两平分其線為己甲己乙而相遇于己次從己作己丙己丁己戊三線依前題論推顯乙丙丁一卷六丙丁戊丁戊甲三角各两平分于己丙己丁己戊三線夫五角既等即其半減之角亦等而甲乙己角形之己甲乙己乙甲两角等即甲己與己乙两線亦等依顯己丙己丁己戊三線與己甲己乙俱等末作圜以己為心甲為界必過乙丙丁戊而為甲乙丙丁戊五邊形之外切圜第十五題有圜求作圜内六邊切形其形等邊等角法曰甲乙丙丁戊己圜其心庚求作六邊内切圜形等邊等角先作甲丁徑線次以丁為心庚為界作圜两圜相交于丙于戊次從庚心作丙庚戊庚两線各引長之為丙己戊乙末作甲乙乙丙丙丁丁戊戊己己甲六線相聨即成甲乙丙丁戊己内切圜六邊形而等邊等角依圜界說論曰庚丙庚丁两線等而丁丙與丁庚亦等三一卷五邊俱等即庚丙丁為平邊角形而庚丁丙丁丙庚丙庚丁三角俱等此三角元與两直角等一卷卅二即一卷十三每角為两直角三分之一而丙庚丁角為两直角三分之一也依顯丁庚戊角亦两直角三分之一而丙庚丁丁庚戊戊庚己三角又等于两直角即戊一卷十五庚己角亦两直角三分之一矣則丙庚丁丁庚戊戊庚己三角亦自相等而此三角與己庚甲甲庚乙乙庚丙三角亦等是輳庚心之六角俱自相等而三卷廿六所乘之六圜分及甲乙乙丙丙丁丁戊戊己己三卷廿九甲六線俱自相等則甲乙丙丁戊己形之六邊三卷廿七等乂乙丙與甲己两圜分等而各加一丙丁戊己圜分即乙丙丁戊己與甲己戊丁丙两圜分等而所乘之乙甲己與甲乙丙两角等依顯乙丙丁丙丁戊丁戊己戊己甲四角與乙甲己甲乙丙两角俱等則甲乙丙丁戊己形之六角等一系凡圜之半徑為六分圜之一之分弦何者庚丁與丁丙等故故一開規為圜不動而可六平分之二系依前十二十三十四題可作六邊等邊等角形在圜之外又六邊等邊等角形内可作切圜又六邊等邊等角形外可作切圜第十六題有圜求作圜内十五邊切形其形等邊等角本篇二法曰甲乙丙圜求作十五邊内切圜形等邊等角先作甲乙丙内切圜平邊三角形與丁等角即三邊等而甲乙乙丙丙甲三圜分亦等三卷廿八夫甲乙丙圜十正分之則甲乙三分圜之一當為十五分之五本篇十一次從甲作甲戊己庚辛内切圜五邊形等角即三卷廿八甲戊戊己己庚庚辛辛甲五圜分等夫甲乙丙三卷卅圜十五分之則甲戊五分圜之一當為十五分之三而戊乙得十五分之二次以戊乙圜分两平分于壬則壬乙得十五分之一次作壬乙線依壬乙共本篇一作十五合圜線則成十五邊等邊形而十五角三卷廿七所乘之圜分等即各角亦等一系依前十二十三十四題可作外切圜十五邊形又十五邊形内可作切圜又十五邊形外可作切圜注曰依此法可設一法作無量數形如本題圖甲乙圜分為三分圜之一即命三甲戊圜分為五分圜之一即命五三與五相乘得十五即知此两分法可作十五邊形又如甲乙命三甲戊命五三與五較得二即知戊乙得十五分之二因分戊乙為两平分得壬乙線為十五分之一可作内切圜十五邊形也以此法為例作後題增題若圜内從一㸃設切圜两不等等邊等角形之各一邊此两邊一為若干分圜之一一為若干分圜之一此两若干分相乘之數卽後作形之邊數此两若干分之較數卽两邊相距之圜分所得後作形邊數内之分數法曰甲乙丙丁戊圜内從甲㸃作數形之各一邊如甲乙為六邊形之一邊甲丙為五邊形之一邊甲丁為四邊形之一邊甲戊為三邊形之一邊甲乙命六甲丙命五較數一卽乙丙圜分為所作三十邊等邊等角形之一邊何者五六相乘為三十故當作三十邊也較數一故當為一邊也論曰甲乙圜分為六分圜之一卽得三十分圜之五而甲丙為五分圜之一卽得三十分圜之六則乙丙得三十分圜之一也依顯乙丁為二十四邊形之二邊也何者甲乙命六甲丁命四六乘四得二十四也又較數二也依顯乙戊為十八邊形之三邊也丙丁為二十邊形之一邊也丙戊為十五邊形之二邊也丁戊為十二邊形之一邊也三卷廿七二系凡作形于圜之内等邊則等角何者形之角所乘之圜分皆等故凡作形于圜之外即從圜心作直線抵各角依本篇十二題可推顯各角等三系凡等邊形既可作在圜内即依圜内形可作在圜外即形内可作圜即形外亦可作圜皆依本篇十二十三十四題四系凡圜内有一形欲作他形其形邊倍于此形邊即分此形一邊所合之圜分為两平分而每分各作一合線即三邊可作六邊四邊可作八邊倣此以至無窮又補題圜内有同心圜求作一多邊形切大圜不至小圜其多邊為偶數而等法曰甲乙丙丁戊两圜同以己為心求于甲乙丙大圜内作多邊切形不至丁戊小圜其多邊為偶數而等先從己心作甲丙徑線截丁戊圜于戊次從戊作三卷庚辛為甲戊之垂線即庚辛線切丁戊圜于戊也十六之系夫甲庚丙圜分雖大于丙庚若于甲庚丙減其如下補論半甲乙存乙丙又減其半乙壬存壬丙又減其半壬癸如是逓減至其減餘丙癸必小于丙庚既得三卷廿九丙癸圜分小于丙庚而作丙癸合圜線即丙癸為所求切圜形之一邊也次分乙壬圜分其分數與丙壬之分數等次分甲乙與乙丙分數等分丙甲與甲乙丙分數等則得所求形而不至丁戊小圜一卷論曰試從癸作癸子為甲丙之垂線遇甲丙于丑其庚戊丑癸丑戊两皆直角即庚辛癸子為平行線廿八庚辛線之切丁戊圜既止一㸃即癸子線更在其三卷十四外必不至丁戊矣何況丙癸更逺于丑癸乎依顯其餘與丙癸等邊同度距心者俱不至丁戊圜也此係十二卷第十六題因六卷今増題宜藉此論故先類附于此補論其題曰两幾何不等若于大率逓減其大半必可使其減餘小于元設小率解曰甲乙大率丙小率題言于甲乙逓減其大半至可使其減餘小于丙論曰試以丙倍之又倍之至僅大于甲乙而止為丁戊丁戊之分為丁己己庚庚戊各與丙等也次于甲乙減其大半甲辛存辛乙又減其大半辛壬存壬乙如是逓減至甲乙與丁戊之分數等夫甲辛辛壬壬乙與丁己己庚庚戊分數既等丁戊又大于甲乙若两率各為两分而大丁戊之減丁己止于半小甲乙之減甲辛為大半即丁戊之減餘必大于甲乙之減餘也若各為多分而己戊尚多于丙者即又于己戊減己庚于辛乙減其大半辛壬如是逓減卒至丁戊之末分庚戊大于甲乙之末分壬乙也而庚戊元與丙等是壬乙小于丙也又論曰若于甲乙逓減其半亦同前論何者大丁戊所減不大于半則丁戊之減餘每大于甲乙之減餘以至末分亦大于末分此係十卷第一題借用于此以足上論
