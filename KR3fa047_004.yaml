body:
  text: 卷二之首界説二則第一界凡直角形之兩邊函一直角者為直角形之矩線如甲乙偕乙丙函甲乙丙直角得此兩邊即知直角形大小之度今别作戊線己線與甲乙乙丙各等亦即知甲乙丙丁直角形大小之度則戊偕己兩線為直角形之矩線此例與算法通如上圖一邊得三一邊得四相乘得十二則三偕四兩邊為十二之矩數凡直角諸形之內四角皆直故不必更言四邊及平行線止名為直角形省文也凡直角諸形不必全舉四角止舉對角二字即指全形如甲乙丙丁直角形止舉甲丙或乙丁亦省文也第二界諸方形有對角線者其兩餘方形任偕一角線方形為磬折形甲乙丙丁方形任直斜角作甲丙對角線從庚點作戊己辛壬兩線與方形邊平行而分本形為四方形其辛己庚乙兩形為餘方形辛戊己壬兩形為角線方形一卷界説三六兩餘方形任偕一角線方形為磬折形如辛己庚乙兩餘方形偕己壬角線方形同在癸子丑圜界內者是癸子丑磬折形也用辛戊角線方形倣此卷二第一題兩直線任以一線任分為若干分其兩元線矩內直角形與不分線偕諸分線矩內諸直角形并等解曰甲與乙丙兩線如以乙丙三分之為乙丁丁戊戊丙題言甲偕乙丙矩線內直角形與甲偕乙丁甲偕丁戊甲偕戊丙三矩線內直角形并等論曰試作乙己直角形在乙丙偕等甲之己丙矩線內作法于乙界作庚乙丙界作己丙兩垂線俱與甲等為平行次作庚己直線與乙丙平行次于丁戊兩點作辛丁壬一卷卅三戊兩垂線與庚乙己丙平行其辛丁與庚乙壬一卷卅四戊與己丙既平行則辛丁與壬戊亦平行而辛丁壬戊與己丙等即亦與甲等如此則乙辛直角形在甲偕乙丁矩線內丁壬直角形在甲偕丁戊矩線內戊己直角形在甲偕戊丙矩線內并之則三矩內直角形與甲偕乙丙兩元線矩內直角形等注曰二卷前十題皆言線之能也能者謂其上能為直角形也如十尺線其上能為百尺方形之類其説與算數最近故九卷之十四題俱以數明此十題之理今未及詳因題意難顯略用數明之如本題設兩數當兩線為六為十以十任三分之為五為三為二六乘十為六十之一大實與六乘五為三十及六乘三為十八六乘二為十二之三小實并等第二題一直線任兩分之其元線上直角方形與元線偕兩分線兩矩內直角形并等解曰甲乙線任兩分于丙題言甲乙上直角方形與甲乙偕甲丙甲乙偕丙乙兩矩線內直角形并等論曰試于甲乙線上作甲丁直角方形從丙點作己一卷卅一丙垂線與甲戊乙丁平行其甲戊與甲乙既等一卷卅四則甲己直角形在甲乙甲丙矩線內乙丁與甲乙既等則丙丁直角形在甲乙丙乙矩線內而此兩形并與甲丁直角方形等又論曰試别作丁線與甲乙等其甲乙線既任分于丙則甲乙偕丁矩線內直角形即甲乙上直角方形與甲丙偕丁丙乙偕丁兩矩線內直角形并等本篇一注曰以數明之設十數任兩分之為七為三十乘七為七十及十乘三為三十之兩小實與十自之百一大羃等第三題一直線任兩分之其元線任偕一分線矩內直角形與分餘線偕一分線矩內直角形及一分線上直角方形并等解曰甲乙線任兩分于丙題言元線甲乙任偕一分線如甲丙矩內直角形不論甲丙為長分為短分與分餘丙乙偕甲丙矩線內直角形及甲丙上直角方形并等論曰試作甲丁直角方形從乙界作乙巳垂線與甲戊平行一卷卅一而于戊丁引長之遇于己其甲戊與甲丙等則甲己直角形在元線甲乙偕一分線甲丙矩內丙丁與甲丙等則丙己直角形在一分線甲丙偕分餘線丙乙矩內而甲己直角形與甲丙丙乙矩線內丙己直角形及甲丙上甲丁直角方形并等又論曰試别作丁線與一分線甲丙等其甲乙線既任分于丙則甲乙偕丁矩線內直角形即甲乙偕甲丙矩線內直角形與丁偕丙乙即甲丙偕丙乙丁偕甲丙即甲丙上直角方形兩矩線內直角形并等本篇一注曰以數明之設十數任兩分之為七為三如前圖則十乘七為七十與七乘三之實二十一及七自之羃四十九并等如後圖十乘三為三十與七乘三之實二十一及三之羃九并等第四題一直線任兩分之其元線上直角方形與各分上兩直角方形及兩分互偕矩線內兩直角形并等解曰甲乙線任兩分于丙題言甲乙線上直角方形與甲丙丙乙線上兩直角方形及甲丙偕丙乙丙乙偕甲丙矩線內兩直角形并等論曰試于甲乙線上作甲丁直角方形次作乙戊對角線次從丙作丙己線與乙丁一卷五平行遇對角線于庚末從庚作辛壬線與甲乙平行而分本形為四直角形即甲乙戊角形之甲乙甲戊兩邊等而甲乙戊與甲戊乙兩角亦等夫甲乙一卷卅二戊形之三角并與兩直角等而甲為直角即甲乙戊甲戊乙皆半直角一卷卅之二系依顯丁乙戊角形之一卷卅九丁乙戊丁戊乙兩角亦皆半直角則戊己庚外角與內角丁等為直角而己戊度既半直角則己庚一卷戊等為半直角矣角既等則己庚己戊兩邊亦等六庚辛辛戊亦等一卷卅四而辛巳為直角方形也依顯一卷卅四丙壬亦直角方形也又庚辛與甲丙兩對邊等而乙丙與庚丙俱為直角方形邊亦等則辛己為甲丙線上直角方形丙壬為丙乙線上直角方形也又甲庚及庚丁兩直角形各在甲丙丙乙矩線內也則甲丁直角方形與甲丙丙乙兩線上兩直角方形及兩線矩內兩直角形并等矣系從此推知凡直角方形之角線形皆直角方形又論曰甲乙線既任分于丙則元線甲乙上直角方形與元線偕各分線矩內兩直角形并等本篇二又甲乙偕甲丙矩線內直角形與甲丙偕本篇三丙乙矩線內直角形及甲丙上直角方形并等本篇三甲乙偕丙乙矩線內直角形與丙乙偕甲丙矩線內直角形及丙乙上直角方形并等則甲乙上直角方形與甲丙丙乙上兩直角方形及甲丙偕丙乙丙乙偕甲丙矩線內兩直角形并等注曰以數明之設十數任兩分之為七為三十之羃百與七之羃四十九三之羃九及三七互乘之實兩二十一并等第五題一直線兩平分之又任兩分之其任兩分線矩內直角形及分內線上直角方形并與平分半線上直角方形等解曰甲乙線兩平分于丙又任兩分于丁其丙丁為分內線丙丁線者丙乙所以大于丁乙之較又甲丁所以大于甲丙之較故曰分內線題言甲丁丁乙矩線內直角形及分內線丙丁上直角方形并與丙乙線上直角方形等論曰試于丙乙線上作丙己直角方形次作乙戊對角線從丁作丁庚線與乙己平行遇對角線于辛次從辛作壬癸線與丙乙平行次從甲作甲子線與丙戊平行末從壬癸線引長之遇于子夫丁壬癸庚皆直角方形本篇四之系而辛丁與丁乙兩線等一卷卅四癸辛一篇四三與丙丁兩線等則甲辛直角形在任分之甲丁丁乙矩線內而癸庚為分內線丙丁上直角方形也今欲顯甲辛直角形及癸庚直角方形并與丙己直角方形等者于丙辛辛己相等之兩餘方形每加一一卷丁壬直角方形即丙壬及丁己兩直角形等矣而甲癸與丙壬兩形同在平行線內又底等即形亦等卅六則甲癸與丁巳亦等也即又每加一丙辛直角形則丑寅卯罄折形豈不與甲辛等次于罄折形又加一癸庚直角方形豈不與丙巳直角方形等也而甲辛癸庚兩形并亦與丙己等也則甲丁丁乙矩線內直角形及丙丁上直角方形并與丙乙上直角方形等注曰以數明之設十數兩平分之各五又任分之為八為二則三為分內數三者五所以大于二之較又八所以大于五之較二八之實十六三之羃九與五之羃二十五等第六題一直線兩平分之又任引增一直線共為一全線其全線偕引增線矩內直角形及半元線上直角方形并與半元線偕引增線上直角方形等解曰甲乙線兩平分于丙又從乙引長之增乙丁與甲乙通為一全線題言甲丁偕乙丁矩線內直角形及半元線丙乙上直角方形并與丙丁上直角方形等論曰試于丙丁上作丙戊直角方形次作丁己對角線從乙作乙庚線與丁戊平行遇對角線于辛次從辛作壬癸線與丙丁平行次從甲作甲子線與丙己平行末從壬癸線引長之遇于子夫乙壬癸庚皆直角方形本篇四之系而乙丁與丁壬兩線等一卷卅四癸辛與一卷卅六丙乙兩線等則甲壬直角形在甲丁偕乙丁矩線內而癸庚為丙乙上直角方形也今欲顯甲壬直角形及癸庚直角方形并與丙戊直角方形等者試觀甲癸與丙辛兩直角形同在平行線內又底等即形亦等而丙辛與辛戊等一卷四三則辛戊與甲癸亦等即又每加一丙壬直角形則丑寅卯磬折形與甲壬等夫磬折形加一癸庚形本與丙戊直角方形等也即甲壬癸庚兩形并亦與丙戊等也則甲丁乙丁矩線內直角形及丙乙上直角方形并豈不與丙丁上直角方形等注曰以數明之設十數兩平分之各五又引增二共十二二乘之為二十四及五之羃二十五與七之羃四十九等第七題一直線任兩分之其元線上及任用一分線上兩直角方形并與元線偕一分線矩內直角形二及分餘線上直角方形并等解曰甲乙線任分于丙題言元線甲乙上及任用一分線如甲丙上兩直角方形并不論甲丙為長分為短分與甲乙偕甲丙矩內直角形二及分餘線丙乙上直角方形并等論曰試于甲乙上作甲丁直角方形次作乙戊對角線從丙作丙己線與乙丁平行遇對角線于庚末從庚作辛壬線與甲乙平行夫辛己丙壬皆直角方形本篇四之系而辛庚與甲丙等一卷卅四即辛己為甲丙上直角方形也又甲戊與甲乙等即甲己直角形在甲乙偕甲丙矩線內也又戊丁丁壬與甲乙甲丙各等即辛丁直角形亦在甲乙偕甲丙矩線內也夫甲己己壬兩直角形即癸子丑罄折形及丙壬直角方形并本與甲丁直角方形等今于甲己辛丁兩直角形并加一丙壬直角方形即與甲丁直角方形加一辛巳直角方形等矣則甲乙甲丙矩線內直角形二及丙乙上直角方形并與甲乙上直角方形及甲丙上直角方形并等也注曰以數明之設十數任分之為六為四如前圖十之羃百及六之羃三十六并與十六互乘之兩實百二十及四之羃十六等如後圖十之羃百及四之羃十六并與十四互乘之兩實八十及六之羃三十六等第八題一直線任兩分之其元線偕初分線矩內直角形四及分餘線上直角方形并與元線偕初分線上直角方形等解曰甲乙線任分于丙題言元線甲乙偕初分線丙乙矩內直角形四不論丙乙為長分為短分及分餘線甲丙上直角方形并與甲乙偕丙乙上直角方形等論曰試以甲乙線引增至丁而乙丁與丙乙等于全線上作甲戊直角方形次作丁巳對角線從乙作乙庚線與丁戊平行遇對角線于辛次從丙作丙壬線與甲巳平行遇對角線于癸次從辛作子丑線與甲丁平行遇丙壬于寅末從癸作卯辰線與戊己平行遇乙庚于巳其卯壬寅巳乙丑俱角線方形一卷卅四之系而卯癸與甲丙兩線等一卷卅四即卯壬為甲丙上直角方形又寅辛與丙乙兩線一篇卅四等即寅巳為丙乙上直角方形與乙丑等丙乙與乙丁等故又乙辛辛巳兩線亦各與丙乙等而甲辛子巳兩直角形各在甲乙丙乙矩線內即等子辛與甲乙等故寅庚辛戊兩直角形亦各在甲乙丙乙矩線內即又等寅辛辛丑與丙乙乙丁等辛庚丑戊與等甲乙之子辛等故寅巳既與乙丑等而每加一癸庚即乙丑癸庚并與寅庚又等是甲辛一子巳二辛戊三乙丑四癸庚五五直角形并為午未申磬折形與元線甲乙偕初分線丙乙矩內直角形四等而午未申磬折形及卯壬直角方形本與甲戊直角方形等則甲乙乙丙矩線內直角形四及甲丙上直角方形并與甲乙偕丙乙上直角方形等注曰以數明之設十數任分之為六為四如前圖十六互乘之實四為二百四十及四之羃十六共二百五十六與十六之羃等如後圖十四互乘之實四為一百六十及六之羃三十六共一百九十六與十四之羃等第九題一直線兩平分之又任兩分之任分線上兩直角方形并倍大于平分半線上及分內線上兩直角方形并解曰甲乙線平分于丙又任分于丁題言甲丁丁乙上兩直角方形并倍大于平分半線甲丙上分內線丙丁上兩直角方形并論曰試于丙上作丙戊垂線與甲丙等次作甲戊戊乙兩腰次從丁作丁己垂線遇戊乙于己從己作己庚線與甲乙平行遇一卷五戊丙于庚末作甲己線其甲丙戊角形之甲丙丙戊兩腰等即丙戊甲丙甲戊兩角亦等而甲丙戊為直角即餘兩角皆半直角一卷卅二之系依顯丙戊乙亦一卷草九半直角又戊庚己角形之戊庚己角為戊丙乙之外角即亦直角而庚戊己半直角即庚己戊亦半直角一卷卅二之系又庚戊己庚己戊兩角等即庚戊庚己一卷六兩腰亦等依顯丁乙己角形之丁乙丁己兩腰一卷四七亦等夫甲丙戊角形之丙為直角即甲戊線上直角方形與甲丙丙戊線上兩直角方形并等而甲一卷四七丙丙戊上兩直角方形自相等即甲戊上直角方形倍大于甲丙上直角方形矣又戊庚己角形之庚為直角即戊己線上直角方形與庚戊庚己線上兩直角方形并等而庚戊庚己上兩直角方形自相等即戊己上直角方形倍大于等庚己之丙丁上直角方形矣庚己丙丁為丙己直角形之對邊故見一卷卅四則是甲戊戊己上兩直角一篇四七方形并倍大于甲丙丙丁上兩直角方形并也又甲己上直角方形既等于甲戊戊己上兩直角方形并又等于甲丁丁己上兩直角方形并則甲丁丁己上兩直角方形并亦倍大于甲丙丙丁上兩直角方形并矣而丁己與丁乙等則甲丁丁乙上兩直角方形并豈不倍大于甲丙丙丁上兩直角方形并也注曰以數明之設十數兩平分之各五又任分之為七為三分內數二其七之羃四十九及三之羃九倍大于五之羃二十五及二之羃四第十題一直線兩平分之又任引增一線共為一全線其全線上及引增線上兩直角方形并倍大于平分半線上及分餘半線偕引增線上兩直角方形并解曰甲乙直線平分于丙又任引增為乙丁題言甲丁線上及乙丁線上兩直角方形并倍大于甲丙線上及丙丁線上兩直角方形并一卷草九論曰試于丙上作丙戊垂線與甲丙等自戊至甲至乙各作腰線次從丁作己丁垂線引長之又從戊乙引長之遇于庚次作戊己線與丙丁平行末作甲庚線依前題論推顯甲戊乙為直角丙戊乙為半直角即相對之戊庚己亦半直角又己為直角一卷卅四一卷卅二即己戊庚亦半直角而己戊己庚兩腰必等一卷六依顯乙丁丁庚兩腰亦等夫甲戊上直角方形等一卷四七于甲丙丙戊上兩直角方形并必倍大于甲丙一卷四七上直角方形而戊庚上直角方形等于戊己己庚上兩直角方形并必倍大于對戊己邊之丙丁上一卷卅四直角方形則甲戊戊庚上兩直角方形并倍大于甲丙丙丁上兩直角方形并也又甲庚上直角方形等于甲戊戊庚上兩直角方形并亦等于甲丁丁庚上兩直角方形并則甲丁丁庚上兩直角方形并亦倍大于甲丙丙丁上兩直角方形并也而甲丁乙丁上兩直角方形并倍大于甲丙丙丁上兩直角方形并矣丁庚與乙丁等故注曰以數明之設十數平分之各五又任增三為十三十三之羃一百六十九及三之羃九倍大于五之羃二十五及八之羃六十四也第十一題一直線求兩分之而元線偕初分線矩內直角形與分餘線上直角方形等法曰甲乙線求兩分之而元線偕初分小線矩內直角形與分餘大線上直角方形等先于甲乙上作甲丙直角方形次以甲丁線兩平分于戊次作戊乙線次從戊甲引增至己而戊己線與戊乙等末于甲乙線截取甲庚與甲己等即甲乙偕庚乙矩線內直角形與甲庚上直角方形等如所求一卷卅四論曰試于庚上作壬辛線與丁己平行次作己辛線與甲庚平行其壬庚與丙乙等即與甲乙等而庚丙直角形在甲乙偕庚乙矩線內也又甲庚與甲己等而甲為直角即己庚為甲庚上直角方形也今欲顯庚丙直角形與己庚直角方形等者試觀甲丁兩平分于戊而引增一甲己是丁己偕甲己矩線內直角形即丁辛直角形及甲戊上直角方形并與等戊己之本篇六戊乙上直角方形等夫戊乙上直角方形等于一卷四七甲戊甲乙上兩直角方形并即丁辛直角形及甲戊上直角方形并與甲戊甲乙上兩直角方形并等矣次各減同用之甲戊上直角方形即所存丁辛直角形不與甲乙上甲丙直角方形等乎此二率者又各減同用之甲壬直角形則所存己庚直角方形與庚丙直角形等而甲乙偕庚乙矩線內直角形與甲庚上直角方形等也注曰此題無數可解説見九卷十四題第十二題三邊鈍角形之對鈍角邊上直角方形大于餘邊上兩直角方形并之較為鈍角旁任用一邊偕其引增線之與對角所下垂線相遇者矩內直角形二解曰甲乙丙三邊鈍角形甲乙丙為鈍角從餘角如甲下一垂線與鈍角旁一邊如丙乙之引增線遇于丁為直角題言對鈍角之甲丙邊上直角方形大于甲乙乙丙邊上兩直角方形并之較為丙乙偕乙丁矩線內直角形二反説之則甲乙乙丙上兩直角方形及丙乙偕乙丁矩線內直角形二并與甲丙上直角方形等論曰丙丁線既任分于乙即丙丁上直角方形與丙乙乙丁上兩直角方形及丙乙偕乙丁矩線內直角形二并等本篇四此二率者每加一甲丁上直角方形即丙丁甲丁上兩直角方形并與丙乙乙丁甲丁上一卷四七直角方形三及丙乙偕乙丁矩線內直角形二并等也夫甲丙上直角方形等于丙丁甲丁上兩直角方形并即亦等于丙乙乙丁甲丁上直角方形三一卷四七及丙乙偕乙丁矩線內直角形二并也又甲乙線上直角方形既等于乙丁甲丁上兩直角方形并即甲丙上直角方形與甲乙丙乙上兩直角方形及丙乙偕乙丁矩線內直角形二并等矣第十三題三邊鋭角形之對鋭角邊上直角方形小于餘邊上兩直角方形并之較為鋭角旁任用一邊偕其對角所下垂線旁之近鋭角分線矩內直角形二解曰甲乙丙三邊鋭角形從一角如甲向對邊乙丙下一垂線分乙丙于丁題言對甲丙乙鋭角之甲乙邊上直角方形小于乙丙甲丙邊上兩直角方形并之較為乙丙偕丁丙矩線內直角形二反説之則乙丙甲丙上兩直角方形并與甲乙上直角方形及乙丙偕丁丙矩線內直角形二并等本篇七論曰乙丙線既任分于丁即乙丙丁丙上兩直角方形并與乙丙偕丁丙矩線內直角形二及乙丁上直角方形并等此二率者每加一甲丁上直角方形即乙丙丁丙甲丁上直角方形三與乙丙偕丁丙矩線內直角形二及乙丁甲丁上兩直角方形并等一卷四七也又甲丙上直角方形等于丁丙甲丁上兩直角方形并即乙丙甲丙上兩直角方形并與乙丙偕一卷四七丁丙矩線內直角形二及乙丁甲丁上兩直角方形并等也又甲乙上直角方形等于乙丁甲丁上兩直角方形并即乙丙甲丙上兩直角方形并與乙丙偕丁丙矩線內直角形二及甲乙上直角方形并等反説之則甲乙上直角方形小于乙丙甲丙上兩直角方形并者為乙丙偕丁丙矩線內直角形二也注曰題中止論鋭角形不言直角鈍角形而直角鈍角形中俱有兩鋭角一卷十七卅二即對鋭角邊上形亦同此論如第二第三圖是但三鋭角形所作垂線任用一角而直角形必用直角鈍角形必用鈍角此為異耳直角鈍角形不用直角鈍角不能作垂線第十四題有直線形求作直角方形與之等一卷四五法曰甲直線無法四邊形求作直角方形與之等先作乙丁形與甲等而直角次任用一邊引長之如丁丙引之至己而丙己與乙丙等次以丁巳兩平分于庚其庚點或在丙點或在丙點之外若在丙即乙丁是直角方形與甲等矣蓋丙己與乙丙等又與丙丁等而餘邊俱相等故乙丁為直角方形見一卷卅四若庚在丙外即以庚為心丁巳為界作丁辛巳半圜末從乙丙線引長之遇圜界于辛即丙辛上直角方形與甲等論曰試自庚至辛作直線其丁巳線既兩平分于庚又任兩分于丙則丁丙偕丙巳矩內直角形即乙丁直角形蓋丙己與乙丙等故及庚丙上直角方形并與等庚巳之庚辛本篇五上直角方形等夫庚辛上直角方形等于庚丙一卷四七丙辛上兩直角方形并即乙丁直角形及庚丙上直角方形并與庚丙丙辛上兩直角方形并等次各減同用之庚丙上直角方形則丙辛上直角方形與乙丁直角形等增題凡先得直角方形之對角線所長于本形邊之較而求本形邊法曰直角方形之對角線所長于本形邊之較為甲乙而求本形邊先于甲乙上作甲丙直角方形次作乙丁對角線又引長之為丁戊線而丁戊與甲丁等即得乙戊線如所求論曰試于乙戊作戊己垂線從乙甲線引長之遇一卷卅二于己其乙戊己既直角而戊乙己為半直角即戊己乙亦半直角而戊乙與戊己兩邊等一卷六次作己庚與戊乙平行作乙庚與戊己平行即戊庚形為戊乙邊上直角方形也末作戊甲線即丁戊甲丁甲戊兩角等也一卷五夫乙戊己丁甲己既兩皆直角試每減一相等之丁戊甲丁甲戊角即所存己戊甲己甲戊兩角必等而己戊己甲兩邊必等一卷六則乙己對角線大于乙戊邊之較為甲乙矣幾何原本卷二
