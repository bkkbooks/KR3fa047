body:
  text: 卷五之首界説十九則前四卷所論皆獨幾何也此下二卷所論皆自兩以上多幾何同例相比者也而本卷則總説完幾何之同例相比者也諸卷中獨此卷以虛例相比絶不及線面體諸類也第六卷則論線論角論圜界諸類及諸形之同例相比者也今先解向後所用名目為界説十九第一界分者幾何之幾何也小能度大以小為大之分以小幾何度大幾何謂之分曰幾何之幾何者謂非此小幾何不能為此大幾何之分也如一點無分亦非幾何即不能為線之分也一線無廣狹之分非廣狹之幾何即不能為面之分也一面無厚薄之分非厚薄之幾何即不能為體之分也曰能度大者謂小幾何度大幾何能盡大之分者也如甲為乙為丙之分則甲為乙三分之一為丙六分之一無贏不足也若戊為丁之一即贏為二即不足己為丁之三即贏為四即不足是小不盡大則丁不能為戊己之分也以數明之若四于八于十二于十六于二十諸數皆能盡分無贏不足也若四于六于七于九于十于十八于三十八諸數或贏或不足皆不能盡分者也本書所論皆指能盡分者故稱為分若不盡分者當稱幾分幾何之幾如四于六為三分六之二不得正名為分不稱小度大也不為大幾何內之小幾何也第二界若小幾何能度大者則大為小之幾倍如第一界圖甲與乙能度丙則丙為甲與乙之幾倍若丁戊不能盡己之分則己不為丁戊之幾倍第三界比例者兩幾何以幾何相比之理兩幾何者或兩數或兩線或兩面或兩體各以同類大小相比謂之比例若線與面或數與線相比此異類不為比例又若白線與黑線熱線與冷線相比雖同類不以幾何相比亦不為比例也比例之説在幾何為正用亦有借用者如時如音如聲如所如動如稱之屬皆以比例論之凡兩幾何相比以此幾何比他幾何則此幾何為前率所比之他幾何為後率如以六尺之線比三尺之線則六尺為前率三尺為後率也反用之以三尺之線比六尺之線則三尺為前率六尺為後率也比例為用甚廣故詳論之如左凡比例有二種有大合有小合以數可明者為大合如二十尺之線比十尺之線是也其非數可明者為小合如直角方形之兩邊與其對角線可以相比而非數可明者是也如上二種又有二名其大合線為有兩度之線如二十尺比八尺兩線為大合則二尺四尺皆可兩度之者是也如此之類凡數之比例皆大合也何者有數之屬或無他數可兩度者無有一數不可兩度者若七比九無他數可兩度之以一則可兩度之也其小合線為無兩度之線如直角方形之兩邊與其對角線為小合即分至萬分以及無數終無小線可以盡分能度兩率者是也此論詳見十卷末題小合之比例至十卷詳之本篇所論皆大合也凡大合有兩種有等者如二十比二十十尺之線比十尺之線是也有不等者如二十比十八比四十六尺之線比二尺之線是也如上等者為相同之比例其不等者又有兩種有以大不等如二十比十是也有以小不等如十比二十是也大合比例之以大不等者又有五種一為幾倍大二為等帶一分三為等帶幾分四為幾倍大帶一分五為幾倍大帶幾分一為幾倍大者謂大幾何內有小幾何或二或三或十或八也如二十與四是二十內為四者五如三十尺之線與五尺之線是三十尺內為五尺者六則二十與四名為五倍大之比例也三十尺與五尺名為六倍大之比例也倣此為名可至無窮也二為等帶一分者謂大幾何內既有小之一别帶一分此一分或元一之半或三分之一四分之一以至無窮者是也如三與二是三內既有二别帶一一為二之半如十二尺與九尺之線是十二內既有九别帶三三為九三分之一則三與二名為等帶半也十二尺與九尺名為等帶三分之一也三為等帶幾分者謂大幾何內既有小之一别帶幾分而此幾分不能合為一盡分者是也如八與五是八內既有五别帶三一每一各為五之分而三一不能合而為五之分也他如十與八其十內既有八别帶二一雖每一各為八之分與前例相似而二一却能為八四分之一是為帶一分屬在第二不屬三也則八與五名為等帶三分也又如二十二與十六即名為等帶六分也四為幾倍大帶一分者謂大幾何內既有小幾何之二之三之四等别帶一分此一分或元一之半或三分四分之一以至無窮者是也如九與四是九內既有二四别帶一一為四之分之一則九與四名為二倍大帶四分之一也五為幾倍大帶幾分者謂大幾何內既有小幾何之二之三之四等别帶幾分而此幾分不能合為一盡分者是也如十一與三是十一內既有三三别帶二一每一各為三之分而二一不能合而為三之分也則十一與三名為三倍大帶二分也大合比例之以小不等者亦有五種俱與上以大不等五種相反為名一為反幾倍大二為反等帶一分三為反等帶幾分四為反幾倍大帶一分五為反幾倍大帶幾分凡比例諸種如前所設諸數俱有書法書法中有全數有分數全數者如一二三十百等是也分數者如分一以二以三以四等是也書全數依本數書之不必立法書分數必有兩數一為命分數一為得分數如分一以三而取其二則為三分之二即三為命分數二為得分數也分一為十九而取其七則為十九分之七即十九為命分數七為得分數也書以大小不等各五種之比例其一幾倍大以全數書之如二十與四為五倍大之比例即書五是也若四倍即書四六倍即書六也其反幾倍大即用分數書之而以大比例之數為命分之數以一為得分之數如大為五倍大之比例則此書五之一是也若四倍即書四之一六倍即書六之一也其二等帶一分之比例有兩數一全數一分數其全數恆為一其分數則以分率之數為命分數恆以一為得分數如三與二名為等帶半即書一别書二之一也其反等帶一分則全用分數而以大比例之命分數為此之得分數以大比例之命分數加一為此之命分數如大為等帶二之一即此書三之二也又如等帶八分之一反書之即書九之八也又如等帶一千分之一反書之即書一千一之一千也其三等帶幾分之比例亦有兩數一全數一分數其全數亦恆為一其分數亦以分率之數為命分數以所分之數為得分數如十與七名為等帶三分即書一别書七之三也其反等帶幾分亦全用分數而以大比例之命分數為此之得分數以大比例之命分數加大之得分數為此之命分數如大為等帶七之三命數七得數三七加三為十即書十之七也又如等帶二十之三反書之二十加三即書二十三之二十也其四幾倍大帶一分之比例則以幾倍大之數為全數以分率之數為命分數恆以一為得分數如二十二與七二十二內既有三七别帶一一為七分之一名為三倍大帶七分之一即以三為全數七為命分數一為得分數書三别書七之一也其反幾倍大帶一分則以大比例之命分數為此之得分數以大之命分數乘大之倍數加一為此之命分數如大為三帶七之一即以七乘三得二十一又加一為命分數書二十二之七也又加五帶九之一反書之九乘五得四十五加一為四十六即書四十六之九也其五幾倍大帶幾分之比例亦以幾倍大之數為全數以分率之數為命分數以所分之數為得分數如二十九與八二十九內既有三八别帶五一名為三倍大帶五分即以三為全數八為命分數五為得分數書三别書八之五也其反幾倍大帶幾分則以大比例之命分數為此之得分數以大比例之命分數乘大之倍數加大之得分數為此之命分數如大為三帶八之五即以八乘三得二十四加五為二十九書二十九之八也又如四帶五之二即書二十二之五也以上大小十種足盡比例之凡不得加一減一第四界兩比例之理相似為同理之比例兩幾何相比謂之比例兩比例相比謂之同理之比例如甲與乙兩幾何之比例偕丙與丁兩幾何之比例其理相似為同理之比例又若戊與己兩幾何之比例偕己與庚兩幾何之比例其理相似亦同理之比例凡同理之比例有三種有數之比例有量法之比例有樂律之比例本篇所論皆量法之比例也量法比例又有二種一為連比例連比例者相續不斷其中率與前後兩率遞相為比例而中率既為前率之後又為後率之前如後圖戊與己比己又與庚比是也二為斷比例斷比例者居中兩率一取不再用如前圖甲自與乙比丙自與丁比是也第五界兩幾何倍其身而能相勝者為有比例之幾何上文言為比例之幾何必同類然同類中亦有無比例者故此界顯有比例之幾何也曰倍其身而能相勝者如三尺之線與八尺之線三尺之線三倍其身即大于八尺之線是為有比例之線也又如直角方形之一邊與其對角線雖非大合之比例可以數明而直角方形之一邊一倍之即大于對角線兩邊等三角形其兩邊并必大于一邊見一卷二十是亦有小合比例之線也又圜之徑四倍之即大于圜之界則圜之徑與界亦有小合比例之線也圜之界當三徑七分徑之一弱别見圜形書又曲線與直線亦有比例如以大小兩曲線相合為初月形别作一直角方形與之等六卷三十三一增題今附即曲直兩線相視有大有小亦有比例也又方形與圜雖自古至今學士無數不能為相等之形然兩形相視有大有小亦不可謂無比例也又直線角與曲線角亦有比例如上圖直角鈍角鋭角皆有與曲線角等者若第一圖甲乙丙直角在甲乙乙丙兩直線內而其間設有甲乙丁與丙乙戊兩圜分角等即于甲乙丁角加甲乙戊角則丁乙戊曲線角與甲乙丙直角等矣依顯壬庚癸曲線角與己庚辛鈍角等也又依顯卯丑辰曲線角與子丑寅鋭角各減同用之子丑丑辰內圜小分即兩角亦等也此五者皆疑無比例而實有比例者也他若有窮之線與無窮之線雖則同類實無比例何者有窮之線畢世倍之不能勝無窮之線故也又線與面面與體各自為類亦無比例何者畢世倍線不能及面畢世倍面不能及體故也又切圜角與直線鋭角亦無比例何者依三卷十六題所説畢世倍切邊角不能勝至小之鋭角故也此後諸篇中每有倍此幾何令至勝彼幾何者故備著其理以需後論也第六界四幾何若第一與二偕第三與四為同理之比例則第一第三之幾倍偕第二第四之幾倍其相視或等或俱為大俱為小恆如是兩幾何曷顯其能為比例乎上第五界所説是也兩比例曷顯其能為同理之比例乎此所説是也其術通大合小合皆以加倍法求之如一甲二乙三丙四丁四幾何于一甲三丙任加幾倍為戊為己戊倍甲己倍丙其數自相等次于二乙四丁任加幾倍為庚為辛庚倍乙辛倍丁其數自相等而戊與己偕庚與辛相視或等或俱大或俱小如是等大小纍試之恆如是即知一甲與二乙偕三丙與四丁為同理之比例也如初試之甲幾倍之戊小于乙幾倍之庚而丙幾倍之己亦小于丁幾倍之辛又試之倍甲之戊與倍乙之庚等而倍丙之己亦與倍丁之辛等三試之倍甲之戊大于倍乙之庚而倍丙之己亦大于倍丁之辛此之謂或相等或雖不等而俱為大俱為小若纍合一差即元設四幾何不得為同理之比例如下第八界所指是也下文所論若言四幾何為同理之比例即當推顯第一第三之幾倍與第二第四之幾倍或等或俱大俱小若許其四幾何為同理之比例亦如之以數明之如有四幾何第一為三第二為二第三為六第四為四今以第一之三第三之六同加四倍為十二為二十四次以第二之二第四之四同加七倍為十四為二十八其倍第一之十二既小于倍第二之十四而倍第三之二十四亦小于倍第四之二十八也又以第一之三第三之六同加六倍為十八為三十六次以第二之二第四之四同加九倍為十八為三十六其倍第一之十八既等于倍第二之十八而倍第三之三十六亦等于倍第四之三十六也又以第一之三第三之六同加三倍為九為十八次以第二之二第四之四同加二倍為四為八其倍第一之九既大于倍第二之四而倍第三之十八亦大于倍第四之八也若爾或俱大俱小或等纍試之皆合則三與二偕六與四得為同理之比例也以上論四幾何者斷比例之法也其連比例法倣此但連比例之中率兩用之既為第二又為第三視此異耳第七界同理比例之幾何為相稱之幾何甲與乙若丙與丁是四幾何為同理之比例即四幾何為相稱之幾何又戊與己若己與庚即三幾何亦相稱之幾何第八界四幾何若第一之幾倍大于第二之幾倍而第三之幾倍不大于第四之幾倍則第一與二之比例大于第三與四之比例此反上第六界而釋不同理之兩比例其相視曷顯為大曷顯為小也謂第一第三之幾倍與第二第四之幾倍依上纍試之其間有第一之幾倍大于第二之幾倍而第三之幾倍乃或等或小于第四之幾倍即第一與二之比例大于第三與四之比例也如上圖甲一乙二丙三丁四甲與丙各三倍為戊己乙與丁各四倍為庚辛其甲三倍之戊大于乙四倍之庚而丙三倍之己乃小于丁四倍之辛即甲與乙之比例大于丙與丁也若第一之幾倍小于第二之幾倍而第三之幾倍乃或等或大于第四之幾倍即第一與二之比例小于第三與四之比例如是等大小相戾者但有其一不必再試以數明之中設三二四三四幾何先有第一之倍大于第二之倍而第三之倍亦大于第四之倍後復有第一之倍大于第二之倍而第三之倍乃或等或小于第四之倍即第一與二之比例大于第三與四也若以上圖之數反用之以第一為二第二為一第三為四第四為三則第一與二之比例小于第三與四第九界同理之比例至少必三率同理之比例必兩比例相比如甲與乙若丙與丁是四率斷比例也若連比例之戊與己若己與庚則中率己既為戊之後又為庚之前是以三率當四率也第十界三幾何為同理之連比例則第一與三為再加之比例四幾何為同例之連比例則第一與四為三加之比例倣此以至無窮甲乙丙丁戊五幾何為同理之連比例其甲與乙若乙與丙乙與丙若丙與丁丙與丁若丁與戊即一甲與三丙視一甲與二乙為再加之比例又一甲與四丁視一甲與二乙為三加之比例何者甲丁之中有乙丙兩幾何為同理之比例如甲與乙故也又一甲與五戊視一甲與二乙為四加之比例也若反用之以戊為首則一戊與三丙為再加與四乙為三加與五甲為四加也下第六卷二十題言此直角方形與彼直角方形為此形之一邊與彼形之一邊再加之比例何者若作三幾何為同理之連比例則此直角方形與彼直角方形若第一幾何與第三幾何故也以數明之如此直角方形之邊三尺而彼直角方形之邊一尺即此形邊與彼形邊若九與一也夫九與一之間有三為同理之比例則九三一三幾何之連比例既有三與一為比例又以九比三三比一為再加之比例也則彼直角方形當為此形九分之一不止為此形三分之一也大略第一與二之比例若線相比第一與三若平面相比第一與四若體相比也第一與五若算家三乘方與六若四乘方與七若五乘方倣此以至無窮第十一界同理之幾何前與前相當後與後相當上文己解同理之比例此又解同理之幾何者蓋一比例之兩幾何有前後而同理之兩比例四幾何有兩前兩後故特解言比例之論常以前與前相當後與後相當也如上甲與乙丙與丁兩比例同理則甲與丙相當乙與丁相當也戊己己庚兩比例同理則己既為前又為後兩相當也如下文有兩三角形之邊相比亦常以同理之兩邊相當不可混也上文第六第八界説幾何之幾倍常以一與三同倍二與四同倍則以第一第三為兩前第二第四為兩後各同理故第十二界有屬理更前與前更後與後此下説比例六理皆後論所需也四幾何甲與乙之比例若丙與丁今更推甲與丙若乙與丁為屬理下言屬理皆省曰更此論未證證見本卷十六此界之理可施于四率同類之比例若兩線兩面或兩面兩數等不為同類即不得相更也第十三界有反理取後為前取前為後甲與乙之比例若丙與丁今反推乙與甲若丁與丙為反理證見本篇四之系此界之理亦可施于異類之比例第十四界有合理合前與後為一而比其後甲乙與乙丙之比例若丁戊與戊己今合甲丙為一而比乙丙合丁己為一而比戊己即推甲丙與乙內若丁己與戊己是合兩前後率為兩一率而比兩後率也證見本卷十八第十五界有分理取前之較而比其後甲乙與丙乙之比例若丁戊與己戊今分推甲乙之較甲丙與丙乙若丁戊之較丁己與己戊證見本卷十七第十六界有轉理以前為前以前之較為後甲乙與丙乙之比例若丁戊與己戊今轉推甲乙與甲丙若丁戊與丁己證見本卷十九第十七界有平理彼此幾何各自三以上相為同理之連比例則此之第一與三若彼之第一與三又曰去其中取其首尾甲乙丙三幾何丁戊己三幾何等數相為同理之連比例者甲與乙若丁與戊乙與丙若戊與己也今平推首甲與尾丙若首丁與尾己平理之分又有二種如後二界第十八界有平理之序者此之前與後若彼之前與後而此之後與他率若彼之後與他率甲與乙若丁與戊而後乙與他率丙若後戊與他率己是序也今平推甲與丙若丁與己也此與十七界同重宣序義以别後界也證見本卷二十二第十九界有平理之錯者此數幾何彼數幾何此之前與後若彼之前與後而此之後與他率若彼之他率與其前甲乙丙數幾何丁戊己數幾何其甲與乙若戊與己又此之後乙與他率丙若彼之他率丁與前戊是錯也今平推甲與丙若丁與己也十八十九界推法于十七界中通論之故兩題中不再著也證見本卷二十三增一幾何有一幾何相與為比例即此幾何必有彼幾何相與為比例而兩比例等一幾何有一幾何相與為比例即必有彼幾何與此幾何為比例而兩比例等比例同理省曰比例等甲幾何與乙幾何為比例即此幾何丙亦必有彼幾何如丁相與為比例若甲與乙也丙幾何與丁幾何為比例即必有彼幾何如戊與此幾何丙為比例若丙與丁也此理推廣無礙于理有之不必舉其率也舉率之理備見後卷卷五西洋利瑪竇撰第一題此數幾何彼數幾何此之各率同幾倍于彼之各率則此之并率亦幾倍于彼之并率解曰如甲乙丙丁此二幾何大于戊己彼二幾何各若干倍題言甲乙丙丁并大于戊己并亦若干倍論曰如甲乙與丙丁既各三倍大于戊與己即以甲乙三分之各與戊等為甲庚庚辛辛乙又以丙丁三分之各與己等為丙壬壬癸癸丁即甲乙與丙丁所分之數等而甲庚既與戊等丙壬既與己等既于甲庚加丙壬于戊加己其甲庚丙壬并與戊己并必等依顯庚辛壬癸并辛乙癸丁并與戊己并各等夫甲乙與丙丁之分三合于戊己皆等本卷界説二則甲乙丙丁并三倍大于戊己并第二題六幾何其第一倍第二之數等于第三倍第四之數而第五倍第二之數等于第六倍第四之數則第一第五并倍第二之數等于第三第六并倍第四之數解曰一甲乙倍二丙之數如三丁戊倍四己之數又五乙庚倍二丙之數如六戊辛倍四己之數題言一甲乙五乙庚并倍二丙之數若三丁戊六戊辛并倍四己之數論曰甲乙丁戊之倍于丙己其數等則甲乙幾何內有丙幾何若干與丁戊幾何內有己幾何若干其數亦等本卷界説二依顯乙庚丙有丙若干與戊辛內有己若干亦等次于甲乙丁戊兩等數率每加一等數之乙庚戊辛率則甲庚丁辛兩幾何內之分數等而一五并之甲庚內有二丙若干與三六并之丁辛內有四己若干亦等注曰若第一第三兩幾何之數與第二第四兩幾何之數各等而第五倍第二之數等于第六倍第四之數或第一倍第二之數等于第三倍第四之數而第五第二兩幾何之數與第六第四兩幾何之數各等俱同本論如上二圖甲庚為第一第五之并率其倍二丙之數與丁辛為第三第六之并率其倍四己之數等也甲庚內有丙若干與丁辛內有己若干等故同理他若第一第三兩幾何之數第五第六兩幾何之數與第二第四兩幾何之數各等此理更明何者第一第五并之倍第二若第三第六并之倍第四俱兩倍故第三題四幾何其第一之倍于第二若第三之倍于第四次倍第一又倍第三其數等則第一所倍之與第二若第三所倍之與第四解曰一甲所倍于二乙若三丙所倍于四丁次作戊己兩幾何同若干倍于甲于丙題言以平理推戊倍乙之數若己倍丁論曰戊與己之倍甲與丙其數既等試以戊作若干分各與甲等為戊庚庚辛辛壬次分己亦如之為己癸癸子子丑即戊內有甲若干與己內有丙若干等本卷界説二夫戊庚與甲己癸與丙既等而甲之倍乙與本篇二丙之倍丁又等則戊庚倍乙若己癸倍丁也依顯庚辛辛壬各所倍于乙若癸子子丑各所倍于丁也夫一戊庚之倍二乙既若三己癸之倍四丁而五庚辛之倍二乙亦若六癸子之倍四丁則一戊庚五庚辛并之倍二乙若三己癸六癸子并之倍四丁也又一戊辛之倍二乙既若三己子之倍四丁而五辛壬之倍二乙亦若六子丑之倍四丁則一戊辛五辛壬并之倍二乙若三己子六子丑并之倍四丁也辛壬子丑以上任作多分皆倣此論第四題其系為反理四幾何其第一與二偕第三與四比例等第一第三同任為若干倍第二第四同任為若干倍則第一所倍與第二所倍第三所倍與第四所倍比例亦等解曰甲與乙偕丙與丁比例等次作戊與己同任若干倍于一甲三丙别作庚與辛同任若干倍于二乙四丁題言一甲所倍之戊與二乙所倍之庚偕三丙所倍之己與四丁所倍之辛比例亦等論曰試以戊己二幾何同任倍之為壬為癸别以庚本篇三辛同任倍之為子為丑其戊之倍甲既若己之倍丙而壬之倍戊亦若癸之倍己即壬之倍甲亦若癸之倍丙也依顯子之倍乙亦若丑之倍丁也夫甲本卷界説與乙偕丙與丁之比例既等而壬癸所倍于甲丙子丑所倍于乙丁各等即三試之若倍甲之壬小于倍乙之子則倍丙之癸亦小于倍丁之丑矣若壬子等即癸丑亦等矣若壬大于子即癸亦大于丑矣六夫戊己之倍為壬癸也庚辛之倍為子丑也不論幾許倍其等大小三試之恆如是也則一戊所倍之壬與二庚所倍之子偕三己所倍之癸與四辛所倍之丑等大小皆同類也而戊與庚偕己與辛之比例必等本卷界説六一系凡四幾何第一與二偕第三與四比例等即可反推第二與一偕第四與三比例亦等何者如上倍甲之壬與倍乙之子偕倍丙之癸與倍丁之丑等大小俱同類而顯甲與乙若丙與丁即可反説倍乙之子與倍甲之壬偕倍丁之丑與倍丙之癸等大小俱同類而乙與甲亦若丁與丙本卷界説六二系别有一論亦本書中所恆用也曰若甲與乙偕兩與丁比例等則甲之或二或三倍與乙之或二或三倍偕丙之或二或三倍與丁之或二或三倍比例俱等倣此以至無窮第五題大小兩幾何此全所倍于彼全若此全截取之分所倍于彼全截取之分則此全之分餘所倍于彼全之分餘亦如之解曰甲乙大幾何丙丁小幾何甲乙所倍于丙丁若甲乙之截分甲戊所倍于丙丁之截分丙己題言甲戊之分餘戊乙所倍于丙巳之分餘巳丁亦如其數論曰試作一他幾何為庚丙今戊巳之倍庚丙若甲戊之倍丙巳也本卷界説增甲戊戊乙之倍丙巳庚丙其甲數等即其兩并甲乙之倍庚巳亦若戊之倍丙巳本篇一也而甲乙之倍丙丁元若甲戊之倍丙己則丙丁與庚己等也次每減同用之丙巳即庚丙與巳丁亦等而戊乙之倍巳丁亦若戊乙之倍庚丙矣夫戊乙之倍庚丙既若甲戊之倍丙己則戊乙為甲戊之分餘所倍于巳丁為丙巳之分餘者亦若甲乙之倍丙丁也又論曰試作一他幾何為庚甲令庚甲之倍己丁若甲戊之倍丙巳本説界説二十即其兩并庚戊之本篇一倍丙丁亦若甲戊之倍丙巳也而甲乙之倍丙丁元若甲戊之倍丙巳是庚戊與甲乙等矣次每減同用之甲戊即庚甲與戊乙等也而庚甲之倍己丁若甲乙之倍丙丁也則戊乙之倍巳丁亦若甲乙之倍丙丁也第六題此兩幾何各倍于彼兩幾何其數等于此兩幾何每減一分其一分之各倍于所當彼幾何其數等則其分餘或各與彼幾何等或尚各倍于彼幾何其數亦等解曰甲乙丙丁兩幾何各倍于戊巳兩幾何其數等每減一甲庚丙辛甲庚丙辛之倍戊巳其數等題言分餘庚乙辛丁或與戊巳等或尚各倍于戊巳其數亦等論曰甲乙全與其分甲庚既各多倍于戊則分餘庚本篇二乙與戊其或等或尚幾倍必矣何者庚乙與戊不等不幾倍其加于甲庚不成為戊之多倍也然則庚乙與戊等曷為辛丁與巳亦等試作壬丙與己等其一甲庚之倍二戊既若三丙辛之倍四己而五庚乙之等二戊又若六壬丙之等四巳則第一第五并之甲乙所倍于二戊若第三第六并之壬辛所倍于四巳也而甲乙之倍戊元若丙丁之倍己即壬辛與丙丁亦等次每減同用之丙辛本篇即壬丙與辛丁必等是辛丁與己亦等矣然則庚乙之倍戊曷為與辛丁之倍己等試作壬丙其倍己若庚乙之倍戊依前論甲乙之倍戊若壬辛之倍己二而壬辛與丙丁等壬丙與辛丁亦等是辛丁之倍己亦若庚乙之倍戊矣第七題二支此兩幾何等則與彼幾何各為比例必等而彼幾何與此相等之兩幾何各為比例亦等解曰甲乙兩幾何等彼幾何丙不論等大小于甲乙題言甲與丙偕乙與丙各為比例必等又反上言丙與甲偕丙與乙各為比例亦等論曰試作丁戊兩率任同若干倍于甲乙即丁與戊等别作己任若干倍于丙其丁戊既等即丁視己與戊視己或等或大或小必同類矣夫一甲三乙所倍之丁戊偕本卷界説當二又當四之丙所倍之己其等大小既同類六則一甲與二丙之比例若三乙與四丙矣反説之當一當三之丙所倍之己偕二甲四乙所倍之丁戊其等大小既同類則一丙與二甲之比例若三丙與四乙矣後論與本篇第四題之系同用反理如甲與丙若乙與丙反推之丙與甲亦若丙與乙也第八題大小兩幾何各與他幾何為比例則大與他之比例大于小與他之比例而他與小之比例大于他與大之比例解曰不等兩幾何甲乙大丙小又有他幾何丁不論等大小于甲乙于丙題言甲乙與丁之比例大于丙與丁之比例又反上言丁與丙之比例大于丁與甲乙之比例論曰試于大幾何甲乙內分甲戊與小幾何丙等而本篇戊乙為分餘次以甲戊戊乙作同若干倍之辛庚庚己而庚己為戊乙之倍必令大于丁辛庚為甲戊之倍必令大于丁或等于丁若不足以倍加之也其庚己辛庚之倍于戊乙甲戊既等即辛己之倍甲乙若辛庚之倍甲戊矣一甲戊即丙也次作一壬癸為丁之倍令或大或等僅大于辛庚兩倍不足三之又不足任加之己大勿倍也次于壬癸截取子癸與丁等即壬子必不大于辛庚何者向作壬癸為丁之倍元令僅大于辛庚若壬子大于辛庚者何必又倍之為壬癸也故僅大之壬癸截去子癸者必不大于辛庚也則壬子或等或小于辛庚矣夫庚己既大于丁而子癸與丁等即庚己必大于子癸又辛庚不小于壬子即辛己亦大于壬癸也夫辛己辛庚同若干倍于第一甲乙第三丙也而壬癸之倍于當二之丁當四之丁又同一率也則第一所倍之辛己大于第二所倍之壬癸而第三所倍之辛庚不大于第四所倍之壬癸辛庚元小于壬癸是一甲乙與二丁之比例大于三丙與四丁矣本卷界説八次反上説一丁所倍之壬癸反説則丁當一當三丙二甲乙四大于二丙所倍之辛庚而三丁所倍之壬癸不大于四甲乙所倍之辛己壬癸必小于辛己是一丁與二丙之比例大于三丁與四甲乙矣本卷界説八第九題二支兩幾何與一幾何各為比例而等則兩幾何必等一幾何與兩幾何各為比例而等則兩幾何亦等先解曰甲乙兩幾何各與丙為比例等題言甲與乙等論曰如云不然而甲大于乙即甲與丙之比例本篇八宜大于乙與丙何先設兩比例等也故比例等則甲與乙等後解曰丙幾何與甲與乙各為比例等題言甲與乙等論曰如云不然而甲大于乙即丙與乙之比例宜大本篇八于丙與甲何先設兩比例等也第十題二支彼此兩幾何此幾何與他幾何之比例大于彼與他之比例則此幾何大于彼他幾何與彼幾何之比例大于他與此之比例則彼幾何小于此先解曰甲乙兩幾何復有丙幾何甲與丙之比例大于乙與丙題言甲大于乙論曰如云不然甲與乙等即所為兩比例宜等本篇七何先設甲與丙大也又不然甲小于乙即乙與本篇八丙之比例宜大于甲與丙何先設甲與丙大也後解曰丙與乙之比例大于丙與甲題言乙小于甲論曰如云不然乙與甲等即所為兩比例宜等本篇七何先設丙與乙大也又不然乙大于甲即丙與甲之比例宜大于丙與乙何先設丙與乙大也第十一題此兩幾何之比例與他兩幾何之比例等而彼兩幾何之比例與他兩幾何之比例亦等則彼兩幾何之比例與此兩幾何之比例亦等解曰甲乙偕丙丁之比例各與戊己之比例等題言甲乙與丙丁之比例亦等論曰試于各前率之甲丙戊同任倍之為庚辛壬别于各後率之乙丁己同任倍之為癸子丑其一甲與二乙之比例既若三戊與四己即三試之若倍一甲之庚小于倍二乙之癸即倍三戊之壬亦小于倍四己之丑矣若庚癸等即壬丑亦等若庚大于癸即壬亦大于丑矣本卷界説六依顯壬之視丑若辛之視子其等大小亦同類矣此三前三後率任作幾許倍其等大小皆同類也本卷界説六則甲與乙之比例若丙與丁也第十二題數幾何所為比例皆等則并前率與并後率之比例若各前率與各後率之比例解曰甲乙丙丁戊己數幾何所為比例皆等者甲與乙若丙與丁丙與丁若戊與己也題言甲丙戊諸前率并與乙丁己諸後率并之比例若甲與乙丙與丁戊與己各前各後之比例也論曰試于各前率之甲丙戊同任倍之為庚辛壬别于各後率之乙丁己同任倍之為癸子丑即庚辛壬并之倍甲丙戊并若庚之倍甲也癸子丑并之倍乙丁己并若癸之倍乙也本篇一夫一甲與二乙既若三丙與四丁又若三戊與四己則庚之倍一甲與癸之倍二乙或等或大或小偕辛壬之倍三丙戊與子五之倍四丁己等大小同類也又各前所倍庚辛壬并與各後所倍癸子丑并其或等或大或小亦偕各前所自倍與各後所自倍其等大小必同類也本卷界説六則一甲與二乙之比例若三甲丙戊并與四乙丁己并矣第十三題數幾何第一與二之比例若第三與四之比例而第三與四之比例大于第五與六之比例則第一與二之比例亦大于第五與六之比例解曰一甲與二乙之比例若三丙與四丁而三丙與四丁之比例大于五戊與六己題言甲與乙之比例亦大于戊與己論曰試以甲丙戊各前率同任倍之為庚辛壬别以乙丁己各後率同任倍之為癸子丑其甲與乙既若丙與丁即三試之若倍甲之庚大于倍乙之癸即倍丙之辛必大于倍丁之子矣若庚癸等即辛子亦等若庚小于癸即辛亦小于子矣本卷界説六次丙與丁既大于戊與己又三試之即倍丙之辛大于倍丁之子而倍戊之壬不必大于倍己之丑也或等或小矣本卷界説八夫庚癸與辛子等大小同類則壬丑不類于辛子者亦不類于庚癸也故甲與乙之比例亦大于戊與己本卷界説八注曰若三丙與四丁之比例或小或等于五戊六己則一甲與二乙之比例亦小亦等于五戊六己依此論推顯第十四題四幾何第一與二之比例若第三與四之比例而第一幾何大于第三則第二幾何亦大于第四第一或等或小于第三則第二亦等亦小于第四解曰甲與乙之比例若丙與丁題言甲大于丙則乙亦大于丁若等亦等若小亦小先論曰如甲大于丙即甲與乙之比例大本篇八于丙與乙矣夫一丙與二丁之比例既若三甲本篇十三與四乙而三甲與四乙之比例大于五丙與六乙即一丙與二丁之比例亦大于五丙與六乙是丁幾何小于乙也本篇十一次論曰如甲丙等即甲與乙之比例若丙與乙本篇七夫甲與乙之比例元若丙與丁本篇而又若丙與乙是丙與丁之比例亦若丙與乙也十一則乙與丁等也本篇九後論曰如甲小于丙即丙與乙之比例大于甲與乙本篇八矣夫一丙與二丁之比例既若三甲與四乙而三甲與四乙之比例小于五丙與六乙即一丙與二丁之比例亦小于五丙與六乙本篇十三也是乙小于丁也本篇十第十五題兩分之比例與兩多分并之比例等解曰甲與乙同任倍之為丙丁為戊己題言丙丁與戊己之比例若甲與乙論曰丙丁之倍甲既若戊己之倍乙即丙丁內有甲若干與戊己內有乙若干等次分丙丁為丙庚庚辛辛丁各與甲分等分戊己為戊壬壬癸癸己各與乙分等即丙庚與戊壬若甲與乙也丙庚與甲等戊壬與乙等故見本篇七庚辛與壬癸辛丁與癸己皆若甲與乙也本篇十一則等甲之丙庚與等乙之戊本篇十二壬定若丙丁全與戊己全而丙丁全與戊己全若甲與乙矣第十六題更理四幾何為兩比例等即更推前與前後與後為比例亦等解曰甲乙丙丁四幾何甲與乙之比例若丙與丁題言更推之甲與丙之比例亦若乙與丁論曰試以甲與乙之任倍之為戊為己别以丙與丁同任倍之為庚為辛即戊與己若甲與乙也本篇十五庚與辛若丙與丁也夫本篇十一甲與乙若丙與丁而戊與己亦若甲與乙即戊與己亦若丙與丁矣依顯庚與辛若丙與丁即戊與己亦若庚與辛也次三試之若戊大于庚則己亦大本篇十四于辛也若等亦等若小亦小任作幾許倍恆如是也則倍一甲之戊倍三乙之己與倍二丙之庚倍四丁之辛其等大小必同類也而甲與丙若乙與丁矣第十七題分理相合之兩幾何為比例等則分之為比例亦等解曰相合之兩幾何其一為甲乙丁乙其一為丙戊己戊比例等者甲乙與丁乙若丙戊與己戊也題言分之為比例亦等者甲丁與丁乙若丙己與己戊也論曰試以甲丁丁乙丙己己戊同任倍之為庚辛辛壬為癸子子丑即庚壬之倍甲本篇一乙若庚辛之倍甲丁也亦若癸子之倍丙己也本篇二夫癸子之倍丙己亦若癸丑之倍丙戊即庚壬之倍甲乙亦若癸丑之倍丙戊也次别以丁乙己戊同任倍之為壬寅為丑卯其一辛壬之倍二丁乙既若三子丑之倍四己戊而五壬寅之倍二丁乙亦若六丑卯之倍四己戊即辛寅之倍丁乙亦若子卯之倍己戊也夫一甲乙與二丁乙之比例既若三丙戊與四己戊而一與三二與四各所倍等即三試之若一甲乙所倍之庚壬大于二丁乙所倍之辛寅即三丙戊所倍之癸丑亦大于四己戊所倍之子卯也若等亦等若小亦小也本卷界説六如庚壬小于辛寅而癸丑小于子卯者即每減一同用之辛壬子丑其所存庚辛亦小于壬寅而癸子亦小于丑卯矣依顯庚壬等辛寅而癸丑等子卯者即庚辛等壬寅而癸子等丑卯矣庚壬大于辛寅而癸丑大于子卯者即庚辛大于壬寅而癸子大于丑卯矣夫庚辛為甲丁之倍癸子為丙己之倍壬寅為丁乙之倍丑卯為己戊之倍而甲丁丙己之所倍視丁乙己戊之所倍其等大小皆同類則甲丁與丁乙若丙己與己戊也本卷界説六第十八題合理兩幾何分之為比例等則合之為比例亦等解曰甲丁丁乙與丙己己戊兩分幾何其比例等者甲丁與丁乙若丙己與己戊是也題言合之為比例亦等者甲乙與丁乙若丙戊與己戊也論曰如前論以甲丁丁乙丙己己戊同任倍之為庚辛辛壬為癸子子丑本篇二次别以丁乙己戊同任倍之為壬寅為丑卯即庚壬之倍本篇一甲乙若癸丑之倍丙戊也而辛寅之倍丁乙若本篇二子卯之倍乙戊也夫一甲丁與二丁乙既若三丙己與四己戊而一與三二與四各所倍等即三試之若一甲丁所倍之庚辛小於二丁乙所倍之壬寅即三丙己所倍之癸子亦小於四己戊所倍之丑卯也若等亦等若大亦大也本卷界説六如庚辛小於壬寅而癸子亦小於丑卯即每加一辛壬子丑其所并庚壬亦小於辛寅而癸丑亦小於子卯矣依顯庚辛等壬寅而癸子等丑卯即庚壬等辛寅而癸丑等子卯矣庚辛大於壬寅而癸子大於丑卯即庚壬大於辛寅而癸丑大於子卯矣夫一甲乙所倍之庚壬與二丁乙所倍之辛寅偕三丙戊所倍之癸丑與四己戊所倍之子卯其等大小皆同類則甲乙與丁乙若丙戊與己戊也本卷界説六第十九題其系為轉理兩幾何各截取一分其所截取之比例與兩全之比例等則分餘之比例與兩全之比例亦等解曰甲乙丙丁兩幾何其甲乙全與丙丁全之比例若截取之甲戊與丙己題言分餘戊乙與己丁之比例亦若甲乙與丙丁論曰甲乙與丙丁既若甲戊與丙己試更之甲乙與甲戊若丙丁與丙己也本篇十六次分之戊乙與甲戊若己丁與丙己也本篇十七又更之戊乙與己丁若甲戊與丙己也本篇十六夫甲戊與丙己元若甲乙與丙丁則戊乙與己丁亦若甲乙與丙本篇十六丁矣一系從此題可推界説第十六之轉理如上甲乙與戊乙若丙丁與己丁即轉推甲乙與甲戊若丙丁與丙己也何者甲乙與戊乙既若丙丁與己丁試更之甲乙與丙丁若截取之戊乙與己丁也即甲乙本題全與丙丁全又若分餘之甲戊與丙己矣又更之本篇十六則甲乙與甲戊若丙丁與丙己也此轉理也注曰凡更理可施於同類之比例不可施於異類若轉理不論同異類皆可用也依此系即轉理亦賴更理為用似亦不可施於異類矣今别作一論不賴更理以為轉理明轉理可施於異類也論曰甲乙與丙乙若丁戊與己戊即轉推甲乙與甲丙若丁戊與丁己何者甲乙與丙乙既若丁戊與己戊試分之甲丙與丙乙若丁己與本篇十七己戊也次反之丙乙與甲丙若己戊與丁己也本篇四次合之甲乙與甲丙若丁戊與丁己也本篇十八第二十題三支有三幾何又有三幾何相為連比例而第一幾何大於第三則第四亦大於第六第一或等或小於第三則第四亦等亦小於第六先解曰甲乙丙三幾何丁戊己三幾何其甲與乙之比例若丁與戊乙與丙之比例若戊與己而甲大於丙題言丁亦大於己論曰甲既大於丙即甲與乙之比例大於本篇八丙與乙矣而甲與乙之比例若丁與戊即丁與本篇十三戊之比例亦大於丙與乙矣又丙與乙之比例若己與戊乙與丙若戊與己反之則丙與乙若己與戊即丁與戊之比例本篇十大於己與戊矣是丁大於己也次解曰若甲丙等題言丁己亦等論曰甲丙既等即甲與乙之比例若丙與乙矣本篇七而甲與乙之比例若丁與戊即丁與戊之比例亦若丙與乙矣本篇十一又丙反理與乙之比例若己與戊即丁與戊之比例亦若己本篇九與戊矣是丁己等也後解曰若甲小於丙題言丁亦小於己論曰甲既小於丙即甲與乙之比例小於丙與乙矣本篇八而甲與乙之比例若丁與戊即丁與戊之比例亦小於丙與乙矣又反理丙與乙之比例若己與戊即丁與戊之比例小於本篇十己於戊矣是丁小於己也第二十一題三支有三幾何又有三幾何相為連比例而錯以平理推之若第一幾何大于第三則第四亦大于第六若第一或等或小于第三則第四亦等亦小于第六解曰甲乙丙三幾何丁戊己三幾何相為連比例不序不序者甲與乙若戊與己乙與丙若丁與戊也以平理推之若甲大于丙題言丁亦大于己論曰甲既大于丙即甲與乙之比例大于丙與乙本篇八而甲與乙若戊與己即戊與己之比例亦大于丙本篇四與乙也又乙與丙既若丁與戊反之即丙與乙亦若戊與丁也則戊與己大于戊與丁也是丁大于己也本篇二十次解曰若甲丙等題言丁己亦等論曰甲丙既等即甲與乙之比例若丙與本篇七乙而甲與乙若戊與己即丙與乙之本篇四比例亦若戊與己也又乙與丙既若丁與戊反之即丙與乙亦若戊與丁也則戊與己若戊與丁也本篇九是丁己等也後解曰若甲小于丙題言丁亦小于己論曰甲既小于丙即甲與乙之比例小于丙與乙本篇八而甲與乙若戊與己即戊與本篇四己之比例小于丙與乙也又乙與丙既若丁與戊反之即丙與乙若戊與丁則戊與己小于戊與丁本篇十也是丁小于己也第二十二題平理之序有若干幾何又有若干幾何其數等相為連比例則以平理推解曰有若干幾何甲乙丙又有若干幾何丁戊己而甲與乙之比例若丁與戊乙與丙之比例若戊與己題言以平理推之甲與丙之比例若丁與己論曰試以甲與丁同任倍之為庚為辛别以乙與戊本篇四同任倍之為壬為癸别以丙與己同任倍之為子為丑其一甲與二乙既若三丁與四戊即倍甲之庚與倍乙之壬若倍丁之辛與倍戊之癸也依顯一乙與本篇二十二丙既若三戊與四己即倍乙之壬與倍丙之子若倍戊之癸與倍己之丑也是庚壬子三幾何辛癸丑三幾何又相為連比例矣次三試之若庚大于子即辛必大于丑也若等亦等者小亦小也則倍一甲之庚倍三丁之辛與倍二丙之子倍四己之丑等大小皆同類也是甲與丙若丁與己也本卷界説六其幾何自三以上如更有丙與寅若己與卯亦依顯甲與寅若丁與卯也何者上既顯甲與丙若丁與己而今稱丙與寅若己與卯即以甲丙寅作三幾何以丁己卯作又三幾何相為連比例依上推論亦得甲與寅之比例若丁與卯也自四以上可至無窮依此推顯第二十三題平理之錯若干幾何又若干幾何相為連比例而錯亦以平理推解曰甲乙丙若干幾何丁戊己若干幾何相為連比例而錯者甲與乙若戊與己乙與丙若丁與戊也題言以平理推之甲與丙之比例亦若丁與己論曰試以甲乙丁同任倍之為庚辛壬别以丙戊己本篇十五同任倍之為癸子丑即甲與乙若所自倍之庚與辛而甲與乙既若戊與己本篇十一即庚與辛亦若戊與己本篇戊與己又若所自倍之子與丑即庚與辛亦若子與丑十一依顯一乙與二丙既若三丁與四戊即倍一乙之本篇四辛與倍二丙之癸若倍三丁之壬與倍四戊之子也是庚辛癸三幾何壬子丑三幾何又相為連比本篇草一例而錯矣次三試之若庚大于癸即壬亦大于丑若等亦等若小亦小則一甲三丁所倍之庚壬與二丙四己所倍之癸丑等大小皆同類也是一甲與二丙若三丁與四己本卷界説六如三以上既有甲與乙若己與卯乙與丙若戊與己又有丙與寅若丁與戊亦顯甲與寅若丁與卯何者依上論先顯甲與丙若戊與卯次丙與寅又若丁與戊即以甲丙寅作三幾何丁戊卯作又三幾何相為連比例而錯依上論亦得甲與寅若丁與卯四以上悉依此推顯第二十四題凡第一與二幾何之比例若第三與四幾何之比例而第五與二之比例若第六與四則第一第五并與二之比例若第三第六并與四解曰一甲乙與二丙之比例若三丁戊與四己而五乙庚與二丙若六戊辛與四己題言一甲乙五乙庚并與二丙若三丁戊六戊辛并與四己論曰乙庚與丙既若戊辛與己反之丙與乙庚若己與戊辛也本篇四又甲乙與丙既若丁戊與本篇草二己而丙與乙庚亦若己與戊辛平之甲乙與乙庚若丁戊與戊辛也又合之甲庚全與乙庚若丁辛本篇十八全與戊辛也夫甲庚與乙庚既若丁辛與戊辛本篇草二而乙庚與丙亦若戊辛與己平之甲庚與丙若丁辛與己矣注曰依本題論可推廣第六題之義作後增題第六題言幾倍後增題不止言倍其義稍廣矣增題此兩幾何與彼兩幾何比例等于此兩幾何每截取一分其截取兩幾何與彼兩幾何比例等則分餘兩幾何與彼兩幾何比例亦等解曰如上圖甲庚丁辛此兩幾何與丙己彼兩幾何比例等者甲庚與丙若丁辛與己也題言截取之甲乙與丙若丁戊與己則分餘之乙庚與丙亦若戊辛與己論曰甲乙與丙既若丁戊與己即反之丙與甲乙若己與丁戊也本篇四又甲庚與丙既若丁辛與己而丙與甲乙亦若己與丁戊即平之甲庚與甲乙若丁辛與丁戊也本篇草二又分之乙庚與甲乙若戊辛與丁戊也本篇十七夫乙庚與甲乙既若戊辛與丁戊而甲乙與丙若丁戊與己即平之若戊辛與己也本篇草三第二十五題四幾何為斷比例則最大與最小兩幾何并大于餘兩幾何并解曰甲乙與丙丁之比例若戊與己甲乙最大己最小題言甲乙己并大于丙丁戊并論曰試于甲乙截取甲庚與戊等于丙丁截取丙辛本篇與己等即甲庚與丙辛之比例若戊與己也亦若甲乙與丙丁也夫甲乙全與丙丁全既若截取之甲庚與丙辛即亦若分餘之庚乙與辛丁也十九而甲乙最大必大于丙丁即庚乙亦大于辛丁矣又甲庚與戊丙辛與己既等即于戊加丙辛于己加甲庚必等而又加不等之庚乙辛丁則甲乙己并豈不大于丙丁戊并第二十六題第一與二幾何之比例大于第三與四之比例反之則第二與一之比例小于第四與三之比例解曰一甲與二乙之比例大于三丙與四丁題言反之二乙與一甲之比例小于四丁與三丙論曰試作戊與乙之比例若丙與丁即甲與本篇十乙之比例大于戊與乙而甲幾何大于戊則乙本篇八與戊之比例大于乙與甲也反之則乙與戊之本篇四比例若丁與丙而乙與甲之比例小于丁與丙第二十七題第一與二之比例大于第三與四之比例更之則第一與三之比例亦大于第二與四之比例解曰一甲與二乙之比例大于三丙與四丁題言更之則一甲與三丙之比例亦大于二乙與四丁論曰試作戊與乙之比例若丙與丁即甲與乙本篇十之比例大于戊與乙而甲幾何大于戊則甲與本篇八丙之比例大于戊與丙也夫戊與乙之比例既本篇十六若丙與丁更之則戊與丙之比例亦若乙與丁而甲與丙之比例大于乙與丁矣第二十八題第一與二之比例大于第三與四之比例合之則第一第二并與二之比例亦大于第三第四并與四之比例解曰一甲乙與二乙丙之比例大于三丁戊與四戊己題言合之則甲丙與乙丙之比例亦大于丁己與戊己論曰試作庚乙與乙丙之比例若丁戊與戊本篇十己即甲乙與乙丙之比例大于庚乙與乙丙而甲乙幾何大于庚乙矣此二率者每加一乙丙即甲本篇八丙亦大于庚丙而甲丙與乙丙之比例大于庚丙與乙丙也夫庚乙與乙丙之比例既若丁戊與戊本篇十八己合之則庚丙與乙丙之比例亦若丁己與戊己也而甲丙與乙丙之比例大于丁己與戊己矣第二十九題第一合第二與二之比例大于第三合第四與四之比例分之則第一與二之比例亦大于第三與四之比例解曰甲丙與乙丙之比例大于丁己與戊己題言分之則甲乙與乙丙之比例亦大于丁戊與戊己論曰試作庚丙與乙丙之比例若丁己與戊本篇十己即甲丙與乙丙之比例亦大于庚丙與乙丙而甲丙幾何大于庚丙矣此二率者每減一同用之本篇八乙丙即甲乙亦大于庚乙而甲乙與乙丙之比例大于庚乙與乙丙也夫庚丙與乙丙之比例既若丁己與戊己分之則庚乙與乙丙之比例亦若丁戊與戊己也本篇十七而甲乙與乙丙之比例大于丁戊與戊己矣第三十題第一合第二與二之比例大于第三合第四與四之比例轉之則第一合第二與一之比例小于第三合第四與三之比例解曰甲丙與乙丙之比例大于丁己與戊己題言轉之則甲丙與甲乙之比例小于丁己與丁戊論曰甲丙與乙丙之比例既大于丁己與戊己分之即甲乙與乙丙之比例亦大于丁戊與戊己也本篇草九又反之乙丙與甲乙之比例小于戊本篇草六己與丁戊矣又合之甲丙與甲乙之比例亦小本篇草八于丁己與丁戊也第三十一題此三幾何彼三幾何此第一與二之比例大于彼第一與二之比例此第二與三之比例大于彼第二與三之比例如是序者以平理推則此第一與三之比例亦大于彼第一與三之比例解曰甲乙丙此三幾何丁戊己彼三幾何而甲與乙之比例大于丁與戊乙與丙之比例大于戊與己如是序者題言以平理推則甲與丙之比例亦大于丁與己論曰試作庚與丙之比例若戊與己即乙與丙之比例大于庚與丙而乙幾何大于本篇十庚是甲與小庚之比例大于甲與大本篇八乙矣夫甲與乙之比例元大于丁與戊即甲與本篇十庚之比例更大于丁與戊也次作辛與庚之比例若丁與戊即甲與庚之比例亦大于辛與庚而甲幾何大于辛是大甲與丙之比例大于小辛與丙矣本篇八夫辛與丙之比例以平理推之若丁與己也本篇草二則甲與丙之比例大于丁與己也第三十二題此三幾何彼三幾何此第一與二之比例大于彼第二與三之比例此第二與三之比例大于彼第一與二之比例如是錯者以平理推則此第一與三之比例亦大于彼第一與三之比例解曰甲乙丙此三幾何丁戊己彼三幾何而甲與乙之比例大于戊與己乙與丙之比例大于丁與戊如是錯者題言以平理推則甲與丙之比例亦大于丁與己論曰試作庚與丙之比例若丁與戊即乙與丙之比例大於庚與丙而乙幾何大于庚本篇十是甲與小庚之比例大于本篇八甲與大乙矣夫甲與乙之比例既大于戊與己本篇十即甲與庚之比例更大于戊與己也次作辛與庚之比例若戊與己即甲與庚之比例亦大于辛與庚而甲幾何大于辛是大甲與丙之比例大于小本篇八辛與丙矣夫辛與丙之比例以平理推之本篇草三若丁與己也則甲與丙之比例大于丁與己也第三十三題此全與彼全之比例大于此全截分與彼全截分之比例則此全分餘與彼全分餘之比例大于此全與彼全之比例解曰甲乙全與丙丁全之比例大于兩截分甲戊與丙己題言兩分餘戊乙與己丁之比例大于甲乙與丙丁論曰甲乙與丙丁之比例既大于甲戊與丙己更之即甲乙與甲戊之比例亦大于丙丁與丙己也本篇草七又轉之甲乙與戊乙之比例小于丙丁與己丁也本篇三十又更之甲乙與丙丁之比例小于戊乙與己丁也本篇草七戊乙與己丁分餘也則分餘之比例大于甲乙全與丙丁全矣依顯兩全之比例小于截分則分餘之比例小于兩全第三十四題三支若干幾何又有若干幾何其數等而此第一與彼第一之比例大于此第二與彼第二之比例此第二與彼第二之比例大于此第三與彼第三之比例以後俱如是則此并與彼并之比例大于此末與彼末之比例亦大于此并減第一與彼并減第一之比例而小于此第一與彼第一之比例解曰如甲乙丙三幾何又有丁戊己三幾何其甲與丁之比例大于乙與戊乙與戊之比例大于丙與己題先言甲乙丙并與丁戊己并之比例大于丙與己次言亦大於乙丙并與戊己并後言小于甲與丁論曰甲與丁之比例既大于乙與戊更之即甲與乙之比例大于丁與戊也本篇草七又合之甲乙并與乙之比例大于丁戊并與戊也本篇草八又更之甲乙并與丁戊并之比例大于乙與戊也本篇草七是甲乙全與丁戊全之比例大于減并乙與減本篇卅三并戊也既爾即減餘甲與減餘丁之比例大于甲乙全與丁戊全也依顯乙與戊之比例亦大于乙丙全與戊己全即甲與丁之比例更大于乙丙全與戊己全也又更之甲與乙丙并之比例大于丁與戊己并也本篇草七又合之甲乙丙全與乙丙并之比例大于丁戊己全本篇草八與戊己并也又更之甲乙丙全與丁戊己全之本篇草七比例大于乙丙并與戊己并也則得次解也又本篇卅三甲乙丙全與丁戊己全之比例既大于減并乙丙與減并戊己即減餘甲與減餘丁之比例大于甲乙丙全與丁戊己全也則得後解也又乙與戊之比本篇草七例既大于丙與己更之即乙與丙之比例大于戊與己也又合之乙丙全與丙之比例大于戊己全本篇草八與己也又更之乙丙并與戊己并之比例大于本篇草七丙與己也而甲乙丙并與丁戊己并之比例既本篇十八大于乙丙并與戊己并即更大于末丙與末己也則得先解也若兩率各有四幾何而丙與己之比例亦大于庚與辛即與前論同理蓋依上文論乙與戊之比例大于乙丙庚并與戊己辛并即甲與丁之比例更大于乙丙庚并與戊己辛并也更之即甲與乙丙庚并之比例大于丁與戊己辛并也又合之甲乙丙庚本篇草七全與乙丙庚并之比例大于丁戊己辛全與戊己辛并也又更之甲乙丙庚全與丁戊己辛全之比例大于乙丙庚并與戊己辛并也本篇則得次解也又甲乙丙庚全與丁戊己辛全之比例既大于減并乙丙庚與減并戊己辛即減餘甲與減餘丁之比例大于甲乙丙庚全與丁戊己辛全也卅三則得後解也又依前論顯乙丙庚并與戊己辛并之比例既大于庚與辛而甲乙丙庚全與丁戊己辛全之比例大于乙丙庚并與戊己辛并即更大于末庚與末辛也則得先解也自五以上至于無窮俱倣此論可顯全題之旨幾何原本卷五
