body:
  text: 卷一之首界説三十六則凡造論先當分別解説論中所用名目故曰界説凡厯法地理樂律算章技藝工巧諸事有度有數者皆依賴十府中幾何府屬凡論幾何先從一點始自點引之為線線展開為靣靣積為體是名三度第一界點者無分無長短廣狹厚薄如下圖凡圖十干為識干盡用十二支支盡用八卦八音第二界線有長無廣試如一平靣光照之有光無光之間不容一物是線也真平真圓相遇其相遇處止有一點行則止有一線線有直有曲第三界線之界是點凡線有界者兩界必是點第四界直線止有兩端兩端之間上下更無一點兩點之間至徑者直線也稍曲則繞而長矣直線之中點能遮兩界凡量遠近皆用直線甲乙丙是直線甲丁丙甲戊丙甲己丙皆是曲線第五界靣者止有長有廣一體所見為靣凡體之影極似於靣無厚之極想一線橫行所留之迹即成靣也第六界靣之界是線第七界平靣一靣平在界之內平靣中間線能遮兩界平靣者諸方皆作直線試如一方靣用一直線施於一角繞靣運轉轉不礙於空是平靣也若曲靣者則中間線不遮兩界第八界平角者兩條直線於平靣縱橫相遇交接處凡言甲乙丙角皆指平角如上甲乙乙丙二線平行相遇不能作角如上甲乙乙丙二線雖相遇不作平角為是曲線所謂角止是兩線相遇不以線之大小較論第九界直線相遇作角為直線角平地兩直線相遇為直線角本書中所論止是直線角但作角有三等今附著於此一直線角二曲線角三雜線角如下六圖第十界直線垂於橫直線之上若兩角等必兩成直角而直線下垂者謂之橫線之垂線量法常用兩直角及垂線垂線加於橫線之上必不作鋭及鈍角若甲乙線至丙丁上則乙之左右作兩角相等為直角而甲乙為垂線若甲乙為橫線則丙丁又為甲乙之垂線何者丙乙與甲乙相遇雖止一直角然甲線若垂下過乙則丙線上下定成兩直角所以丙乙亦為甲乙之垂線如今用短尺一緃一橫互相為直線互相為垂線凡直線上有兩角相連是相等者定俱直角中間線為垂線反用之若是直角則兩線定俱是垂線第十一界凡角大于直角為鈍角如甲乙丙角與甲乙丁角不等而甲乙丙大於甲乙丁則甲乙丙為鈍角第十二界凡角小於直角為鋭角如前圖甲乙丁是通上三界論之直角一而已鈍角鋭角其大小不等乃至無數是後凡指言角者俱用三字為識其第二字即所指角也如前圖甲乙丙三字第二乙字即所指鈍角若言甲乙丁即第二乙字是所指鋭角第十三界界者一物之終始今所論有三界點為線之界線為靣之界靣為體之界體不可為界第十四界或在一界或在多界之間為形一界之形如平圓立圓等物多界之形如平方立方及平立三角六八角等物圖見後卷第十五界圜者一形於平地居一界之間自界至中心作直線俱等若甲乙丙為圜丁為中心則自甲至丁與乙至丁丙至丁其線俱等外圓線為圜之界內形為圜一説圜是一形乃一線屈轉一周復於元處所作如上圖甲丁線轉至乙丁乙丁轉至丙丁丙丁又至甲丁復元處其中形即成圜第十六界圜之中處為圜心第十七界自圜之一界作一直線過中心至他界為圜徑徑分圜兩平分甲丁乙戊圜自甲至乙過丙心作一直線為圜徑第十八界徑線與半圜之界所作形為半圜第十九界在直線界中之形為直線形第二十界在三直線界中之形為三邊形第二十一界在四直線界中之形為四邊形第二十二界在多直線界中之形為多邊形五邊以上俱是第二十三界三邊形三邊線等為平邊三角形第二十四界三邊形有兩邊線等為兩邊等三角形或鋭或鈍第二十五界三邊形三邊線俱不等為三不等三角形第二十六界三邊形有一直角為三邊直角形第二十七界三邊形有一鈍角為三邊鈍角形第二十八界三邊形有三鋭角為三邊各鋭角形凡三邊形恆以在下者為底在上二邊為腰第二十九界四邊形四邊線等而角直為直角方形第三十界直角形其角俱是直角其邊兩兩相等如上甲乙丙丁形甲乙邊與丙丁邊自相等甲丙邊與乙丁自相等第三十一界斜方形四邊等俱非直角第三十二界長斜方形其邊兩兩相等俱非直角第三十三界以上方形四種謂之有法四邊形四種之外他方形皆謂之無法四邊形第三十四界兩直線於同靣行至無窮不相離亦不相遠而不得相遇為平行線第三十五界一形每兩邊有平行線為平行線方形第三十六界凡平行線方形若於兩對角作一直線其直線為對角線又於兩邊縱橫各作一平行線其兩平行線與對角線交羅相遇即此形分為四平行線方形其兩形有對角線者為角線方形其兩形無對角線者為餘方形甲乙丁丙方形於丙乙兩角作一線為對角線又依乙丁平行作戊己線依甲乙平行作庚辛線其對角線與戊己庚辛兩線交羅相遇於壬即作大小四平行線方形矣則庚壬己丙及戊壬辛乙兩方形謂之角線方形而甲庚壬戊及壬己丁辛謂之餘方形求作四則求作者不得言不可作第一求自此點至彼點求作一直線此求亦出上篇蓋自此點直行至彼點即是直線自甲至乙或至丙至丁俱可作直線第二求一有界直線求從彼界直行引長之如甲乙線從乙引至丙或引至丁俱一直行第三求不論大小以點為心求作一圜第四求設一度於此求作彼度較此度或大或小凡言度者或線或面或體皆是或言較小作大可作較大作小不可作何者小之至極數窮盡故也此説非是凡度與數不同數者可以長不可以短長數無窮短數有限如百數減半成五十減之又減至一而止一以下不可損矣自百以上增之可至無窮故曰可長不可短也度者可以長亦可以短長者增之可至無窮短者減之亦復無盡嘗見莊子稱一尺之捶取其半萬世不竭亦此理也何者自有而分不免為有若減之可盡是有化為無也有化為無猶可言也令已分者更復合之合之又合仍為尺捶是始合之初兩無能并為一有也兩無能并為一有不可言也公論十九則公論者不可疑第一論設有多度彼此俱與他等則彼與此自相等第二論有多度等若所加之度等則合并之度亦等第三論有多度等若所減之度等則所存之度亦等第四論有多度不等若所加之度等則合并之度不等第五論有多度不等若所減之度等則所存之度不等第六論有多度俱倍於此度則彼多度俱等第七論多多度俱半於此度則彼多度亦等第八論有二度自相合則二度必等以一度加一度之上第九論全大於其分如一尺大於一寸寸者全尺中十分中之一分也第十論直角俱相等見界説十第十一論有二橫直線或正或偏任加一縱線若三線之間同方兩角小於兩直角則此二橫直線愈長愈相近必至相遇甲乙丙丁二橫直線任意作一戊己縱線或正或偏若戊己線同方兩角俱小於直角或并之小於兩直角則甲乙丙丁線愈長愈相近必有相遇之處欲明此理宜察平行線不得相遇者界説卅四加一垂線即三線之間定為直角便知此論兩角小於直角者其行不得不相遇矣第十二論兩直線不能為有界之形第十三論兩直線止能於一點相遇如云線長界近相交不止一點試於丙乙二界各出直線交於丁假令其交不止一點當引至甲則甲丁乙宜為甲丙乙圜之徑而甲丁丙亦如之界説十七夫甲丁乙圜之右半也而甲丁丙亦右半也界説十七甲丁乙為全甲丁丙為其分而俱稱右半是全與其分等也本篇九第十四論有幾何度等若所加之度各不等則合并之差與所加之差等甲乙丙丁線等于甲乙加乙戊於丙丁加丁己則甲戊大於丙己者庚戊線也而乙戊大於丁己亦如之第十五論有幾何度不等若所加之度等則合并所之度與元所之度等如上圖反説之戊乙己丁線不等於戊乙加乙甲於己丁加丁丙則戊甲大於己丙者戊庚線也而戊乙大於己丁亦如之第十六論有幾何度等若所減之度不等則餘度所之度與減去所之度等甲乙丙丁線等於甲乙減戊乙於丙丁減己丁則乙戊大於丁己者庚戊也而丙己大於甲戊亦如之第十七論有幾何度不等若其減之度等則餘度所之度與元所之度等如十四論反説之甲戊丙己線不等於甲戊減甲乙於丙己減丙丁則乙戊長於丁己者亦庚戊也與甲戊長於丙己者等矣第十八論全與諸分之并等第十九論有二全度此全倍於彼全若此全所減之度倍於彼全所減之度則此較亦倍於彼較相減之餘曰較如此度二十彼度十於二十減六於十減三則此較十四彼較七卷一第一題于有界直線上求立平邊三角形法曰甲乙直線上求立平邊三角形先以甲為心乙為界做丙丁圜次以乙為心甲為界作丙甲丁圜兩圜相交于丙丁于丁末自甲至丙丙至乙各作直線即甲乙丙為平邊三角形論曰以甲為心至圜之界其甲乙線與甲丙甲丁線等以乙為心則乙甲線與乙丙乙丁線亦等何者凡為圜心自心至界各線俱等故界説十五既乙丙等于甲乙即甲丙亦等于乙丙公論一三遍等如所求凡論有二種此以是為論者正論也下倣此其用法不必作兩圜但以甲為心乙為界作近丙一短線乙為心甲為界亦如之丙短線交處即得乙諸三角形俱推前用法作之詳本篇廾二第二題一直線線或內或外有一點求以點為界作直線與元線等法曰有甲點及乙丙線求以甲為界作一線與乙丙等先以丙為心乙為界乙為心丙為界亦可作作丙乙圜第三求次觀甲點若在丙乙之外則自甲至丙作甲丙線第一求如上前圖或甲在丙乙之內則截取甲至丙一分線如上後圖兩法俱以甲丙線為底任于上下作甲丁丙平邊三角形本篇一次自三角形兩腰線引長之第二求其丁丙引至丙乙圜界而止為丙戊線其丁甲引之出丙乙圜外稍長為甲己線末以丁為心戊為界作丁戊圜其甲己線與丁戊圜相交于庚即甲庚線與乙丙線等論日丁戊丁庚線同以丁為心戊庚為界故等界説十五于丁戊線減丁丙丁庚線減丁甲其所減兩腰線等則所存亦等公論三夫丙戊與丙乙同以丙為心戊乙為界亦等界説十五即甲庚與丙乙等公論一若所設甲點即在丙乙線之一界其法尤易假如點在丙即以丙為心作乙戊圜從丙至戊即所求第三題兩直線一長一短求于長線減去短線之度法曰甲短線乙丙長線求于乙丙減甲先以甲為度從乙引至別界作乙丁線本篇二次以乙為心丁為界作圜第三求圜界與乙丙交于戊即乙戊與等甲之乙丁等蓋乙丁乙戊同心同圜故界説十五第四題兩三角形若相當之兩腰線各等各兩腰線間之角等則兩底線必等而兩形亦等其餘各兩角當當者俱等解曰甲乙丙丁戊己兩三角形之甲與丁兩角等甲丙與丁己兩線甲乙與丁戊兩線各等題言乙丙與戊己兩底線必等而兩三角形亦等甲乙丙與丁戊己兩角甲丙乙與丁己戊兩角俱等論曰如云乙丙與戊己不等即令將甲角置丁角之上兩角必相合無大小甲丙與丁己甲乙與丁戊亦必相合無大小公論八此二俱等而云乙丙與戊己不等必乙丙底或在戊己之上為庚或在其下為辛矣戊己既為直線而戊庚己又為直線則兩線當別作一形是兩線能相合為形也辛倣此公論十二此以非為論者駁論也下倣此第五題三角形若兩腰等則底線兩端之兩角等而兩腰引出之其底之外兩角亦等解曰甲乙丙三角形其甲丙與甲乙兩腰等題言甲丙乙與甲乙丙兩角等又自甲丙線任引至戊甲乙線任引至丁其乙丙戊與丙乙丁兩外角亦等論曰試如甲戊線稍長即從甲戊截取一分與甲丁等為甲己本篇三次自丙至丁乙至己各作直線第一求即甲己乙甲丁丙兩三角形必等何者此兩形之甲角同甲己與甲丁兩腰又等甲乙與甲丙兩腰又等則其底丙丁與乙己必等而底線兩端相當之各兩角亦等矣本篇四又乙丙己與丙乙丁兩三角形亦等何者此兩形之丙丁乙與乙己丙兩角既等本論而甲己甲丁兩腰各減相等之甲丙甲乙線即所存丙己乙丁兩腰又等公論三丙丁與乙己兩底又等本論又乙丙同腰即乙丙丁與丙乙己兩角亦等也則丙之外乙丙己角與乙之外丙乙丁角必等矣本篇四次觀甲乙己與甲丙丁兩角既等于甲乙己減丙乙己角甲丙丁減乙丙丁角則所存甲丙乙與甲乙丙兩角必等公論三增從前形知三邊等形其三角俱等第六題三角形若底線兩端之兩角等則兩腰亦等解曰甲乙丙三角形其甲乙丙與甲丙乙兩角等題言甲乙與甲丙兩腰亦等論曰如云兩腰線不等而一長一短試辨之若甲乙為長線即令比甲丙線截去所長之度為乙丁線而乙丁與甲丙等本篇三次自丁至丙作直線則本形成兩三角形其一為甲乙丙其一為丁乙丙而甲乙丙全形與丁乙丙分形同也是全與其分等也公論九何者彼言丁乙丙分形之乙丁與甲乙丙全形之甲丙兩線既等丁乙丙分形之乙丙與甲乙丙全形之乙丙又同線而元設丁乙丙與甲丙乙兩角等則丁乙丙與甲乙丙兩形亦等也本篇四是全與其分等也故底線兩端之兩角等者兩腰必等也第七題一線為底出兩腰線其相遇止有一點不得别有腰線與元腰線等而于此點外相遇解曰甲乙線為底于甲于乙各出一線至丙點相遇題言此為一定之處不得于甲上更出一線與甲丙等乙上更出一線與乙丙等而不于丙相遇論曰若言有别相遇于丁者即問丁當在丙內邪丙外邪若言丁在丙內則有二説俱不可通何者若言丁在甲丙元線之內則如第一圖丁在甲丙兩界之間矣如此即甲丁是甲丙之分而云甲丙與甲丁等也是全與其分等也公論九若言丁在甲丙乙三角頂間則如第二圖丁在甲丙乙之間矣即令自丙至丁作丙丁線而乙丁丙甲丁丙又成兩三角形次從乙丁引出至己從乙丙引出至戊則乙丁丙形之乙丁乙丙兩腰等者其底線兩端之兩角乙丁丙乙丙丁宜亦等也其底之外兩角己丁丙戊丙丁宜亦等也本篇五而甲丁丙形之甲丁甲丙兩腰等者其底線兩端之兩角甲丙丁甲丁丙宜亦等也本篇五夫甲丙丁角本小于戊丙丁角而為其分今言甲丁丙與甲丙丁兩角等則甲丁丙亦小于戊丙丁矣何況己丁丙又甲丁丙之分更小于戊丙丁可知何言底外兩角等乎若言丁在丙外又有三説俱不可通何者若言丁在甲丙元線外是丁甲即在丙甲元線之上則甲丙與甲丁等矣即如上第一説駁之若言丁在甲丙乙三角頂外即如上第二説駁之若言丁在丙外而後出二線一在三角形內一在其外甲丁線與乙丙線相交如第五圖即令將丙丁相聯作直線是甲丁丙又成一三角形而甲丙丁宜與甲丁丙兩角等也本篇五夫甲丁丙角本小于丙丁乙角而為其分據如彼論則甲丙丁角亦小于丙丁乙角矣又丙丁乙亦成一三角形而丙丁乙宜與丁丙乙兩角等也本篇五夫丁丙乙角本小于甲丙丁角而為其分據如彼論則丙丁乙角亦小于甲丙丁角矣此二説者豈不自相戾乎第八題兩三角形若相當之兩腰各等兩底亦等則兩腰間角必等解曰甲乙丙丁戊己兩三角形其甲乙與丁戊兩腰甲丙與丁己兩腰各等乙丙與戊己兩底亦等題言甲與丁兩角必等論曰試以丁戊己形加于甲乙丙形之上問丁角在甲角上邪否邪若在上即兩角等矣公論八或謂不然乃在于庚即問庚當在丁戊線之內邪或在三角頂之內邪或在三角頂之外邪皆依前論駁之本篇七系本題止論甲丁角若旋轉依法論之即三角皆同可見凡線等則角必等不可疑也第九題有直線角求兩平分之法曰乙甲丙角求兩平分之先于甲乙線任截一分為本篇三甲丁次于甲丙亦截甲戊與甲丁等次自丁至戊作直線次以丁戊為底立平邊三角形本篇一為丁戊己形末自己至甲作直線即乙甲丙角為兩平分論曰丁甲己與戊甲己兩三角形之甲丁與甲戊兩線等甲己同是一線戊己與丁己兩底又等何言初從戊丁底作此三角平形此二線為腰各等戊丁故則丁甲己與戊甲己兩角必等本篇八用法如上截取甲丁甲戊即以丁為心向乙丙間任作一短界線次用元度以戊為心亦如之兩界線交處得己本篇一第十題一有界線求兩平分之法曰甲乙線求兩平分先以甲乙為底作甲乙丙兩邊等三角形本篇一次以甲丙乙角兩平分之本篇九得丙丁直線即分甲乙于丁論曰丙丁乙丙丁甲兩三角形之丙乙丙甲兩腰等而丙丁同線甲丙丁與乙丙丁兩角又等本篇九則甲丁與乙丁兩線必等本篇四用法以甲為心任用一度但須長于甲乙線之半向上向下各作一短界線次用元度以乙為心亦如之兩界線交處即丙丁末作丙丁直線即分甲乙于戊第十一題一直線任于一點上求作垂線法曰甲乙直線任指一點于丙求丙上作垂線先于丙左右任用一度各截一界為丁為戊本篇二次以丁戊為底作兩邊等角形本篇一為丁己戊末自己至丙作直線即己丙為甲乙之垂線論曰丁己丙與戊己丙兩角形之己丁己戊兩腰等而己丙同線丙丁與丙戊兩底又等即兩形必等丁與戊兩角亦等本篇五丁己丙與戊己丙兩角亦等本篇八九則丁丙己與戊丙己兩角必等矣等即是直角直角即是垂線界説十角此後三角形多稱形省文也用法于丙點左右如上截取丁與戊即以丁為心任用一度但須長于丙丁線向丙上方作短界線次用元度以戊為心亦如之兩界線交處即己又用法于丙左右如上截取丁與戊即任用一度以丁為心于丙上下方各作短界線次用元度以戊為心亦如之則上交為己下交為庚末作己庚直線視直線交于丙點即得是用法又為嘗巧之法增若甲乙線所欲立垂線之點乃在線末甲界上甲外無餘線可截則于甲乙線上任取一點為丙如前法于丙上立丁丙垂線次以甲丙丁角兩平分之本篇九為己丙線次以甲丙為度于丁丙垂線上截戊丙線本篇三次于戊上如前法立垂線與己丙線相遇為庚末自庚至甲作直線如所求論曰庚甲丙與庚丙戊兩角形之甲丙戊丙兩線既等庚丙同線戊丙庚與甲丙庚兩角又等即甲庚戊庚兩線必等本篇四而對同邊之甲角戊角亦等本篇四戊既直角則甲亦直角是甲庚為甲乙之垂線界説十用法甲點上欲立垂線先以甲為心向元線上方任抵一界作丙點次用元度以丙為心作大半圜圜界與甲乙線相遇為丁次自丁至丙作直線引長之至戊為戊丁線戊丁與圜界相遇為己末自己至甲作直線即所求此法今未能論論見第三十一題第十二題有無界直線線外有一點求于點上作垂線至直線上法曰甲乙線外有丙點求從丙作垂線至甲乙先以丙為心作一圜令兩交于甲乙線為丁為戊次從丁戊各作直線至丙次兩平分丁戊于己本篇十末自丙至己作直線即丙己為甲乙之垂線論曰丙己丁丙己戊兩角形之丙丁丙戊兩線等丙己同線則丙戊己與丙丁己兩角必等本篇八而丁丙己與戊丙己兩角又等則丙己丁與丙己戊等皆直角本篇四而丙己定為垂線矣用法以丙為心向直線兩處各作短界線為甲為乙次用元度以甲為心向丙點相望處作短界線乙為心亦如之兩界線交處為丁末自丙至丁作直線則丙戊為垂線又用法于甲乙線上近甲近乙任取一點為心以丙為界作一圜界于丙點及相望處各稍引長之次于甲乙線上視前心或相望如前圖或進或退如後圖任移一點為心以丙為界作一圜界至與前圜交處得丁末自丙至丁作直線得戊若近界作垂線無可截取亦用此法第十三題一直線至他直線上所作兩角非直角即等于兩直角解曰甲線下至丙丁線遇于乙其甲乙丙與甲乙丁作兩角題言此兩角當是直角若非直角即是一鋭一鈍而并之等于兩直角論曰試于乙上作垂線為戊乙本篇十一令戊乙公論十八丙與戊乙丁為兩直角即甲乙丁甲乙戊兩鋭角并之與戊乙丁直角等矣次于甲乙丁甲乙戊兩鋭角又加戊乙丙一直角并此三角定與戊乙丙戊乙丁兩直角等也次于甲乙戊又加戊乙丙并此鋭公論一直兩角定與甲乙丙鈍角等也次于甲乙戊戊乙丙鋭直兩角又加甲乙丁鋭角并此三角定與甲乙丁甲乙丙鋭鈍兩角等也夫甲乙丁甲乙戊戊乙丙三角既與兩直角等則甲乙丁與甲乙丙兩角定與兩直角等第十四題一直線于線上一點出不同方兩直線偕元線每旁作兩角若每旁兩角與兩直角等即後出兩線為一直線解曰甲乙線于丙點上左出一線為丙丁右出一線為丙戊若甲丙戊甲丙丁兩角與兩直角等題言丁丙與丙戊是一直線論曰如云不然令别作一直線必從丁丙更引出一本篇十三線或離戊而上為丁丙己或離戊而下為丁丙庚也若上于戊則甲丙線至丁丙己直線上為甲丙己甲丙丁兩角此兩角宜與兩直角等如此即甲丙戊甲丙丁兩角與甲丙己甲丙丁兩角亦等矣試減甲丙丁角而以甲丙戊與甲丙己兩角較之果相等乎公論三夫甲丙己本小于甲丙戊而為其分今曰相等是全與其分等也公論九若下于戊則甲丙線至丁丙庚直線上為甲丙本篇十三庚甲丙丁兩角此兩角宜與兩直角等如此即公論三甲丙庚甲丙丁兩角與甲丙戊甲丙丁兩角亦等矣試減甲丙丁角而以甲丙戊與甲丙庚較之果相等乎夫甲丙戊實小于甲丙庚而為其分今曰相公論九等是全與其分等也兩者皆非則丁丙戊是一直線第十五題凡兩直線相交作四角每兩交角必等解曰甲乙與丙丁兩線相交于戊題言甲戊丙與丁戊乙兩角甲戊丁與丙戊乙兩角各等論曰丁戊線至甲乙線上則甲戊丁丁戊乙本篇十三兩角與兩直角等甲戊線至丙丁線上則甲戊本篇十三丙甲戊丁兩角與兩直角等如此即丁戊乙甲公論十戊丁兩角亦與甲戊丁甲戊內兩角等試減同公論用之甲戊丁角其所存丁戊乙甲戊丙兩角必等三又丁戊線至甲乙線上則甲戊丁丁戊乙兩角與本篇十三兩直角等乙戊線至丙丁線上則丁戊乙丙戊乙兩角與兩直角等本篇十三如此即甲戊丁丁戊乙兩角亦與丁戊乙丙戊乙兩角公論十試公論十八減同用之丁戊乙角其所存甲戊丁丙戊乙必等一系推顯兩直線相交于中點上作四角與四直角等二系一點之上兩直線相交不論幾許線幾許角定與四直角等增題一直線內出不同方兩直線而所作兩交角等即後出兩線為一直線解曰甲乙線內取丙點出丙丁丙戊兩線而所作甲丙戊丁丙乙兩交角等或甲丙丁戊丙乙兩交角等題言戊丙丙丁即一直線論曰甲丙戊角既與丁丙乙角等每加一戊丙乙角即甲丙戊戊丙乙兩角必與丁丙乙戊丙乙兩公論二角等而甲丙戊戊丙乙與兩直角等本篇十三則丁丙乙戊丙乙亦與兩直角等是戊丙丙丁為一直線本篇十四第十六題凡三角形之外角必大于相對之各角解曰甲乙丙角形自乙甲線引之至丁題言外角丁甲丙必大于相對之內角甲乙丙甲丙乙論曰欲顯丁甲丙角大于甲丙乙角試以甲丙線兩平分于戊本篇十自乙至戊作直線引長之從戊外截取戊巳與乙戊等本篇三次自甲至己作直線即甲戊己戊乙丙兩角形之本篇十五戊己與戊乙兩線等戊甲與戊丙兩線等甲戊己乙戊丙兩交角又等則甲己與乙丙兩底亦等本篇四兩形之各邊各角俱等而己甲戊與戊丙乙兩角本篇亦等矣夫己甲戊乃丁甲丙之分則丁甲丙大于己甲戊亦大于相等之戊丙乙而丁甲丙外角不大于相對之甲丙乙內角乎次顯丁甲丙大于甲乙丙試自丙甲線引長之至庚次以甲乙線兩平分于辛十自丙至辛作直線引長之從辛外截取辛壬與丙本篇三辛等次自甲至壬作直線依前論推顯甲辛壬本篇十五辛丙乙兩角形之各邊各角俱等則壬甲辛與辛乙丙兩角亦等矣夫壬甲辛乃庚甲乙之分必小于庚甲乙也庚甲乙又與丁甲丙兩交角等則甲乙丙內角不小于丁甲丙外角乎其餘乙丙上作外角俱大于相對之內角依此推顯第十七題凡三角形之每兩角必小于兩直角解曰甲乙丙角形題言甲乙丙甲丙乙兩角丙甲乙甲乙丙兩角甲丙乙丙甲乙兩角皆小于兩直角論曰試用兩邊線丙甲引出至戊丙乙引出至丁即本篇十六甲乙丁外角大于相對之甲丙乙內角矣此兩公論四率者每加一甲乙丙角則甲乙丁甲乙丙必大于甲丙乙甲乙丙矣夫甲乙丁甲乙丙與兩直角等本篇十三也則甲丙乙甲乙丙小于兩直角也餘二倣此第十八題凡三角形大邊對大角小邊對小角解曰甲乙丙角形之甲丙邊大于甲乙邊乙丙邊題言甲乙丙角大于乙丙甲角乙甲丙角論曰甲丙邊大于甲乙邊即于甲丙線上截甲丁與本篇三甲乙等自乙至丁作直線則甲乙丁與甲丁乙本篇五兩角等矣夫甲丁乙角者乙丙丁角形之外角本篇十六必大于相對之丁丙乙內角則甲乙丁角亦大于甲丙乙角而況甲乙丙又函甲乙丁于其中不又大于甲丙乙乎如乙丙邊大于甲乙邊則乙甲丙角亦大于甲丙乙角依此推顯第十九題凡三角形大角對大邊小角對小邊解曰甲乙丙角形乙角大于丙角題言對乙角之甲丙邊必大于對丙角之甲乙邊論曰如云不然令言或等或小若言甲丙與甲乙等本篇五則甲丙角宜與甲乙角等矣何設乙角大于丙本篇十八角也若言甲丙小于甲乙則甲丙邊對甲乙大角宜大又何言小也如甲角大于丙角則乙丙邊大于甲乙邊依此推顯第二十題凡三角形之兩邊并之必大于一邊解曰甲乙丙角形題言甲丙甲乙邊并之必大于乙丙邊甲丙丙乙并之必大于甲乙甲乙乙丙并之必大于甲丙論曰試于丙甲邊引長之以甲乙為度截取甲丁本篇三自丁至乙作直線令甲丁甲乙兩腰等而甲丁乙本篇五甲乙丁兩角亦等即丙乙丁角大于甲乙丁角本篇十九亦大于丙丁乙角矣夫丁丙邊對丙乙丁大角也豈不大于乙丙邊對丙丁乙小角者乎又甲丁甲乙兩線各加甲丙線等也則甲乙加甲丙者與丙丁等矣丙丁既大于乙丙則甲乙甲丙兩邊并必大于乙丙邊也餘二倣此第二十一題凡三角形于一邊之兩界出兩線復作一三角形在其內則內形兩腰并之必小于相對兩腰而後兩線所作角必大于相對角解曰甲乙丙角形于乙丙邊之兩界各出一線遇于丁題言丁丙丁乙兩線并必小于甲乙甲丙并而乙丁丙角必大于乙甲丙角論曰試用內一線引長之如乙丁引之至戊即乙甲本篇二十戊角形之乙甲甲戊兩線并必大于乙戊線也公論四此二率者每加一戊丙線則乙甲甲戊戊丙并必大于乙戊戊丙并矣又戊丁丙角形之戊丁戊丙公論四線并必大于丁丙線也此二率者每加一丁乙線則戊丁戊丙丁乙并必大于丁丙丁乙并矣夫乙本篇二十甲甲戊戊丙既大于乙戊戊丙豈不更大于丁丙丁乙乎又乙甲戊角形之丙戊丁外角大于相對本篇十六之乙甲戊內角即丁戊丙角形之乙丁丙外角更大于相對之丁戊丙內角矣而乙丁丙角豈不更大于乙甲丙角乎第二十二題三直線求作三角形其每兩線并大于一線也法曰甲乙丙三線其第一第二線并大于第三線若兩線比第三線或等或小即不能作三角形見本篇二十求作三角形先任作丁戊線長于三線并次以甲為度從丁截取丁巳線本篇三以乙為度從己截取己庚線以丙為度從庚截取庚辛線次以己為心丁為界作丁壬癸圜以庚為心辛為界作辛壬癸圜其兩圜相遇下為壬上為癸末以庚巳為底作癸庚癸巳兩直線即得己癸庚三角形用壬亦可作線若丁壬癸圜不到子辛壬癸圜不到丑即是兩或等或小于第三線不成三角形矣論曰此角形之丁己己癸線皆同圜之半徑等界説十五則己癸與甲等庚辛庚癸線亦皆同圜之半徑等則庚癸與丙等己庚元以乙為度則角形三線與所設三線等用法任以一線為底以底之一界為心第二線為度向上作短界線次以又一界為心第三線為度向上作短界線兩界線交處向下作兩腰如所求若設一三角形求别作一形與之等亦用此法第二十三題一直線任于一點上求作一角與所設角等法曰甲乙線于丙點求作一角與丁戊己角等先于戊丁線任取一點為庚于戊巳線任取一點為辛自庚至辛作直線次依甲乙線作丙壬癸角形與戊庚辛角形等本篇草二即丙壬丙癸兩腰與戊庚戊辛兩腰等壬癸底本篇八與庚辛底又等則丙角與戊角必等第二十四題兩三角形相當之兩腰各等若一形之腰間角大則底亦大解曰甲乙丙與丁戊己兩角形其甲乙與丁戊兩腰甲丙與丁巳兩腰各等若乙甲丙角大于戊丁己角題言乙丙底必大于戊巳底論曰試依丁戊線從丁點作戊丁庚角與乙甲丙角等本篇草三則戊丁庚角大于戊丁己角而丁庚腰在丁巳之外矣次截丁庚線與丁巳等本篇三即丁庚丁巳俱與甲丙等又自戊至庚作直線是甲乙與丁戊甲丙與丁庚腰線各等乙甲丙與戊丁庚兩角亦等而乙丙與戊庚兩底必等也本篇四次問所作戊庚底今在戊巳底上邪抑同在一線邪抑在其下邪若在上即如第二圖自己至庚作直線則丁庚己角形之丁庚丁巳兩腰等而丁庚己與丁己庚兩角亦等矣本篇五夫戊庚己角乃丁庚己角之分必小于丁庚己亦必小于相等之丁巳庚而丁巳庚又戊己庚角之分則戊庚己益小于戊巳庚也公論九則對戊庚己小角之戊己腰必小于對戊己庚大角之戊庚腰也本篇十九若戊巳與戊庚兩底同線即如第四圖戊己乃戊庚之分則戊己必小于戊公論九庚也若戊庚在戊巳之下即如第六圖自己至本篇五庚作直線次引丁庚線出于壬引丁巳線出于辛則丁庚丁巳兩腰等而辛巳庚壬庚己兩外角亦等矣夫戊庚己角乃壬庚己角之分必小于壬庚己公論九亦必小于相等之辛巳庚而辛巳庚又戊己庚角之分則戊庚巳益小于戊己庚也則對戊庚己小本篇角之戊巳腰必小于對戊己庚大角之戊庚腰也十九是三戊巳皆小于等戊庚之乙丙本篇四也第二十五題兩三角形相當之兩腰各等若一形之底大則腰間角亦大解曰甲乙丙與丁戊己兩角形其甲乙與丁戊甲丙與丁巳各兩腰等若乙丙底大于戊巳底題言乙甲丙角大于戊丁巳角論曰如云不然令言或小或等若言等則兩本篇四形之兩腰各等腰間角又等宜兩底亦等何設本篇草四乙丙底大也若言乙甲丙角小則對乙甲丙角之乙丙線宜亦小何設乙丙底大也第二十六題二支兩三角形有相當之兩角等及相當之一邊等則餘兩邊必等餘一角亦等其一邊不論在兩角之內及一角之對先解一邊在兩角之內者曰甲乙丙角形之甲乙丙甲丙乙兩角與丁戊己角形之丁戊巳丁巳戊兩角各等在兩角內之乙丙邊與戊巳邊又等題言甲乙與丁戊兩邊甲丙與丁巳兩邊各等而乙甲丙角與戊丁巳角亦等論曰如云兩邊不等而丁戊大于甲乙令于丁戊線本篇三截取庚戊與甲乙等次自庚至己作直線即庚本篇四戊巳角形之庚戊戊巳兩邊宜與甲乙乙丙兩邊等矣夫乙角與戊角元等則甲丙與庚巳宜等而本篇四庚巳戊角與甲丙乙角宜亦等也既設丁己戊公論與甲丙乙兩角等今又言庚己戊與甲丙乙兩角等是庚己戊與丁己戊亦等全與其分等矣九以此見兩邊必等兩邊既等則餘一角亦等後解相等邊不在兩角之內而在一角之對者曰甲乙丙角形之乙角丙角與丁戊己角形之戊角丁己戊角各等而對丙之甲乙邊與對己之丁戊邊又等題言甲丙與丁己兩邊丙乙與己戊兩邊各等而甲角與戊丁己角亦等論曰如云兩邊不等而戊己大于乙丙令于戊己線本篇三截取戊庚與乙丙等次自丁至庚作直線即丁本篇四戊庚角形之丁戊戊庚兩邊宜與甲乙乙丙兩邊等矣夫乙角與戊角元等則甲丙與丁庚宜等而本篇十六丁庚戊角與甲丙乙角宜亦等也既設丁巳戊與甲丙乙兩角等今又言丁庚戊與甲丙乙兩角等是丁庚戊外角與相對之丁巳戊內角等矣可乎以此見兩邊必等兩邊既等則餘一角亦等第二十七題兩直線有他直線交加其上若內相對兩角等即兩直線必平行解曰甲乙丙丁兩直線加他直線戊己交于庚于辛而甲庚辛與丁辛庚兩角等題言甲乙丙丁兩線必平行論曰如云不然則甲乙丙丁兩直線必至相本篇十六遇于壬而庚辛壬成三角形則甲庚辛外角宜大于相對之庚辛壬內角矣乃先設相等乎若設乙庚辛角與丙辛庚角等亦依此論若言甲乙丙丁兩直線相遇于癸亦依此論第二十八題二支兩直線有他直線交加其上若外角與同方相對之內角等或同方兩內角與兩直角等即兩直線必平行先解曰甲乙丙丁兩直線加他直線戊己交于庚于辛其戊庚甲外角與同方相對之庚辛丙內角等題言甲乙丙丁兩線必平行論曰乙庚辛角與相對之內角丙辛庚等本篇草七戊庚甲與乙庚辛兩交角亦等本篇十五即兩直線必平行後解曰甲庚辛丙辛庚兩內角與兩直角等題言甲乙丙丁兩線必平行論曰甲庚辛丙辛庚兩角與兩直角等而甲庚戊甲本篇十三庚辛兩角亦與兩直角等試減同用之甲庚辛本題即所存甲庚戊與丙辛庚等矣既外角與同方相對之內角等即甲乙丙丁必平行第二十九題三支兩平行線有他直線交加其上則內相對兩角必等外角與同方相對之內角亦等同方兩內角亦與兩直角等先解曰此反前二題故同前圖有甲乙丙丁二平行線加他直線戊巳交于庚于辛題言甲庚辛與丁辛庚內相對兩角必等論曰如云不然而甲庚辛大于丁辛庚則丁辛庚加公論四辛庚乙宜小于辛庚甲加辛庚乙矣夫辛庚甲本篇十三辛庚乙元與兩直角等據如彼論則丁辛庚辛公論十一庚乙兩角小于兩直角而甲乙丙丁兩直線向乙丁行必相遇也可謂平行線乎次解曰戊庚甲外角與同方相對之庚辛丙內角等論曰乙庚辛與相對之丙辛庚兩內角等本題則乙庚本篇十五辛交角相等之戊庚甲與丙辛庚必等公論一後解曰甲庚辛丙辛庚兩內角與兩直角等論曰戊庚甲與庚辛丙兩角既等本題而每加一甲庚公論二辛角則庚辛丙甲庚辛兩角與甲庚辛戊庚甲兩角必等夫甲庚辛戊庚甲本與兩直角等本篇十三則甲庚辛丙辛庚兩內角亦與兩直角等第三十題兩直線與他直線平行則元兩線亦平行解曰此題所指線在同面者不同面線後别有論如甲乙丙丁兩直線各與他線戊巳平行題言甲乙與丙丁亦平行論曰試作庚辛直線交加于三直線甲乙于壬戊巳本篇草九于子丙丁于癸其甲乙與戊巳既平行即甲壬子與相對之己子壬兩內角等丙丁與戊巳既平行即丁本篇草九癸子內角與己子壬外角亦等公論一丁癸子與甲壬子亦為相對之內角亦等而甲本篇草七乙丙丁為平行線第三十一題一點上求作直線與所設直線平行法曰甲點上求作直線與乙丙平行先從甲點向乙丙線任指一處作直線為甲丁即乙丙線上成甲丁乙角次于甲點上作一角與甲丁乙等本篇草三為戊甲丁從戊甲線引之至己即己戊與乙丙平行論曰戊己乙丙兩線有甲丁線聯之其所作戊甲丁本篇草七與甲丁乙相對之兩內角等即平行線增從此題生一用法設一角兩線求作有法四邊形有角與所設角等兩兩邊線與所設線等法曰先作己丁戊角與丙等次截丁戊線與甲等己丁線與乙等末依丁戊平行作己庚依己丁平行作庚戊即所求本題用法于甲點求作直線與乙丙平行先作甲丁線次以丁為心任作戊己圜界次用元度以甲為心作庚辛圜界稍長于戊己次取戊己圜界為度于庚辛圜界截取庚辛末自甲至辛作直線各引長之即所求又用法以甲點為心于乙丙線近乙處任指一點作短界線為丁次用元度以丁為心于乙丙上向丙截取一分作短界線為戊次用元度以戊為心向上與甲平處作短界線又用元度以甲為心向甲平處作短界線後兩界線交處為己自甲至己作直線各引長之即所求第三十二題二支凡三角形之外角與相對之內兩角并等凡三角形之內三角并與兩直角等先解曰甲乙丙角形試從乙丙邊引至丁題言甲丙丁外角與相對之內兩角甲乙并等論曰試作戊丙線與甲乙平行本篇三一令甲丙為甲乙戊丙之交加線則乙甲丙角與相對本篇草九之甲丙戊角等又乙丁線與兩平行線相遇則本篇草九戊丙丁外角與相對之甲乙丙內角等既甲丙戊與乙甲丙等而戊丙丁與甲乙丙又等則甲丙丁外角與內兩角甲乙并等矣後解曰甲乙丙三角并與兩直角等論曰既甲丙丁角與甲乙兩角并等更于甲丙丁加公論二甲丙乙則甲丙丁甲丙乙兩角并與甲乙丙內三角并等矣夫甲丙丁甲丙乙并元與兩直角等本篇十三則甲乙丙內三角并亦與兩直角等增從此推知凡第一形當兩直角第二形當四直角第三形當六直角自此以上至于無窮每命形之數倍之為所當直角之數凡一線二線不能為形故三邊為第一形四邊為第二形五邊為第三形六邊為第四形倣此以至無窮又視每形邊數減二邊即所存邊數是本形之數論曰如上四圖第一形三邊減二邊存一邊即是本形一數倍之當兩直角本題第二形四邊減二邊存二邊即是本形二數倍之當四直角欲顯此理試以第二形作一對角線成兩三角形每形當兩直角并之則當四直角矣第三形五邊減二邊存三邊即是本形三數倍之當六直角欲顯此理試以第三形作兩對角線成三三角形每形當兩直角并之亦當六直角矣其餘依此推顯以至無窮又一法每形視其邊數每邊當兩直角而減四直角其存者即本形所當直角論曰欲顯此理試于形中任作一點從此點向各角俱作直線令每形所分角形之數如其邊數每一分形三角當二直角本題其近點之處不論幾角皆當四直角本篇十五之系次減近點諸角即是減四直角其存者則本形所當直角如上第四形六邊中間任指一點從點向各角分為六三角形每一分形三角六形共十八角今于近點處減當四直角之六角所存近邊十二角當八直角餘倣此本題增一系凡諸種角形之三角并俱相等本篇一二系凡兩腰等角形若腰間直角則餘兩角每當直角之半腰間鈍角則餘兩角俱小于半直角腰間鋭角則餘兩角俱大于半直角三系平邊角形每角當直角三分之二四系平邊角形若從一角向對邊作垂線分為兩角形此分形各有一直角在垂線之下兩旁則垂線之上兩旁角每當直角三分之一其餘兩角每當直角三分之二增從三系可分一直角為三平分其法任于一邊立平邊角形次分對直角一邊為兩平分從此邊對角作垂線即所求如上圖甲乙丙直角求三分之先于甲乙線上作甲乙丁平邊角形次平分甲丁于戊本篇九末作乙戊直線第三十三題兩平行相等線之界有兩線聯之其兩線亦平行亦相等解曰甲乙丙丁兩平行相等線有甲丙乙丁兩線聯之題言甲丙乙丁亦平行相等線論曰試作甲丁對角線為甲乙丙丁之交加本篇草九線即乙甲丁丙丁甲相對兩內角等又甲丁線本篇草九上下兩角形之甲乙丙丁兩邊既等甲丁同邊則對乙甲丁角之乙丁線與對丙丁甲角之甲丙線亦等而乙丁甲與丙甲丁兩角亦等也本篇四此兩角本篇草七者甲丙乙丁之內相對角也兩角既等則甲丙乙丁兩線必平行第三十四題凡平行線方形每相對兩邊線各等每相對兩角各等對角線分本形兩平分解曰甲乙丁丙平行方形界説三五題言甲乙與丙丁兩線甲丙與乙丁兩線各等又言乙與丙兩角乙甲丙與丙丁乙兩角各等又言若作甲丁對角線即分本形為兩平分論曰甲乙與丙丁既平行則乙甲丁與丙丁甲相對本篇草九之兩內角等甲丙與乙丁既平行則乙丁甲與本篇草九丙甲丁相對之兩內角等甲乙丁角形之乙甲本篇草六丁乙丁甲兩角與甲丁丙角形之丙丁甲丙甲丁兩角既各等甲丁同邊則甲乙與丙丁甲丙與乙丁俱等也而丙角與相對之乙角亦等矣又乙丁甲公論二角加丙丁甲角與丙甲丁角加乙甲丁角既等即乙甲丙與丙丁乙相對兩角亦等也又甲乙丁甲本篇四丁丙兩角形之甲乙乙丁兩邊與丁丙丙甲兩邊各等腰間之乙角與丙角亦等則兩角形必等而甲丁線分本形為兩平分第三十五題兩平行方形若同在平行線內又同底則兩形必等解曰甲乙丙丁兩平行線內有丙丁戊甲與丙丁乙巳兩平行方形同丙丁底題言此兩形等等者不謂腰等角等謂所函之地等後言形等者多倣此先論曰設己在甲戊之內其丙丁戊甲與丙丁乙己本篇三四皆平行方形丙丁同底則甲戊與丙丁巳乙與丙丁各相對之兩邊各等而甲戊與己乙亦等公論一公論三試于甲戊己乙兩線各減己戊即甲己與戊乙亦等而甲丙與戊丁元等本篇三四乙戊丁外角與己甲本篇草九丙內角又等則乙戊丁與己甲丙兩角形必等本篇四矣次于兩角形每加一丙丁戊己無法四邊形公論二則丙丁戊甲與丙丁乙己兩平行方形等也次論曰設己戊同點依前甲戊與戊乙等乙戊丁與戊甲丙兩角形等本篇四而每加一戊丁丙角形則丙丁戊甲與丙丁乙戊兩平行方形必等公論二後論曰設己點在戊之外而丙己與戊丁兩線交于庚依前甲戊與己乙兩線等而每加一戊己線即戊乙與甲己兩線亦等公論二因顯己甲丙與乙戊丁兩角形亦等本篇四次每減一己戊庚角形則所存戊庚丙甲與乙己庚丁兩無法四邊形亦等公論三次于兩無法形每加一庚丁丙角形則丙丁戊甲與丙丁公論二乙己兩平行方形必等第三十六題兩平行線內有兩平行方形若底等則形亦等解曰甲乙丙丁兩平行線內有甲丙戊己與庚辛丁乙兩平行方形而丙戊與辛丁兩底等題言兩形亦等論曰試自丙至庚戊至乙各作直線相聯其本篇卅四丙戊庚乙各與辛丁等則丙戊與庚乙亦等庚本篇卅三乙與丙戊既平行線則庚丙與乙戊亦平行線本篇三五而甲丙戊己與庚丙戊乙兩平行方形同丙戊底者等矣庚辛丁乙與庚丙戊乙兩平行方形同庚本篇三五乙底者亦等矣既爾則庚辛丁乙與甲丙戊己公論一亦等第三十七題兩平行線內有兩三角形若同底則兩形必等解曰甲乙丙丁兩平行線內有甲丙丁乙丙丁兩角形同丙丁底題言兩形必等論曰試自丁至戊作直線與甲丙平行次自本篇三一丁至己作直線與乙丙平行夫甲丙丁戊乙丙本篇三五丁己兩平行方形在甲乙丙丁兩平行線內同丙丁底既等則甲丙丁角形為甲丙丁戊方形之半與乙丙丁角形為乙丙丁己方形之半者甲丁乙丁兩對角線平分兩方形見本篇卅四亦等公論七第三十八題兩平行線內有兩三角形若底等則兩形必等解曰甲乙丙丁兩平行線內有甲丙戊與乙己丁兩角形而丙戊與己丁兩底等題言兩形必等論曰試自庚至戊辛至丁各作直線與甲丙乙己平本篇卅一行其甲丙戊庚與乙己丁辛兩平行方形既等本篇卅六則甲丙戊與乙己丁兩角形為兩方形之半者本篇卅四亦等公論七增凡角形任于一邊兩平分之向對角作直線即分本形為兩平分論曰甲乙丙角形試以乙丙邊兩平分于丁本篇十自丁至甲作直線即甲丁線分本形為兩平分何本篇卅一者試于甲角上作直線與乙丙平行則甲乙丁甲丁丙兩角形在兩平行線內兩底等兩形亦本題等二增題凡角形任于一邊任作一點求從點分本形為兩平分法曰甲乙丙角形從丁點求兩平分先自丁至相對甲角作甲丁直線次平分乙丙線于戊本篇十作戊己線與甲丁平行本篇卅一末作己丁直線即分本形為兩平分論曰試作甲戊直線即甲戊己己丁戊兩角形在兩平行線內同己戊底者等而每加一己戊丙形則己丁丙與甲戊丙兩角形亦等公論二夫甲戊丙為甲乙丙之半本題增則己丁丙亦甲乙丙之半第三十九題兩三角形其底同其形等必在兩平行線內解曰甲乙丙與丁丙乙兩角形之乙丙底同其形復等題言在兩平行線內者蓋云自甲至丁作直線必與乙丙平行論曰如云不然令從甲别作直線與乙丙平行本篇卅一必在甲丁之上或在其下矣設本篇卅七在上為甲戊而乙丁線引出至戊即作戊丙直線是甲乙丙宜與戊丙乙兩角形等矣夫甲乙丙與公論丁丙乙既等而與戊丙乙復等是全與其分等也九設在甲丁下為甲己即作己丙直線是己丙乙與丁丙乙亦等如前駁之第四十題兩三角形其底等其形等必在兩平行線內解曰甲乙丙與丁戊己兩角形之乙丙與戊己兩底等其形亦等題言在兩平行線內者蓋云自甲至丁作直線必與乙己平行論曰如云不然令從甲别作直線與乙己平行本篇卅一本篇三八必在甲丁之上或在其下矣設在上為甲庚而戊丁線引出至庚即作庚己直線是甲乙丙宜與庚戊己兩角形等矣夫甲乙丙與丁戊己既等而與庚公論九戊己復等是全與其分等也設在甲丁下為甲辛即作辛己直線是辛戊己與丁戊己亦等如前駁之第四十一題兩平行線內有一平行方形一三角形同底則方形倍大于三角形解曰甲乙丙丁兩平行線內有甲丙丁戊方形乙丁丙角形同丙丁底題言方形倍大于角形論曰試作甲丁直線分方形為兩平分則甲丙丁與本篇卅七乙丁丙兩角形等矣夫甲丙丁戊倍大于甲丙本篇卅三丁必倍大于乙丁丙第四十二題有三角形求作平行方形與之等而方形角有與所設角等法曰設甲乙丙角形丁角求作平行方形與甲乙丙角形等而有丁角先分一邊為兩平分如乙丙邊平分于戊本篇十次作丙戊己角本篇草與丁角等次自甲作直線與乙丙平行本篇卅一而本篇卅一與戊己線遇于己末自丙作直線與戊己平行為丙庚而與甲己線遇于庚則得己戊丙庚平行方形與甲乙丙角形等論曰試自甲至戊作直線其甲戊丙角形與己戊丙本篇四一庚平行方形在兩平行線內同底則己戊丙庚倍大于甲戊丙矣夫甲乙丙亦倍大于甲戊丙本篇卅八增即與己戊丙庚等公論六第四十三題凡方形對角線旁兩餘方形自相等解曰甲乙丙丁方形有甲丙對角線題言兩旁之乙界説卅六壬庚戊與庚己丁辛兩餘方形必等論曰甲乙丙甲丙丁兩角形等本篇卅四甲戊庚甲庚辛兩角形亦等本篇卅四而于甲乙丙減甲戊庚于甲丙丁減甲庚辛則所存乙丙庚戊與庚丙丁辛兩無法四邊形亦等矣公論三又庚壬丙己角線方形之庚丙己庚丙壬兩角形等本篇三四而于兩無法四邊形每減其一則公論三所存乙壬庚戊與庚己丁辛兩餘方形安得不等第四十四題一直線上求作平行方形與所設三角形等而方形角有與所設角等法曰設甲線乙角形丙角求于甲線上作平行方形與乙角形等而有丙角先作丁戊己庚平行方形與乙角形等而戊己庚角與丙角等本篇四二次于庚己線引長之作己辛線與甲等次作辛壬線與戊己平行本篇三一次于丁戊引長之與辛壬線遇于壬次自壬至己作對角線引出之又自丁庚引長之與對線角遇于癸次自癸作直線與庚辛平行又于壬辛引長之與癸線遇于子末于戊己引長之至癸子線得丑即己丑子辛平行方形如所求論曰此方形之己辛線與甲等而辛己丑角為戊己本篇十五庚之交角則與丙等又本形與戊己庚丁同為本篇四三餘方形等則與乙角形等第四十五題有多邊直線形求作一平行方形與之等而方形角有與所設角等法曰設甲乙丙五邊形丁角求作平行方形與五邊形等而有丁角先分五邊形為甲乙丙三三角形次作戊己庚辛平行方形與甲等而有丁角本篇四二次于本篇四四戊辛己庚兩平行線引長之作庚辛壬癸平行方形與乙等而有丁角末復引前線作壬癸子丑平本篇四四行方形與丙等而有丁角即此三形并為一平行方形與甲乙丙并形等而有丁角自五以上可至無窮俱倣此法論曰戊己庚與辛庚癸兩角等而每加一己庚辛角本篇草九即辛庚癸己庚辛兩角定與己庚辛戊己庚兩角等夫己庚辛戊己庚是兩平行線內角與兩直角等也則己庚辛辛庚癸亦與兩直角等而己庚庚癸本篇十四為一直線也又戊辛庚與戊己庚兩對角等而本篇卅四辛壬癸與辛庚癸兩對角亦等則戊己庚辛庚辛壬癸皆平行方形也壬癸子丑依此推顯本篇三十即與戊己癸壬并為一平行方形矣增題兩直線形不等求相減之較幾何法曰甲與乙兩直線形甲大于乙以乙減甲求較幾何先任作丁丙己戊平行方形與甲等次于丙丁線上依丁角作丁丙辛庚平行方形與乙等本題即得辛庚戊己為相減之較矣何者丁丙己戊之大于丁丙辛庚較餘一辛庚戊己也則甲大于乙亦辛庚戊己也第四十六題一直線上求立直角方形法曰甲乙線上求立直角方形先于甲乙兩界各立垂線為丁甲為丙乙皆與甲乙線等本篇十一次作丁丙線相聯即甲乙丙丁為直角方形論曰甲乙兩角俱直角則丁甲丙乙為平行線本篇草八本篇三三此兩線自相等則丁丙與甲乙亦平行線而甲本篇卅四乙丙丁四線俱平行俱相等又甲乙俱直角則相對丁丙亦俱直角而甲乙丙丁定為四直角方形第四十七題凡三邊直角形對直角邊上所作直角方形與餘兩邊上所作兩直角方形并等解曰甲乙丙角形于對乙甲丙直角之乙丙邊上作乙丙丁戊直角方形本篇四六題言此形與甲乙邊上所作甲乙己庚及甲丙邊上所作甲丙辛壬兩直角方形并等論曰試從甲作甲癸直線與乙戊丙丁平行本篇卅一分乙丙邊于子次自甲至丁至戊各作直線末自乙至辛自丙本篇十四至己各作直線其乙甲丙與乙甲庚既皆直角即庚甲甲丙是一直線依顯乙甲甲壬亦一直線又公論二丙乙戊與甲乙己既皆直角而每加一甲乙丙角即甲乙戊與丙乙己兩角亦等依顯甲丙丁與乙本篇四丙辛兩角亦等又甲乙戊角形之甲乙乙戊兩邊與丙乙己角形之己乙乙丙兩邊等甲乙戊與丙乙己兩角復等則對等角之甲戊與丙己兩邊亦等而此兩角形亦等矣夫甲乙己庚直角方形倍大于本篇四一同乙己底同在平行線內之丙乙己角形而乙公論戊癸子直角形亦倍大于同乙戊底同在平行線內之甲乙戊角形則甲乙己庚不與乙戊癸子等乎六依顯甲丙辛壬直角方形與丙丁癸子直角形等則乙戊丁丙一形與甲乙己庚甲丙辛壬兩形并等矣一增凡直角方形之對角線上作直角方形倍大于元形如甲乙丙丁直角方形之甲丙線上作直角方形倍大于甲乙丙丁形二增題設不等兩直角方形如一以甲為邊一以乙為邊求别作兩直角方形自相等而并之又與元設兩形并等法曰先作丙戊線與甲等次作戊丙丁直角而丙丁線與乙等次作戊丁線相聨末于丙丁戊角丙戊丁角各作一角皆半于直角己公論十一戊己丁兩腰遇于己而等本篇六即己戊己丁兩線上所作兩直角方形自相等而并之又與丙戊丙丁上所作兩直角方形并等論曰己丁戊己戊丁兩角既皆半于直角則丁己本篇卅二戊為直角而對直角之丁戊線上所作直角方形與兩腰線上所作兩直角方形并等矣本題己戊與己丁既等則其上所作兩直角方形自相等矣又丁戊線上所作直角方形與丙丁丙戊線上所作兩直角方形并既等則己戊己丁上兩直角方形并與丙戊丙丁上兩直角方形并亦等三增題多直角方形求并作一直角方形與之等法曰如五直角方形以甲乙丙丁戊為邊任等不等求作一直角方形與五形并等先作己庚辛直角而己庚線與甲等庚辛線與乙等次作己辛線旋作己辛壬直角而辛壬與丙等次作己壬線旋作己壬癸直角而壬癸與丁等次作己癸線旋作己癸子直角而癸子與戊等末作己子線題言己子線上所作直角方形即所求論曰己辛上作直角方形與甲乙兩形并等本題己壬上作直角方形與己辛及丙兩形并等餘倣此推顯可至無窮四增三邊直角形以兩邊求第三邊長短之數法曰甲乙丙角形甲為直角先得甲乙甲丙兩邊長短之數如甲乙六甲丙八求乙丙邊長短之數其甲乙甲丙上所作兩直角方形并既與本題乙丙上所作直角方形等則甲乙之羃自乘之數曰羃得三十六甲丙之羃得六十四并之得百而乙丙之羃亦百百開方得十即乙丙數十也又設先得甲乙乙丙如甲乙六乙丙十而求甲丙之數其甲乙甲丙上兩直角方形并既與乙丙上直角方形等則甲乙之羃得三十六乙丙之羃得百百減三十六得甲丙之羃六十四六十四開方得八即甲丙八也求甲乙倣此此以開方盡實者為例其不盡實者自具算家分法第四十八題凡三角形之一邊上所作直角方形與餘邊所作兩直角方形并等則對一邊之角必直角解曰此反前題如甲乙丙角形其甲丙邊上所作直角方形與甲乙乙丙邊上所作兩直角方形并等題言甲乙丙角必直角論曰試于乙上作甲乙丁直角而乙丁與乙丙兩線等次作丁甲線相聯其甲乙丁既直角則甲丁上直角方形與甲乙乙丁上兩直角方形并等本篇四七而甲乙乙丁上兩直角方形并與甲乙乙丙上兩直角方形并又等甲乙同乙丁乙丙等故即丁甲上直角方形與甲丙上直角方形必等夫甲乙丁角形之甲乙乙丁兩腰與甲乙丙角形之甲乙乙丙兩腰既等而丁甲甲丙兩底又等則對底線之兩角亦等本篇八甲乙丁既直角即甲乙丙亦直角幾何原本卷一
