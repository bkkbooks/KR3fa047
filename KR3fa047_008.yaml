body:
  text: 卷六之首界說六則第一界凡形相當之各角等而各等角旁兩線之比例俱等為相似之形甲乙丙丁戊己兩角形之甲角與丁角等乙與戊丙與己各等其甲角旁之甲乙與甲丙兩線之比例若丁角旁之丁戊與丁己兩線而甲乙與乙丙若丁戊與戊己甲丙與丙乙若丁己與己戊則此兩角形為相似之形依顯凡平邊形皆相似之形如庚辛壬癸子丑俱平邊角形其各角俱等而各邊之比例亦等者是也四邊五邊以上諸形俱倣此第二界兩形之各兩邊線互為前後率相與為比例而等為互相視之形甲乙丙丁戊己庚辛兩方形其甲乙乙丙邊與戊己己庚邊相與為比例等而彼此互為前後如甲乙與戊己若己庚與乙丙也則此兩形為互相視之形依顯壬癸子丑寅卯兩角形之壬子與丑寅若丑卯與壬癸或壬癸與丑寅若丑卯與壬子亦互相視之形也第三界理分中末線者一線兩分之其全與大分之比例若大分與小分之比例甲乙線兩分之于丙而甲乙與大分甲丙之比例若大分甲丙與小分丙乙此為理分中末線其分法見本卷三十題而與二卷十一題理同名異此線為用甚廣至量體尤所必須十三卷諸題多賴之古人目為神分線也第四界度各形之高皆以垂線之亘為度甲乙丙角形從甲頂向乙丙底作甲庚垂線即甲庚為甲乙丙之高又丁戊己角形作丁辛垂線即丁辛為丁戊己之高若兩形相視兩垂線等即兩形之高必等如上兩形在兩平行線之內者是也若以丙己為頂以甲乙丁戊為底則不等自餘諸形之度高俱倣此凡度物高以頂底為界以垂線為度蓋物之定度止有一不得有二自頂至底垂線一而己偏線無數也第五界比例以比例相結者以多比例之命數相乘除而結為一比例之命數五卷界說此各比例不同理而相聚為一比例者則用相結之法合各比例之命數求首尾一比例之命數也曷為比例之命數謂大幾何所倍於小幾何若干或小幾何在大幾何內若干也如大幾何四倍于小或小幾何為大四分之一即各以四為命比例之數也三今言以彼多比例之命數相乘除而結為此一比例之命數者如十二倍之此比例則以彼二倍六倍兩比例相結也二六相乘為十二故也或以彼三倍四倍兩比例相結也三四相乘亦十二故也又如三十倍之此比例則以彼二倍三倍五倍三比例相結也二乘三為六六乘五為三十故也其曰相結者相結之理蓋在中率凡中率為前比例之後後比例之前故以二比例合為一比例則中率為輳合之因如兩爿合此為之膠如兩襟合此為之紐矣第五卷第十界言數幾何為同理之比例則第一與第三為再加之比例再加者以前中二率之命數再加為前後二率之命數亦以中率為紐也但彼所言者多比例同理故止以第一比例之命數纍加之此題所言則不同理之多比例不得以第一比例之命數纍加之故用此乘除相結之理于不同理之中求其同理别為纍加之法其紐結之義頗相類焉下文仍發明借象之術以需後用也五卷言多比例同理者第一與第三為再加與第四為三加與第五為四加以至無窮今此相結之理亦以三率為始三率則兩比例相乘除而中率為紐也若四率則先以前三率之兩比例相乘除而結為一比例復以此初結之比例與第三比例乘除相結為一比例也若五率則先以前三率之兩比例乘除相結復以此再結之比例與第三比例乘除相結又以三結之比例與第四比例乘除相結為一比例也或以第一第二第三率之兩比例乘除相結以第三第四第五之兩比例乘除相結又以此二所結比例乘除相結而為一比例也自六以上倣此以至無窮設三幾何為二比例不同理而合為一比例則以第一與二第二與三兩比例相結也如上圖三幾何二比例皆以大不等者其甲乙與丙丁為二倍大丙丁與戊己為三倍大則甲乙與戊己為六倍大二乘三為六也若以小不等戊己為第一甲乙為第三三乘二亦六則戊己與甲乙為反六倍大也甲乙與丙丁既二倍大試以甲乙二平分之為甲庚庚乙必各與丙丁等丙丁與戊己既三倍大而甲庚庚乙各與丙丁等即甲庚亦三倍大於戊己庚乙亦三倍大於戊己而甲乙必六倍大於戊己又如上圖三幾何二比例前以大不等後以小不等者中率小子前後兩率也其甲乙與丙丁為三倍大丙丁與戊己為反二倍大反二倍大者丙丁得戊己之半即甲乙與戊己為等帶半三乘半得等帶半也若以戊己為第一甲乙為第三反推之半除三為反等帶半也又如上圖三幾何二比例前以小不等後以大不等者中率大於前後二率也其甲乙與丙丁為反二倍大甲乙得丙丁之半丙丁與戊己甲乙得戊為等帶三分之一即甲乙與戊己為反等帶半己三分之二何者如甲乙二即丙丁當四丙丁四即戊己當三是甲乙二戊己當三也後增其乘除之法則以命數三帶得數一為四以半除之得二二比三為反等帶半也若以戊己為第一甲乙為第三三比二為等帶半也設四幾何為三比例不同理而合為一比例則以第一與二第二與三第三與四三比例相結也如上圖甲乙丙丁四幾何三比例先依上論以甲與乙乙與丙二比例相結為甲與丙之比例次以甲與丙丙與丁相結即得甲與丁之比例也如是遞結可至無窮也或用此圖申明本題之㫖曰甲與乙之命數為丁乙與丙之命數為戊即甲與丙之命數為己何者三命數以一丁二戊相乘得三己即三比例以一甲與乙二乙與丙相乘得三甲與丙後增若多幾何各帶分而多寡不等者當用通分法如設前比例為反五倍帶三之二後比例為二倍大帶八之一即以前命數三通其五倍為十五得分數從之為十七是前比例為三與十七也以後命數八通其二倍為十六得分數從之為十七是後比例為十七與八也即首尾二幾何之比例為三與八得二倍大帶三之二也曷謂借象之術如上所說三幾何二比例者皆以中率為前比例之後後比例之前乘除相結略如連比例之同用一中率也而不同理别有二比例異中率者是不同理之斷比例也無法可以相結當于其所設幾何之外别立三幾何二比例而同中率者乘除相結作為儀式以彼異中率之四幾何二比例依倣求之即得故謂之借象術也假如所設幾何十六為首十二為尾却云十六與十二之比例若八與三及二與四之比例八為前比例之前四為後比例之後三與二為前之後後之前此所謂異中率也欲以此二比例乘除相結無法可通矣用是别立三幾何二比例如其八與三二與四之比例而務令同中率如三其八得二十四為前比例之前三其三得九為前比例之後即以九為後比例之前又求九與何數為比例若二與四得十八為後比例之後其二十四與九若八與三也九與十八若二與四也則十六與十二若二十四與十八俱為等帶半之比例矣是用借象之術變異中率為同中率乘除相結而合二比例為一比例也其三比例以上亦如上方所說展轉借象遞結之詳見本卷二十三題算家所用借象金法雙金法俱本此第六界平行方形不滿一線為形小於線若形有餘線不足為形大於線甲乙線其上作甲戊丁丙平行方形不滿甲乙線而丙乙上無形即作己乙線與丁丙平行次引戊丁線遇己乙于己是為甲戊己乙滿甲乙線平行方形則甲丁為依甲乙線之有闕平行方形而丙己平行方形為甲丁之闕形又甲丙線上作甲戊己乙平行方形其甲乙邊大于元設甲丙線之較為丙乙而甲己形大于甲丙線上之甲丁形則甲己為依甲丙線之帶餘平行方形而丙己平行方形為甲己之餘形卷六西洋利瑪竇撰第一題等高之三角形方形自相與為比例與其底之比例等解曰甲乙丙丁戊己兩角形等高其底乙丙戊己丙庚戊辛兩方形等高其底乙丙戊己題言甲乙丙與丁戊己之比例丙庚與戊辛之比例皆若乙丙與戊己論曰試置四形於庚辛子寅兩平行線內凡形自頂至底作垂線即本形之高故等高者必在平行線內見本卷界說四于乙子線內作數底線各與乙丙等為乙壬壬癸癸子于己寅線內作數底線各與戊己等為己丑丑寅次從甲從丁作甲壬甲癸甲子丁丑丁寅諸線其甲乙丙甲乙壬甲壬癸甲癸子四三角形既等底而在平行線內即等一卷三八依顯丁戊己丁己丑丁丑寅三三角形亦等則子丙底線大于乙丙若干倍而甲子丙角形大于甲乙丙亦若干倍依顯戊寅之倍戊己亦若丁戊寅之倍丁戊己底線分數與形之分數等故即用三試法若子丙底大于戊寅底則甲子丙形亦大于丁戊寅形也若等亦等若小亦小也一卷三八則一乙丙所倍之子丙三甲乙丙所倍之甲子丙與二戊己所倍之戊寅四丁戊己所倍之丁戊寅等大小皆同類也而一乙丙底與二戊己底之比例若三甲乙丙與四丁戊己矣五卷六界又丙庚戊辛兩方形各倍大于甲乙丙丁戊己兩角形一卷卅三而甲乙丙與丁戊己之比例既若乙丙與戊己即丙庚與戊辛兩方形之比例亦若乙丙與戊己兩底矣五卷十五或從壬癸子及丑寅各作直線與庚乙辛己平行即依上論推顯增題凡兩角形兩方形各等底其自相與為比例若兩形之高之比例解曰甲乙丙與丁戊己兩角形甲庚乙丙與丁戊己辛兩方形其底乙丙與戊己等題言甲乙丙與丁戊己兩角形之比例甲庚乙丙與丁戊己辛兩方形之比例皆若甲壬與丁癸兩高論曰試作子壬底線與乙丙等作丑癸底線與戊己等次作甲子丁丑兩線其甲壬子與甲乙丙兩角形等底又等高即等依顯丁癸丑與甲乙丙兩角形等底又等高即等依顯丁癸丑與一卷三八丁戊己兩角形亦等即甲乙丙與丁戊己之比例若甲壬子與丁癸丑也五卷七今以甲壬丁癸為底即甲壬子與丁癸丑兩角形之比例若甲壬與丁癸兩底也本篇一而甲乙丙與丁戊乙之比例亦若甲壬與丁癸矣又甲乙丙與丁戊己兩角形之比例既以倍大故若甲庚乙丙與丁戊己辛兩五卷十五方形之比例即兩方形之比例亦若甲壬與五卷十一丁癸兩底也若作庚子辛丑兩線亦依前論推顯第二題二支三角形任依一邊作平行線即此線分兩餘邊以為比例必等三角形內有一線分兩邊以為比例而等即此線與餘邊為平行先解曰甲乙丙角形內如作丁戊線與乙丙平行題言丁戊分甲乙甲丙于丁于戊以為比例必等者甲丁與丁乙若甲戊與戊丙也論曰試作丁丙戊乙兩線其丁戊乙丁戊丙兩角形同一卷三七以丁戊為底同在兩平行線內即等而甲戊丁五卷與丁戊乙兩角形之比例若甲戊丁與丁戊丙矣七夫甲戊丁與丁戊乙兩角形亦在兩平行線內若干戊㸃上作一線與甲乙平行即兩形在其內則甲戊丁與丁戊乙兩角形本篇一之比例若甲丁與丁乙兩底也依顯甲戊與戊兩形丙兩底之比例亦若甲戊丁與丁戊丙兩角形也亦在兩平行線內故是甲丁與丁乙兩線之比例甲戊與戊丙兩線之比例皆若甲戊丁與丁戊乙也或與丁戊丙也丁戊乙與丁戊丙等則甲丁與丁乙亦若甲戊與戊丙也五卷十一後解曰甲乙丙角形內有丁戊線分甲乙甲丙于丁于戊以為比例而等題言丁戊與乙丙為平行線論曰試作丁丙戊乙兩線其甲丁與丁乙兩底之比例若甲戊丁與丁戊乙兩角形也在兩平行線內故見本篇一而五卷十一甲丁與丁乙之比例若甲戊與戊丙即甲戊丁與丁戊乙之比例亦若甲戊與戊丙也又甲戊與戊丙兩底之比例既若甲戊丁與丁戊丙在兩平行線內故見本篇一則甲戊丁與丁戊乙之比例亦若甲戊丁與丁戊丙也五卷十一而丁戊乙與丁戊丙兩角形等矣五卷九兩角形同以丁戊為底一卷卅九而等則在兩平行線內第三題二支三角形任以直線分一角為兩平分而分對角邊為兩分則兩分之比例若餘兩邊之比例三角形分角之線所分對角邊之比例若餘兩邊則所分角為兩平分先解曰甲乙丙角形以甲丁線分乙甲丙角為兩平分題言乙丁與丁丙之比例若乙甲與甲丙論曰試作乙戊線與甲丁平行次于丙甲線引長之一卷草九至戊其甲乙戊與乙甲丁為平行線相對之兩內角等外角丁甲丙與內角戊亦等今乙甲丁與丁一卷六甲丙又等即甲乙戊角與戊角亦等也而甲戊與甲乙兩腰亦等矣則戊甲與甲丙之比例若乙甲五卷七與甲丙也夫戊甲與甲丙之比例若乙丁與丁本篇二丙也則乙甲與甲丙之比例亦若乙丁與丁丙五卷十一也後解曰乙丁與丁丙之比例若乙甲與甲丙題言甲丁線分乙甲丙角為兩平分論曰依前作乙戊線與甲丁平行而引丙甲線至戊其乙甲與甲丙之比例既若乙本篇二丁與丁丙甲丁線又與戊乙邊平行而乙丁與丁丙之比例若戊甲與甲丙即乙甲與甲丙之比例五卷十一亦若戊甲與甲丙是戊甲與乙甲兩線等矣五卷九則甲乙戊角與戊角亦等也一卷五夫甲乙戊與乙一卷草九甲丁為平行線相對之兩內角等而外角丁甲丙與內角戊亦等則乙甲丁丁甲丙兩角必等第四題凡等角三角形其在等角旁之各兩腰線相與為比例必等而對等角之邊為相似之邊解曰甲乙丙丁丙戊兩角形等角者甲乙丙與丁丙戊甲丙乙與丁戊丙乙甲丙與丙丁戊每相當之各角俱等也題言甲乙與乙丙之比例若丁丙與丙戊甲乙與甲一卷草七丙若丁丙與丁戊甲丙與乙丙若丁戊與丙戊而每對等角之邊各相似相似者謂各前各後率各對本形之相當等角論曰試並置兩角形令乙丙丙戊兩底為一直線而丁丙戊為甲乙丙之外角其甲乙丙甲丙乙兩角既小于兩直角丁戊丙與甲丙乙兩角又等即乙戊兩角亦小於兩直角而乙甲戊丁兩線引出之必相遇一卷界說十一即作兩線令遇于己其丁丙戊外角與甲乙丙內角既等即丁丙與己乙為平行線一卷草八依顯甲丙乙外角與丁戊丙內角既等即甲丙與一卷草八己戊亦平行線而甲己丁丙為平行線方行則一卷卅四甲己與丁丙兩線等也甲丙與己丁兩線等也本篇二夫乙戊己角形內之甲丙線既與己戊邊平行即甲乙與等甲己之丁丙之比例若乙丙與丙戊也五卷十六更之即甲乙與乙丙若丁丙與丙戊也又乙戊本篇二己角形內之丁丙線既與己乙邊平行即乙丙與丙戊之比例若等己丁之甲丙與丁戊也更之即五卷十六乙丙與甲丙若丙戊與丁戊也甲乙與乙丙既五卷草二若丁丙與丙戊而乙丙與甲丙又若丙戊與丁戊平之即甲乙與甲丙若丁丙與丁戊也一卷草九一系凡角形內之直線與一邊平行而截一分為角形必與全形相似如上甲乙丙角形作丁戊直線與乙丙平行而截一分為甲丁戊角形必與甲乙丙全形相似何者甲丁戊外角與甲乙丙內角等甲戊丁外角亦與甲丙乙內角等本題甲角又同即兩形相似而各等角旁兩邊之比例等增題凡角形之內任依一邊作一平行線于此邊任取一㸃向對角作直線則所分兩平行線比例等解曰甲乙丙角形內作丁戊線與乙丙平行次于乙丙邊任取己㸃向甲角作直線分丁戊于庚題言乙己與己丙之比例若丁庚與庚戊論曰甲己乙甲庚丁兩角形既相似本系即甲己與己乙之比例若甲庚與庚丁也更之即甲己與甲五卷十六庚若己乙與庚丁也依顯甲己與甲庚若己丙與庚戊也則乙己與丁庚亦若己丙與庚戊也五卷十一更之即乙己與己丙若丁庚與庚戊也五卷十六又論曰甲己乙甲庚丁兩角形甲己丙甲庚戊兩角形既各相似即乙己與甲己之比例若丁庚與庚甲也本系依顯甲己與己丙亦若甲庚與庚戊也平之即乙己與己丙若丁庚與庚戊也五卷草二第五題兩三角形其各兩邊之比例等即兩形為等角形而對各相似邊之角各等解曰甲乙丙丁戊己兩角形其各兩邊之比例等者甲乙與乙丙若丁戊與戊己而乙丙與甲丙若戊己與丁己甲丙與甲乙若丁己與丁戊也題言此兩形為等角形而對各相似邊之角甲與丁乙與戊丙與己各等論曰試作己戊庚角與乙角等作庚己戊角與丙角等而戊庚己庚兩線遇于庚即庚角與甲角等一卷三二是甲乙丙庚戊己兩形等角矣則甲本篇四乙與乙丙之比例若庚戊與戊己也甲乙與乙丙元五卷十一若丁戊與戊己則庚戊與戊己亦若丁戊與戊己也五卷九而丁戊與庚戊兩線必等又乙丙與甲丙之比例若本篇四戊己與庚己而乙丙與甲丙元若戊己與丁己則戊五卷十一己與庚己亦若戊己與丁己也而丁己與庚己兩線五卷九必等夫庚戊庚己兩腰既與丁戊丁己兩腰各等戊己一卷八同底即丁角與庚角亦等其餘庚戊己與丁戊己庚己一卷四戊與丁己戊各相當之角俱等而庚角與甲角既等即丁角與甲角亦等丁戊己角與乙角丁己戊角與丙角俱等第六題兩三角形之一角等而等角旁之各兩邊比例等即兩形為等角形而對各相似邊之角各等解曰甲乙丙丁戊己兩角形其乙與戊兩角等而甲乙與乙丙之比例若丁戊與戊己題言餘角丙與己甲與丁俱等論曰試作己戊庚角與乙角等作庚己戊角與丙角等而戊庚己庚兩線遇于庚依前論推顯甲乙丙庚戊己兩形等角即甲乙與乙丙之比例若庚戊與戊己也本篇四甲乙與乙丙元若丁五卷十一戊與戊己則庚戊與戊己亦若丁戊與戊己也而五卷九丁戊與庚戊兩線必等夫丁戊庚戊兩邊既等戊己同邊庚戊己角與丁戊己角又等丁戊己角與乙角等而己戊庚亦與乙等故即其餘各相當之角俱等一卷四而庚角既與甲角等庚己戊角既與丙角等即甲角丙角與丁角戊己丁角各等而甲乙丙丁戊己為等角形矣第七題兩三角形之第一角等而第二相當角各兩旁之邊比例等其第三相當角或俱小于直角或俱不小于直角即兩形為等角形而對各相似邊之角各等解曰甲乙丙丁戊己兩角形其一甲角與一丁角等而第二相當角如甲丙乙兩旁之甲丙丙乙兩邊偕丁己戊兩旁之丁己己戊兩邊比例等其第三相當角如乙與戊或俱小于直角或俱不小于直角題言兩形等角者謂甲丙乙角與己等乙角與戊等先論乙與戊俱小于直角者曰如云不然一卷卅二而甲丙乙大于己令作甲丙庚角與己等即甲庚丙角宜與戊等甲庚丙與丁戊己為等角形矣即本篇四甲丙與丙庚之比例宜若丁己與己戊而先設五卷十一甲丙與丙乙若丁己與己戊也是甲丙與丙庚亦若甲丙與丙乙也是庚丙與乙丙兩線等也五卷九一卷五丙庚乙與丙乙庚兩角亦等也夫乙既小于直角即等腰內之丙庚乙亦小于直角則較角之丙庚甲必大于直角也丙庚甲丙庚乙兩角等于兩直角見一卷十三而丙庚甲既與戊等則丙庚乙宜大于直角矣其相等之乙角何由得小于直角也後論乙與戊俱不小于直角者曰如云不然依先論一卷十七乙角與丙庚乙角等即丙庚乙亦不小于直角夫丙庚乙丙乙庚同為角形內之兩角乃俱不小于直角何也則甲丙乙不得不等于丁己戊也而其餘一卷卅二乙與戊角等矣第八題直角三邊形從直角向對邊作一垂線分本形為兩直角三邊形即兩形皆與全形相似亦自相似解曰甲乙丙直角三邊形從乙甲丙直角作甲丁垂線題言所分甲丁丙甲丁乙兩三邊形皆與全形相似亦自相似論曰甲乙丙甲丁丙兩形既各以乙甲丙甲丁丙為一卷三直角而丙角又同即其餘甲乙丙丁甲丙兩角必等則甲乙丙甲丁丙兩形必為等角形而等角旁本篇四之各兩邊比例必等等者謂乙丙與甲丙若甲丙與丙丁也甲丙與甲乙若丙丁與甲丁也乙丙與甲乙若甲丙與甲丁也即甲丁丙角形與甲乙丙全形相似矣依顯甲丁乙角形與甲乙丙全形亦相似一卷卅二也何者丙甲乙甲丁乙兩皆直角而乙角又同即其餘甲丙乙丁甲乙兩角必等甲乙丙甲丁乙兩五卷十一形必為等角形而等角旁之各兩邊比例必等故也依顯甲丁乙甲丁丙兩角形亦相似也何者兩形各與全形相似即兩形自相似系從直角作垂線即此線為兩分對邊線比例之中率而直角旁兩邊各為對角全邊與同方分邊比例之中率何者丙丁與丁甲之比例若丁甲與丁乙也故丁甲為丙丁丁乙兩分邊比例之中率也又乙丙與丙甲之比例若丙甲與丙丁也故丙甲為乙丙丙丁之中率也乙丙與乙甲之比例若乙甲與乙丁也故乙甲為乙丙乙丁之中率也第九題一直線求截所取之分法曰甲乙直線求截取三分之一先從甲任作一甲丙線為丙甲乙角次從甲向丙任作所命分之平度如甲丁丁戊戊己為三分也次作己乙直線末作丁庚線與己乙平行即甲庚為甲乙三分之一論曰甲乙己角形內之丁庚線既與乙己邊平行即本篇二己丁與丁甲之比例若乙庚與庚甲也合之己五卷十八甲與甲丁若乙甲與庚甲也而甲丁既為己甲三分之一即庚甲亦為乙甲三分之一也注曰甲乙線欲截取十一分之四先作甲丙線為丙甲乙角從甲向丙任平分十一分至丁次作丁乙線末從甲取四分得戊作戊己線與丁乙平行即甲己為十一分甲乙之四何者依上論丁甲與戊甲之比五卷四例若乙甲與己甲也反之甲戊與甲丁若甲己與甲乙也甲戊為甲丁十一分之四則甲己亦甲乙十一分之四矣依此可推不盡分之數蓋四不為十一之盡分故第十題一直線求截各分如所設之截分法曰甲乙線求截各分如所設甲丙任分之丁戊者謂甲乙所分各分之比例若甲丁丁戊戊丙也先以甲乙甲丙兩線相聮于甲任作丙甲乙角次作丙乙線相聮末從丁從戊作丁己戊庚兩線皆與丙乙平行即分甲乙線于己于庚若甲丙之分于丁于戊論曰甲丁與丁戊之比例既若甲己與己庚本篇二即一卷卅四甲己與己庚亦若甲丁與丁戊也更作丁辛線與甲乙平行而分戊庚于壬即丁戊與戊丙若丁壬與壬辛也亦若等丁壬之己庚與等壬辛之庚乙也本篇二則己庚與庚乙亦若丁戊與戊丙也從此題作一用法平分一直線為若干分如甲乙線求五平分即從甲任作甲丙線為丙甲乙角次從甲向丙任作五平分為甲丁丁戊戊己己庚庚辛次作辛乙直線相聨末作丁壬戊癸己子庚丑四線皆與辛乙平行即壬癸子丑分甲乙為五平分其理依前論推顯又一簡法如甲乙線求五平分即從丙任作丙乙線為丙乙甲角次于乙丙任取一㸃為丁作丁戊線與甲乙平行次從丁向戊任作五平分為丁己己庚庚辛辛壬壬癸而丁癸線令小于甲乙次從甲過癸作甲子線遇乙丙于子末從子作子壬子辛子庚子己四線各引長之而分甲乙于丑于寅于卯于辰為五平分論曰丁戊與甲乙既平行即子壬癸與子丑甲兩一卷草九角子癸壬與子甲丑兩角各等而甲子丑同角即甲子丑癸子壬兩角形相似矣則子癸與癸壬之比例若子甲與甲丑也本篇四依顯子壬與壬辛若子丑與丑寅也又癸壬與壬辛等即子壬與壬癸若子壬與壬辛也五卷七則子丑與丑甲亦若五卷十一子丑與丑寅也而甲丑丑寅兩線等矣依顯寅卯卯辰辰乙俱與甲丑等則甲乙線為五平分又一簡法如甲乙線求五平分即從甲從乙作甲丁乙丙兩平行線次從乙任作戊己庚辛四平分次用元度從甲作壬癸子丑四平分末作戊丑己子庚癸辛壬四線相聨即分甲乙于己于辰于卯于寅為五平分論曰辛庚與壬癸既平行相等即辛一卷卅三壬與庚癸亦平行依顯己子戊本題丑俱平行而甲丑既為四平分則甲己亦四平分依顯乙辛既為四平分則乙寅亦四平分而通甲乙為五平分又用法先作一器丙丁戊己為平行線任平分為若干格每分作平行線相聨今欲分甲乙為五平分即規取甲乙之度以一角抵戊丙線而一角抵庚辛線如不在庚辛者即漸移之令至也既至壬即戊壬之分為甲乙之分論曰庚癸與子辛既平行相等即癸子庚辛亦平一卷卅三行相等而丙丁戊己內諸線俱平行相等戊庚為五平分即戊壬亦五平分矣本題戊壬之度既與甲乙等即自戊至壬諸格分甲乙為五平分也如戊丙線上取丑㸃而甲乙度抵庚辛之外若丑寅即從庚辛線引長之為庚寅而癸子諸線俱引長之其丑寅仍為五平分如前論若所欲分之線極小則製器宜密令相稱焉增題有直線求兩分之而兩分之比例若所設兩線之比例法曰甲乙線求兩分之而兩分之比例若所設丙與丁先從甲任作甲戊線而為甲角次截取甲己與丙等己庚與丁等次作庚乙線聨之末作己辛線與庚乙平行即分甲乙于辛而甲辛與辛乙之比例若丙與丁說見本篇二又增題兩直線各三分之各互為兩前後率比例等即兩中率與兩前兩後率各為比例亦等解曰甲乙丙丁兩線各三分之于戊于己于庚于辛各互為兩前兩後率比例等者甲戊與戊乙若丙庚與庚丁甲己與己乙若丙辛與辛丁也題言中率戊己庚辛各與其前後率為比例亦等者甲戊與戊己若丙庚與庚辛己乙與戊己若辛丁與庚辛也論曰甲戊與戊乙之比例既若丙庚與庚丁即合之甲乙與戊乙若丙丁與庚丁也而甲己與己乙既若丙辛與辛丁即合之甲乙與己乙若丙丁與辛丁也又反之己乙與甲乙若辛丁與丙丁也夫己乙與甲乙既若辛丁與丙丁而甲乙與戊乙又五卷草二若丙丁與庚丁即平之己乙與戊乙亦若辛丁與庚丁也又轉之戊乙與戊己若庚丁與庚辛也又分之己乙與戊己若辛丁與庚辛也此後解也又甲戊與戊乙既若丙庚與庚丁而戊乙與戊己又若庚丁與庚辛即平之甲戊與戊己若丙庚與庚辛也此前解也又簡論曰如後圖聨甲于丙作乙甲丁角次作丁乙辛己庚戊三線相聨其甲戊與戊乙之比例既若丙庚與庚丁即庚戊與丁乙平行本篇二甲己與己乙既若丙辛與辛丁即辛己與丁乙平行本篇二一卷三十而庚戊與辛己亦平行是甲戊與戊己若丙庚與庚辛也己乙與戊己亦若辛丁與庚辛也本篇二第十一題兩直線求别作一線相與為連比例法曰甲乙甲丙兩線求别作一線相與為連比例者合兩線任作甲角而甲乙與甲丙之比例若甲丙與他線也先于甲乙引長之為乙丁與甲丙等次作丙乙線相聨次從丁作丁戊線與丙乙平行末于甲丙引長之遇于戊即丙戊為所求線如以甲丙為前率倣此論曰甲丁戊角形內之丙乙線既與戊丁邊平行即甲乙與乙丁之比例若甲丙與丙戊本篇二也而乙丁甲丙元等即甲乙與甲丙若甲丙與丙戊也五卷七注曰别有一法以甲乙乙丙兩線列作甲乙丙直角次以甲丙線聨之而甲乙引長之末從丙作丙丁為甲丙之垂線遇引長線于丁即乙丁為所求線論曰甲丙丁角形之甲丙丁既為直角而從直角至甲丁底有丙乙垂線即丙乙為甲乙乙丁比例之中率本篇八之系則甲乙與乙丙若乙丙與乙丁也既從一二得三即從二三求四以上至于無窮俱倣此第十二題三直線求别作一線相與為斷比例法曰甲乙乙丙甲丁三直線求别作一線相與為斷比例者謂甲丁與他線之比例若甲乙與乙丙也先以甲乙乙丙作直線為甲丙次以甲丁線合甲丙任作甲角次作丁乙線相聨次從丙作丙戊線與丁乙平行末自甲丁引之遇丙戊于戊即丁戊為所求線論曰甲丙戊角形內之丁乙線既與丙戊邊平行即本篇二甲丁與丁戊之比例若甲乙與乙丙第十三題兩直線求别作一線為連比例之中率法曰甲乙乙丙兩直線求别作一線為中率者謂甲乙與他線之比例若他線與乙丙也先以兩線作一直線為甲丙次以甲丙兩平分于戊次以戊為心甲丙為界作甲丁丙半圜末從乙至圜界作乙丁垂線即乙丁為甲乙乙丙之中率論曰試從丁作丁甲丁丙兩線即甲丁丙為直角三卷卅一而直角所下乙丁垂線兩分對邊線甲丙其甲乙與乙丁若乙丁與乙丙也本篇八之系則乙丁為甲乙乙丙之中率注曰依此題可推凡半圜內之垂線皆為分徑線之中率線如甲乙丙半圜其乙丁為甲丁丁丙之中率己戊為甲戊戊丙之三卷卅一中率辛庚為甲庚庚丙之中率也何者半圜之內從垂線作角皆為直角故依前論推顯各為中率也增題一直線有他直線大于元線二倍以上求分他線為兩分而以元線為中率法曰甲乙線大于甲丙二倍以上求兩分甲乙而以甲丙為中率先以甲乙甲丙聨為丙甲乙直角而兩平分甲乙于下次以丁為心甲乙為界作甲戊乙半圜次從丙作丙戊線與甲乙平行而遇半圜界于戊末從戊作戊己垂線而分甲乙于己即戊己為甲己己乙兩分之中率論曰試作戊甲戊乙兩線依本題論即戊己為甲己己乙之中率而甲丙戊己為平行方形即丙甲與戊己等一卷卅四則丙甲亦甲己己乙之中率也第十四題二支兩平行方形等一角又等即等角旁之兩邊為互相視之邊兩平行方形之一角等而等角旁兩邊為互相視之邊即兩形等先解曰甲乙丙辛乙戊己庚兩平行方形等甲乙丙戊乙庚兩角又等題言此兩角各兩旁之兩邊為互相視之邊者甲乙與乙庚之比例若戊乙與乙丙也論曰試以兩等角相聨于乙令甲乙乙庚為一直線其甲乙丙與戊乙庚既等角即戊乙乙丙亦一直線一卷十五增題次從辛丙己庚各引長之遇于丁其辛乙乙己兩平行方形既等即辛乙與乙丁兩形之比例若乙己與乙丁五卷七也而辛乙與乙丁俱在兩平行線之內等高即本篇辛乙與乙丁兩形之比例若其底甲乙與乙庚也一依顯乙己與乙丁兩形亦若其底戊乙與乙丙也則甲乙與乙庚亦若戊乙與乙丙也後解曰甲乙丙戊乙庚等角兩旁之各兩邊為互相視之邊者甲乙與乙庚若戊乙與乙丙也題言辛乙乙己兩平行方形等論曰依上論以兩等角相聨其甲乙與乙庚之比例本篇一既若戊乙與乙丙而甲乙與乙庚兩底之比例若平行等高之辛乙與乙丁兩形戊乙與乙丙兩底五卷九之比例若平行等高之乙己與乙丁兩形則辛乙與乙丁若乙己與乙丁矣而辛乙乙己兩形安得不等第十五題二支相等兩三角形之一角等即等角旁之各兩邊互相視兩三角形之一角等而等角旁之各兩邊互相視即兩三角形等先解曰甲乙丙乙丁戊兩角形等兩乙角又等題言等角旁之各兩邊互相視者謂甲乙與乙戊之比例若丁乙與乙丙也論曰試以兩等角相聨于乙令甲乙乙戊為一直線其甲乙丙丁乙戊既等角即丁乙乙丙亦一直線一卷十五增題次作丙戊線相聨其甲乙丙乙丁戊兩五卷七角形既等即甲乙丙與乙丙戊之比例若乙丁戊與乙丙戊也夫甲乙丙與乙丙戊兩等高形之比例若其底甲乙與乙戊也而乙丁戊與乙丙戊兩等高形亦若其底丁乙與乙丙也則甲乙與乙戊若丁乙與乙丙後解曰兩乙角等而乙旁各兩邊甲乙與乙戊之比例若丁乙與乙丙題言甲乙丙乙丁戊兩角形等論曰依前列兩形令等角旁兩邊各為一直線其甲五卷九乙與乙戊之比例既若丁乙與乙丙而甲乙與乙戊兩底又若其上甲乙丙乙丙戊兩等高角形丁乙與乙丙兩底又若其上乙丁戊乙丙戊兩等高角形則甲乙丙與乙丙戊之比例若乙丁戊與乙丙戊矣而甲乙丙與乙丁戊豈不相等第十六題二支四直線為斷比例即首尾兩線矩內直角形與中兩線矩內直角形等首尾兩線與中兩線兩矩內直角形等即四線為斷比例先解曰甲乙己庚戊己乙丙四直線為斷比例者謂甲乙與己庚若戊己與乙丙也而甲乙丙丁為甲乙乙丙首尾兩線矩內直角形戊己庚辛為戊己己庚中兩線矩內直角形題言甲丙戊庚兩形等論曰兩形之乙與己既等為直角而甲乙與己庚之本篇十四比例若戊己與乙丙是乙己等角旁之各兩邊互相視而甲丙戊庚兩直角形必等後解曰甲丙戊庚兩直角形等題言四線之比例等者謂甲乙與己庚若戊己與乙丙也論曰甲丙戊庚兩形之乙與己既等為直角即等角本篇十四旁之各兩邊互相視而甲乙與己庚之比例若戊己與乙丙也則四線為斷比例矣注曰若平行斜方形而等角亦同此論如上圖以上二題即算家句股法三數算法所賴也第十七題二支三直線為連比例即首尾兩線矩內直角形與中線上直角方形等首尾線矩內直角形與中線上直角方形等即三線為連比例先解曰甲乙戊己乙丙三線為連比例者甲乙與戊己若戊己與乙丙也而甲乙丙丁為甲乙乙丙首尾線矩內直角形戊己庚辛為戊己上直角方形題言甲丙戊庚兩形等論曰試作己庚線與戊己等即甲乙乙丙己庚戊己為比例等等者謂甲乙與戊己若己庚與乙丙也則戊己己庚矩內直角形即戊己上直角方形與甲乙乙丙首尾本篇十六線矩內之甲丙形等矣後解曰甲丙直角形與戊庚直角方形等題言甲乙與戊己之比例若戊己與乙丙論曰甲丙戊庚既皆直角形即甲乙與戊己之比例本篇十六若己庚與乙丙也而己庚與乙丙亦若等己庚五卷七之戊己與乙丙則甲乙與戊己若戊己與乙丙矣注曰若平行斜方形而等角亦同此論如上圖系凡直線上直角方形與他兩線所作矩內直角形等即此線為他兩線之中率何者依上後論甲乙乙丙矩內直角形與戊己上直角方形等即可推甲乙與戊己若戊己與乙丙而戊己為甲乙乙丙之中率故第十八題直線上求作直線形與所設直線形相似而體勢等法曰如甲乙線上求作直線形與所設丙丁戊己庚形相似而體勢等先于設形任從一角向各對角各作直線而分本形為若干角形如上設形則從己向丙向丁作兩直線而分為丙丁己丁己戊丙己庚三三角形也一卷卅二次于元線上作乙甲壬甲乙壬兩角與丁丙己丙丁己兩角各等其甲壬乙壬兩線遇于壬即甲壬乙與丙己丁兩角亦等而甲壬乙與丙己丁兩形為等角形矣次作乙壬辛壬乙辛兩角與丁己戊己丁戊兩角各等其壬辛乙辛兩線遇于辛即乙辛壬與丁戊己兩角亦等而乙壬辛與丁己戊兩形為等角形矣末依上作甲壬癸與丙己庚亦為等角形即甲乙辛壬癸與丙丁戊己庚兩形等角則相似而體勢等凡設多角形俱倣此論曰壬甲乙角與己丙丁角既等而壬甲癸角與己本篇四丙庚角又等即乙甲癸全角與丁丙庚全角等依顯甲乙辛與丙丁戊兩全角亦等而其餘各全角俱等則甲乙辛壬癸與丙丁戊己庚為等角形矣又甲乙與乙壬之比例既若丙丁與丁己而乙壬與乙辛亦若丁己與丁戊平之即甲乙與乙辛亦若丙丁與丁戊也五卷草二則甲乙辛丙丁戊兩等角旁各兩邊之比例等也而辛戊兩等角旁各兩邊之比例亦等也兩形等角即等角旁各兩邊之比例等見本篇四又辛壬與壬乙之比例既若戊己與己五卷草二丁而壬乙與壬甲亦若己丁與己丙壬甲與壬癸亦若己丙與己庚平之即辛壬與壬癸亦若戊己與巳庚也則辛壬癸戊己庚兩等角旁各兩邊之比例等也依顯餘角俱如是則兩形為等角形而各等角旁各兩邊之比例俱等是兩形相似而體勢等注曰凡線上形相當之各角等即形相似而體勢等如上甲乙丙丁戊己兩角形其乙丙戊己線上之乙角丙角與戊角己角相當相等者是也若兩形在乙丙丁戊兩線上則雖相似而體勢不等又如上甲丙戊庚兩直角形其甲丁與丁丙之比例若戊辛與辛庚而餘邊之比例俱等亦形相似而體勢等若甲丙壬庚兩直角形雖角旁比例等而在丁丙庚辛線上不相當則體勢不等增作本題别有一簡法如設甲乙丙丁戊己直線形求于庚線上作直線形與相似而體勢等先于甲角旁之甲乙甲己兩線任引出之為甲辛甲丑次從甲向各角各任作直線為甲壬甲癸甲子次于甲乙線上截取甲辛與庚線末從辛作辛壬線與乙丙平行作壬癸與丙丁癸子與丁戊子丑與戊己各平行即所求論曰兩形之甲角既同甲乙丙甲己戊兩角與甲一卷草九辛壬甲丑子兩角各等而甲丙乙甲丙丁兩角與甲壬辛甲壬癸兩角各等即乙丙丁與辛壬癸兩全角亦等依顯丙丁戊丁戊己與壬癸子癸子丑各全角各等則甲乙丙丁戊己與甲辛壬癸子丑兩直線形為等角形矣又甲辛壬甲壬癸甲癸子甲子丑四三角形與甲乙丙甲丙丁甲丁戊甲戊己四三角形各相似本篇四之系即甲乙與乙丙之比例若甲辛與辛壬也而乙丙與丙甲若辛壬與壬甲也丙甲與丙丁若壬甲與壬癸也平之則乙丙與丙丁亦若辛壬與壬癸也依顯餘邊俱如是則兩形相似而體勢等也第十九題相似三角形之比例為其相似邊再加之比例解曰如甲乙丙丁戊己兩角形等角其乙與戊丙與己相當之角各等而甲乙與乙丙之比例若丁戊與戊己題言兩形之比例為乙丙與戊己兩邊再加之比例先論曰若兩角形等即乙丙與戊己兩邊亦等而各兩等邊為相同之比例即兩形亦相同之比例就令作再加之比例亦未免為相同之比例則相等之兩形即可為兩等邊再加之比例矣後論曰若乙丙邊大于戊己邊即于乙丙線上截取本篇十一乙庚為連比例之第三率令乙丙與戊己之比例若戊己與乙庚也次作甲庚直線其甲乙與乙丙之比例若丁戊與戊己更之即甲乙與丁戊若乙丙與戊己也而乙丙與戊己若戊己與乙庚則甲乙與丁戊若戊己與乙庚也夫甲乙庚與丁戊己兩角形有乙戊兩本篇十五等角而各兩旁之兩邊又互相視即兩形等則五卷七甲乙丙形與丁戊己形之比例若甲乙丙形與甲乙庚形矣又甲乙丙與甲乙庚兩等高角形之比本篇一例若乙丙底與乙庚底則甲乙丙形與丁戊己形之比例亦若乙丙底與乙庚底也既乙丙戊己乙庚三線為連比例則一乙丙與三乙庚之比例為一乙丙與二戊己再加之比例矣是甲乙丙與丁戊己兩形之比例為乙丙與戊己再加之比例也系依本題可顯凡三直線為連比例即第一線上角形與第二線上角形之比例若第一線與第三線之比例如上甲乙丙三直線為連比例其甲與乙上各有角形相似而體勢等則一甲線與三丙線之比例若甲形與乙形也何者甲線與丙線之比例為甲線與乙線再加之比例而甲形與乙形之比例亦甲線與乙線再加之比例則甲形與乙形之比例若甲線與丙線矣依顯二乙上角形與三丙上角形相似而體勢等則二乙形與三丙形之比例若一甲線與三丙線第二十題三支以三角形分相似之多邊直線形則分數必等而相當之各三角形各相似其各相當兩三角形之比例若兩元形之比例其元形之比例為兩相似邊再加之比例先解曰此甲乙丙丁戊彼己庚辛壬癸兩多邊直線形其乙甲戊庚己癸兩角等餘相當之各角俱等而各等角旁各兩邊之比例各等題先言各以角形分之其角形之分數必等而相當之各角形各相似論曰試從乙甲戊庚己癸兩角向各對角俱作直線為甲丙甲丁己辛己壬其元形本篇六既相似即角數等而所分角形之數亦等又乙角既與庚角等而角旁各兩邊之比例亦等即甲乙丙與己庚辛兩角形必相似乙甲丙與庚己辛兩角本篇四甲丙乙與己辛庚兩角各等而各等角旁各兩邊之比例各等依顯甲戊丁己癸壬兩角形亦相似又甲丙與丙乙之比例既若己辛與辛庚而丙乙與丙丁若辛庚與辛壬兩元形相似故平之即甲丙與丙丁若五卷草二己辛與辛壬也又乙丙丁角既與庚辛壬角等本篇六而各減一相等之甲丙乙角己辛庚角即所存甲丙丁角與己辛壬角必等則甲丙丁與己辛壬兩角形亦等角形亦相似矣次解曰題又言各相當角形之比例若兩元形之比例論曰甲乙丙己庚辛兩角形既相似即兩形之比例本篇十九為甲丙己辛兩相似邊再加之比例依顯甲丙五卷十二丁己辛壬之比例亦為甲丙己辛再加之比例則甲乙丙與己庚辛兩角形之比例若甲丙丁與己辛壬兩角形之比例依顯甲丁戊與己壬癸之比例亦若甲丙丁與己辛壬之比例則此形中諸角形之比例若彼形中諸角形之比例此諸形為前率彼諸形為後率而一前與一後之比例又若并前與并後之比例即此一角形與相當彼一角形之比例若此元形與彼元形之比例矣後解曰題又言兩多邊元形之比例為兩相似邊再加之比例論曰甲乙丙與己庚辛兩角形之比例既若甲乙丙本篇十九丁戊與己庚辛壬癸兩多邊形之比例而甲乙丙與己庚辛兩形之比例為甲乙己庚兩相似邊再加之比例則兩元形亦為甲乙己庚再加之比例增題此直線倍大于彼直線則此線上方形與彼線上方形為四倍大之比例若此方形與彼方形為四倍大之比例則此方形邊與彼方形邊為二倍大之比例先解曰甲線倍乙線題言甲上方形與乙上方形為四倍大之比例論曰凡直角方形俱相似本卷界說一依本題論則甲方形與乙方形之比例為甲線與乙線再加之比例甲線與乙線既為倍大之比例則兩方形為四倍大之比例矣何者四倍大之比例為二倍大再加之比例若一二四為連比例故也後解曰若甲上方形與乙上方形為四倍大之比例題言甲邊與乙邊為二倍大之比例論曰兩方形四倍大之比例既為兩邊再加之比例則甲邊二倍大于乙邊系依此題可顯三直線為連比例如甲乙丙則第一線上多邊形與第二線上相似多邊形之比例若第一線與第三線之比例此系與本篇第十九題之系同論第二十一題兩直線形各與他直線形相似則自相似解曰甲乙丙丁戊己兩直線形各與庚辛壬形相似題言兩形亦自相似論曰甲乙丙形之各角既與庚辛壬形之各角等而丁戊己形之各角亦與庚辛壬形之各角等即兩形之各角自相等公論兩形之各角既等則甲乙丙形與庚辛壬形各等角旁各邊之比例等五卷十一而丁戊己形與庚壬辛形各等角旁各邊之比例亦等也是甲乙丙形與丁戊己形各等角旁各邊之比例亦等也各角既等各邊之比例又等即兩形定相似矣本卷界說一第二十二題二支四直線為斷比例則兩比例線上各任作自相似之直線形亦為斷比例兩比例線上各任作自相似之直線形為斷比例則四直線為斷比例先解曰甲乙丙丁戊己庚辛四直線為斷比例者甲乙與丙丁若戊己與庚辛也今于甲乙丙丁上各任作直線形自相似如甲乙壬丙丁癸于戊己庚辛上各任作直線形自相似如戊己丑子庚辛卯寅題言四形亦為斷比例者謂甲乙壬與丙丁癸若戊丑與庚卯也論曰試以甲乙丙丁兩線求其連比本篇十一例之末率線為辰次以戊己庚辛兩線求其連五卷草二比例之末率線為己平之即甲乙與辰之比例若戊己與己也夫甲乙壬與丙丁癸兩相似形之比例若甲乙線與辰線本篇十九及草之系而戊丑與庚卯兩相似形之比例若戊己線與己線則甲乙壬與丙丁癸之比例亦若戊丑與庚卯五卷十一矣後解曰如前四形為斷比例題言甲乙丙丁戊己庚辛四線亦為斷比例論曰試以甲乙丙丁戊己三線求其斷本篇十二比例之末率線為午未次于午未上作直線形本篇十八與戊丑相似而體勢等為午未酉申午酉與戊五卷十一丑相似即與庚卯亦相似而甲乙與丙丁之比例既若戊己與午未依上論即甲乙壬與丙丁癸兩形之比例若戊丑與午酉矣夫甲乙壬與丙丁癸之比例元若戊丑與庚卯則戊丑與午酉亦若戊丑與庚卯也而午酉與庚卯等也五卷九午酉與庚卯既等又相似而體勢等即兩形必在等線之上而庚辛與午未必等見下方補論則戊己與午未之比例若戊己與庚五卷十四辛也而戊己與午未元若甲乙與丙丁則甲乙與丙丁亦若戊己與庚辛也補論曰庚卯午酉兩直線形相等相似而體勢等即在等線之上者何也蓋庚辛與午未若云不等者或言庚辛大于午未也則辛卯宜亦大于未酉矣而庚卯形宜亦大于午酉形矣何先設兩形等也言小倣此補論者前此未著而論中無他論可徵故别作一論以足未備又補論曰甲乙丙丁戊己兩直線形相等相似而體勢等即相似邊如甲乙與丁戊必等者何也蓋云不等者或言甲乙大于丁戊也即令以甲乙丁戊兩線求其連比例之末率線為庚本篇十一其甲乙與丁戊既若丁戊與庚而甲乙大于丁戊即丁戊宜大于庚即甲乙宜更大于庚矣然甲乙與庚之比例若甲乙丙形與丁戊己形本篇十九及草之系甲乙既大于庚則甲乙丙宜大于丁戊己何先設兩形等也是甲乙不能大于丁戊矣言小倣此增論曰本題别有簡論今先顯四線之比例等而甲本篇十九乙壬與丙丁癸兩形之比例若戊丑與庚卯兩形者蓋甲乙與丙丁之比例若戊己與庚辛而甲乙壬與丙丁癸之比例為甲乙與丙丁再加之比例戊丑與庚卯之比例亦為戊己與庚辛再加之比例是甲乙壬與丙丁癸若戊丑與庚卯也次增論曰今顯四形之比例等而甲乙與丙丁兩線之比例若戊己與庚辛兩線者蓋甲乙壬與丙丁癸之比例若戊丑與庚卯而甲乙壬與丙丁癸之比例為甲乙與丙丁再加之比例若戊丑與庚本篇十九卯為戊己與庚辛再加之比例則甲乙與丙丁之比例若戊己與庚辛矣第二十三題等角兩平行方形之比例以兩形之各兩邊兩比例相結解曰甲丙丙己兩平行方形之乙丙丁戊丙庚兩角等題言兩形之比例以各等角旁各兩邊之比例相結者謂兩比例之前率在此形兩比例之後率在彼形如甲丙與丙己之比例以乙丙與丙庚偕丁丙與丙戊相結也或以乙丙與丙戊偕丁丙與丙庚相結也論曰試以兩等相聨于丙而乙丙丙庚作一直線其乙丙丁角既與戊丙庚角等即戊丙丙丁亦一直線一卷十五增次于甲丁己庚各引長之遇于辛次任作一本篇十二壬線次以乙丙丙庚壬三線求其斷比例之末率線為癸末以丁丙丙戊癸三線求其斷比例之末本篇一率線為子其乙丙與丙庚兩底之比例既若甲丙與丙辛兩形而乙丙與丙庚亦若壬與癸則甲丙五卷十一與丙辛亦若壬與癸也依顯丙辛與丙己亦若五卷草二癸與子也平之即甲丙與丙己若壬與子也夫本卷壬與子之比例元以壬與癸癸與子兩比例相結界說五而壬與癸癸與子元若乙丙與丙庚丁丙與丙戊則甲丙與丙己之比例以乙丙與丙庚偕丁丙與丙戊兩比例相結也其以乙丙與丙戊偕丁丙與丙庚相結則先以乙丙丙戊為一直線可依上推顯後注曰此不同理之比例也兩形不相似本篇十九又本篇十四不相等之形也等角旁各兩邊不互相視故必用相結之理必須借象之術其法假虛形實所以通比例之窮也以數明之乙丙六十丙庚二十壬三求得癸一丁丙四十丙戊八十癸一求得子二即甲丙之實二千四百與丙己之實一千六百若壬三與子二為等帶半之比例也其曰壬與癸癸與子兩比例相結者壬三倍大于癸癸反二倍大于子反二倍者癸得子之半三乘半得一五則壬與子為等帶半之比例也其曰借象者乙丙與丙庚丁丙與丙戊二比例既不同理又異中率故借壬與癸癸與子同中率而不同理之二比例以為象本卷界說五初作壬與癸若乙丙與丙庚次作癸與子若丁丙與丙戊本篇十二則癸為前率之後又為後率之前是為壬子首尾兩率之樞紐令相象之丙庚丁丙亦化兩率為一率為乙丙丙戊首尾兩率之樞紐因以兩比例相結為首尾兩率之比例雖不能使三率為同理之兩比例而合為一連比例亦能使兩不同理之比例首尾合而為一比例矣自三以上可倣此相借以至無窮也本卷界說五第二十四題平行線方形之兩角線方形自相似亦與全形相似解曰甲乙丙丁平行方形作甲丙對角線任作戊己庚辛兩線與丁丙乙丙平行而與對角線交相遇于壬題言戊庚己辛兩角線方形自相似亦與全形相似論曰試依一卷草九題推顯兩角線形等角又庚甲一卷草九戊與乙甲丁同角而甲戊壬外角與甲丁丙內角等甲庚壬外角與甲乙丙內角等戊壬庚外角與乙己壬內角等乙己壬外角又與乙丙丁內角等則戊庚形與甲丙全形等角矣依顯己辛形亦與全形等角矣今欲顯兩形與全形相似者試觀甲庚壬與甲乙丙兩角形甲戊壬與甲丁丙兩角形既各等角可推仍見本篇四之系即甲乙與乙丙之比例若甲庚與庚壬六卷四而庚乙兩角旁各兩邊之比例等也又乙丙與五卷草二丙甲之比例若庚壬與壬甲丙甲與丙丁之比例若壬甲與壬戊平之即乙丙與丙丁若庚壬與壬戊也則乙丙丁庚壬戊兩角旁各兩邊之比例等也依顯各角旁各兩邊之比例皆等是兩角線方形自相似亦與全形相似第二十五題兩直線形求作他直線形與一形相似與一形相等法曰甲乙兩直線形求作他直線形與甲相似與乙相等先于求相似之甲形任取一邊如丙丁于丙丁邊上作平行方形與甲等為丙戊一卷四四四五次于丁戊邊上作平行方形與乙等而戊丁庚角與丁丙己角等為丁辛其丙丁庚己戊辛俱為直線也一卷四五可推次作一壬癸線為丙丁丁庚之中率本篇十三本篇十八末于壬癸上作子形與甲相似而體勢等即子形與乙等論曰丙丁壬癸丁庚三線既為連比例即依本篇二本篇一十題之系可顯一丙丁與三丁庚之比例若一丙丁上之甲與二壬癸上之子兩形相似而體勢等者之比例也又丙丁與丁庚之比例若丙戊與丁辛兩等高平行方形之比例也則丙戊與丁辛若甲與子矣夫丙戊與丁辛元若甲與乙也丙戊與甲等丁辛與乙等則五卷十一甲與乙之比例若甲與子也而乙形與子形等五卷九矣第二十六題平行方形之內減一平行方形其減形與元形相似而體勢等又一角同則減形必依元形之對角線解曰乙丁平行方形之內減戊庚平行方形元形減形相似而體勢等又戊甲庚同角題言戊庚形必依乙丁形之對角線論曰試作甲己己丙對角兩線若兩線為一直線即顯戊庚形依甲丙對角線矣如云甲己己丙非一直線令别作元本篇草四形之對角線而分戊己邊于辛即作辛壬線與己庚平行其乙丁戊壬兩平行方形既同依甲辛丙一直對角線則宜相似而體勢等矣是乙甲與甲丁之比例宜若戊甲與甲壬也夫乙甲與甲丁元若戊甲與甲庚元設形相似而體勢等今若所云則戊甲與甲庚亦五卷十一若戊甲與甲壬矣而甲壬分與甲庚全亦等矣五卷九可乎若云甲辛丙分己庚于辛即令作辛壬與己戊平行依前論駁之第二十七題凡依直線之有闕平行方形不滿線者其闕形與半線上之闕形相似而體勢等則半線上似闕形之有闕依形必大于此有闕依形解曰甲乙線平分于丙于半線丙乙上任作丙丁戊乙平行方形其對角線乙丁次作甲乙戊辛滿元線平行方形即甲丁為甲丙半線上之有闕依形丙戊為丙乙半線上之闕形本卷界說六此兩形相等相似勢體又等題言甲乙線上凡作有闕依形不滿線者其闕形與丙戊相似而體勢等即甲丙半線上之甲丁有闕依形必大于此有闕依形論曰試于乙丁對角線上任取一㸃為庚從庚作己本篇草四庚壬線庚癸線與甲乙乙戊各平行即得甲庚為依甲乙元線之有闕平行方形而癸壬為其闕形此癸壬闕形既依乙丁對角線則與丙戊闕形相似而體勢等夫丙庚庚戊兩餘方形既等一卷四三若每加一卷三六一癸壬角線方形即丙壬與癸戊亦等也又丙壬與丙己俱在兩平行線內底等即兩形等而丙己與癸戊兩形亦等若每加一丙庚形是甲庚平行方形與子丑磬折形亦等也丙戊平行方形函子丑磬折形之外尚有庚丁形則丙戊形必大于子丑磬折形而等丙戊之甲丁形丙戊甲丁同在兩平行線內又等底故見一卷三六必大于等磬折形之甲庚形矣依顯凡依乙丁對角線作形與丙戊相形者其有闕依形俱小于甲丁也為其必有庚丁之較故也又論甲丁必大于甲庚曰己丁丁壬兩平行方形同在兩平行線內又底等即兩形一卷卅六等而庚戊為丁壬之分則丁壬大于庚戊較餘一庚丁形其大于丙庚亦如之庚戊丙庚兩餘方形等故見一卷四三即等丁壬之己丁形其大于丙庚亦較餘一庚丁形也次每加一丙己形則甲丁必大于甲庚矣又解曰若庚㸃在丙戊形外即引乙丁對角線至庚從庚作辛丑線與癸戊平行次引甲癸線至辛引乙戊線至丑而與辛丑線遇于辛于丑末作庚己線與辛甲平行即得甲庚為依甲乙元線之有闕平行方形又得己丑與丙戊相似而體勢等者兩形同依乙庚對角線故見本篇草四為其闕形也題言甲丁形亦大于甲庚形論曰試于丙丁線引出之至子即辛子子丑兩線等一卷卅四而辛丁丁丑兩形亦等一卷卅六其丁丑己丁兩餘方形既等即己丁與辛丁亦等夫辛丁大于辛壬既較餘一庚丁形則己丁之大于辛壬亦較餘一庚丁形也此兩率者每加一甲壬平行方形則甲丁大于甲庚者亦較餘一庚丁形矣依顯凡乙丁對角線引出丙戊形外依而作形與丙戊相似者其有闕依形俱小于甲丁也為其必有庚丁之較故也第二十八題一直線求作依線之有闕平行方形與所設直線形等而其闕形與所設平行方形相似其所設直線形不大于半線上所作平行方形與所設平行方形相似者法曰甲乙線求作依線之有闕平行方形與所設直本篇十八線形丙等而其闕形與所設平行方形丁相似先以甲乙線兩平分于戊次于戊乙半線上作戊己庚乙平行方形與丁相似而體勢等次作甲辛庚乙滿元本篇草五線平行方形若甲己平行方形與丙等者即得所求矣若甲己大于丙者題言甲己小即不可作見本篇草七即等甲己之戊庚亦大于丙也則尋戊庚之大于丙幾何假令其較為壬兩直線形不等相減之較法見一卷四五增即作癸子丑寅平行本篇草五方形與壬等又與戊庚形相似而體勢則戊庚本篇草六平行方形與丙直線形及癸丑平行方形并等而戊庚必大于癸丑矣夫戊庚與癸丑既相似即戊己與巳庚兩邊之比例若寅癸與癸子也而戊庚既大于癸丑即戊己己庚兩邊亦大于寅癸癸子也次截取己巳己卯與癸子癸寅等而作己己辰卯平行方形必與癸丑形相等相似而體勢等矣又卯己形既與戊庚相似而體勢等必同依乙己對角線也次于己辰線本篇草四引出抵甲乙元線于卯辰兩界各引出作午未線即甲辰為依甲乙線之有闕平行方形與丙等而其闕形乙辰與戊庚相似即亦與丁相似論曰辰庚與辰戊兩餘方形既等一卷四三每加一乙辰角線方形即乙己與戊午亦等而與等戊午之戊未亦等戊午戊未同在平行線內又底等故見一卷卅六乙己與戊未既等又每加一申辰方形即甲辰平行方形與申酉罄折形亦等矣夫申酉罄折形為戊庚形之分而戊庚與丙及癸丑等戊庚所截去之卯己又與癸丑等則申酉罄折形與丙等也而甲辰亦與丙等也第二十九題一直線求作依線之帶餘平行方形與所設直線形等而其餘形與所設平行方形相似法曰甲乙線求作依線之帶餘平行本篇十八方形與所設直線形丙等而其餘形與所設平行方形丁相似先以甲乙線兩平分于戊次于戊乙半線上作戊己庚乙平行方形與丁相似而體勢等次别作一平行方形與丙及二卷十四戊庚并等為辛次别作一平行方形與辛等又本篇草五與丁相似而體勢等為壬癸子丑其丑癸既與辛等即大于戊庚而丑癸既與戊庚相似即丑壬與壬癸兩邊之比例若戊己與己庚也而丑壬與壬癸兩線必大於戊巳與巳庚也若等或小即丑癸不大於戊庚次於巳本篇草六戊引之至卯與壬丑等於巳庚引之至寅與壬癸等而作卯寅平行方形即卯寅與丑癸同依辰巳對角線而等又與戊庚相似而體勢等矣次于甲乙本篇草四引之至巳庚乙引之至午於午卯引之至未末作甲未線與己卯平行即得甲辰帶餘平行方形依甲乙線與丙等而己午為其餘形與戊庚形相似而體勢等即與丁相似而體勢等論曰甲卯戊午兩形既等一卷卅六戊午與乙寅兩餘方一卷四三形又等則甲卯與乙寅亦等矣而每加一卯己形則甲辰平行方形與戊辰寅罄折形亦等矣夫戊辰寅罄折形元與丙等丑癸即卯寅與丙及戊庚并等每減一戊庚即罄折形與丙等即甲辰亦與丙等第三十題一直線求作理分中末線法曰甲乙線求理分中末先于元線作甲乙丙丁直角方形次依丁甲邊作丁己帶本篇草九餘平行方形與甲丙直角方形等而甲己為其餘形又與甲丙形相似即甲己亦直角方形矣惟直角方形恆與直角方形相似則戊己線分甲乙于辛為理分中末線也本卷界說三論曰丁己與甲丙兩形既等每減一甲戊形即所存甲己辛丙兩形亦等矣此兩形之甲辛己戊辛乙兩角既等兩皆直角故即兩角旁之各兩邊線為互相視之本篇十四線也而等戊辛之甲乙線與等辛己之甲辛線其為比例若甲辛與辛乙也是甲辛乙線為理分中末也又論曰甲乙甲辛辛乙凡三線而第一第三矩內之本篇十七辛丙直角形與第二甲辛上直角方形等即三線為連比例而甲乙與甲辛若甲辛與辛乙矣又法曰甲乙線求分于丙而甲乙偕丙乙矩內直角形與甲丙上直角方形等二卷十一即甲乙之分于丙為理分中末線蓋甲乙甲丙丙乙三線本篇草七為連比例故第三十一題三邊直角形之對直角邊上一形與直角旁邊上兩形若相似而體勢等則一形與兩形并等解曰甲乙丙三邊直角形乙甲丙為直角于乙丙上任作直線形為乙丙丁戊次于甲乙甲丙上亦作甲乙己庚甲丙壬辛兩形與乙丁形相似而體勢等本篇十八題言乙丁形與乙庚丙辛兩形并等論曰試從甲作甲癸為乙丙之垂線依本篇第八題之系即乙丙與丙甲兩邊之比例若丙甲與丙癸兩邊則一乙丙邊與三丙癸邊之比例若一乙丙上之乙丁形與二甲丙上之丙辛形也本篇十九或二十之系反之則丙癸與乙丙兩邊之比例若丙辛與乙丁兩形也依顯乙癸與乙丙兩邊之比例若乙庚與乙丁兩形也乙丙乙甲乙癸三邊為連比例故見本篇八之系夫一丙癸與二乙丙之五卷草四比例既若三丙辛與四乙丁而五乙癸與二乙丙之比例亦若六乙庚與四乙丁則一丙癸五乙癸并與二乙丙之比例若三丙辛六乙庚并與四乙丁也既一丙癸五乙癸并與二乙丙等則三丙辛六乙庚并與四乙丁亦等又論曰甲乙丙與癸甲丙兩角形既相似而甲乙丙角形其乙丙與丙甲之比例若癸甲丙角形之丙甲與丙癸本篇八即乙丙與丙甲兩邊相似則癸甲丙與本篇十九甲乙丙兩角形之比例為丙甲與乙丙再加之比例而丙辛與乙丁兩形之比例亦為丙甲與乙丙再加之比例本篇十九二十則癸甲丙與甲乙丙兩角形之五卷十一比例若丙辛與乙丁兩形也依顯癸乙甲與甲五卷草四乙丙兩角形之比例若乙庚與乙丁兩形也是一甲癸丙與二甲乙丙之比例若三丙辛與四乙丁也而五癸乙甲與二甲乙丙之比例若六乙庚與四乙丁也即一甲癸丙五癸乙甲并與二甲乙丙之比例若三丙辛六乙庚并與四乙丁也既一甲癸丙五癸乙甲并與二甲乙丙等則三丙辛六乙庚并與四乙丁亦等又論曰一甲丙上直角方形與二乙丙上直角方形之比例若三丙辛形與四乙丁形此兩率之比例皆甲丙與乙丙再加之比例見本篇十九二十又五甲乙上直角方形與二乙丙上直五卷草四角方形之比例若六乙庚形與四乙丁形即一甲丙上五甲乙上兩直角方形并與二乙丙上直角方形之比例若三丙辛六乙庚兩形并與四乙丁形既甲丙甲乙上兩直角方形并與乙丙上直角方形等一卷四十則丙辛乙庚兩形并與乙丁形等增題角形之一邊上一形與餘兩邊上兩形相似而體勢等者其一形與兩形并等則餘兩邊內角必直角解曰甲乙丙角形于乙丙上任作一直線形與甲乙甲丙上兩形相似而體勢等其一形與兩形并等題言乙甲丙必直角論曰試作甲丁為甲丙之垂線與甲乙等次作丁丙線其丙甲丁既直角即于丁丙上作一形與乙丙上形相似其丁丙上形與丁甲甲丙上相似而體勢等之兩形并等矣本題又甲丁與甲乙等其上兩形亦等即丁丙上形與甲乙甲丙上兩形并亦等而乙丙上形元與甲乙甲丙上兩形并等則丁丙乙丙上兩形亦等而丁丙與乙丙兩線亦等本篇草二補論夫甲丙丁角形之甲丁與甲乙丙角形之甲乙等甲丙同邊其底乙丙丁丙又等即丁甲丙與乙甲丙兩角必等丁甲丙既直角則乙甲丙亦直角第三十二題兩三角形此形之兩邊與彼形之兩邊相似而平置兩形成一外角若各相似之各兩邊各平行則其餘各一邊相聨為一直線解曰甲乙丙丁丙戊兩角形其甲乙甲丙邊與丁丙丁戊邊相似者謂甲乙與甲丙之比例若丁丙與丁戊也試平置兩形令相切成一甲丙丁外角而甲乙與丁丙甲丙與丁戌各相似之兩邊各平行題言乙丙丙戊為一直線論曰甲乙與丁丙既平行即甲角與內相對之甲丙一卷草九丁等依顯丁角亦與內相對之甲丙丁等則甲本篇六丁兩角等而甲乙丙與丁丙戊兩角形之甲丁兩角旁各兩邊比例又等即兩形為等角形而乙角與丁丙戊角必等次于乙角加甲角于丁丙戊角加一卷卅二等甲之甲丙丁角即乙甲兩角并與等甲丙丁丁丙戊兩角并之甲丙戊角等次每加一甲丙乙角即甲乙丙形之內三角并與甲丙乙甲丙戊兩角并等夫甲乙丙形之內三角等兩直角則甲丙乙甲丙一卷十四戊并亦等兩直角而為一直線第三十三題三支等圜之乘圜分角或在心或在界其各相當兩乘圜角之比例皆若所乘兩圜分之比例而兩分圜形之比例亦若所乘兩圜分之比例解曰甲乙丙戊己庚兩圜等其心為丁為辛兩圜各任割一圜分為乙丙為己庚其乘圜角之在心者為乙丁丙己辛庚在界者為乙甲丙己戊庚題先言乙丙與己庚兩圜分之比例若乙丁丙與己辛庚兩角次言乙甲丙與己戊庚兩角之比例若乙丙與己庚兩圜分後言乙丁丁丙兩腰偕乙丙圜分內乙丁丙分圜形與己辛辛庚兩腰偕己庚圜分內己辛庚分圜形之比例亦若乙丙與己庚兩圜分先論曰試作乙丙己庚兩線次作丙壬合圜線與乙四卷一丙等作庚癸癸子兩合圜線各與己庚等其丙三卷十八壬既與乙丙等即乙丙與丙壬兩圜分亦等而三卷草七乙丁丙與丙丁壬兩角亦等依顯己庚庚癸癸子三圜分己辛庚庚辛癸癸辛子三角俱等則乙丙壬圜分倍乙丙圜分之數如在心乙丁壬角或乙丁壬內地倍乙丁丙角之數而己庚癸子圜分倍己庚圜分之數如在心己辛子角或己辛子內地倍己辛庚角之數何者乙丁壬己辛子兩角或兩地內之分數與乙丙壬己庚癸子兩圜分內之分數各等故也然則乙丁壬角與地若等于己辛子角與地即乙丙壬圜分必等于己庚癸子圜分矣若大亦大若小亦小矣是一乙丙所倍之乙丙壬三乙丁丙所倍之乙丁壬偕二己庚所倍之己庚癸子四己辛庚所倍之己辛子等大小皆同類也則一乙丙與二己庚之比例若三乙丁丙與四己辛庚也五卷界說六次論曰乙丁丙角倍大于乙甲丙角而己辛庚角亦三卷二十倍大于己戊庚即乙丁丙與己辛庚兩角之比五卷草五例若乙甲丙與己戊庚兩角矣則乙甲丙與己五卷十一戊庚在界乘圜之兩角亦若乙丙與己庚兩圜分也若作甲壬戊癸直線亦可用先論推顯用地當角說見三卷草增題後論曰試于乙丙圜分內作乙丑丙角次于丙壬圜三卷草七分內作丙寅壬角此兩角所乘之乙甲壬丙與丙乙甲壬兩圜分既等即兩角亦等而乙丑丙與丙寅壬兩圜小分亦相似亦相等乙丙與丙壬兩合圜線等故見三卷草四一卷四次每加一相等之乙丁丙丙丁壬角形即乙丁丙丙丁壬兩分圜形等則乙丁壬分圜形倍乙丁丙分圜形之數如乙丙壬圜分倍乙丙圜分之數依顯己辛子分圜形倍己辛庚分圜形之數亦如己庚癸子圜分倍己庚圜分之數然則乙丙壬圜分若等于己庚癸子圜分者即乙丁壬分圜形亦等于己辛子分圜形矣若大亦大若小亦小矣五卷界說六是乙丙壬圜分之倍一乙丙圜分乙丁壬分圜形之倍三乙丁丙分圜形偕己庚癸子圜分之倍二己庚圜分己辛子分圜形之倍四己辛庚分圜形等大小皆同類也則一乙丙圜分與二己庚圜分之比例若三乙丁丙分圜形與四己辛庚分圜形也五卷界說六一系在圜心兩角之比例皆若兩分圜形二系在圜心角與四直角之比例若圜心角所乘圜分與全圜界四直角與在圜心角之比例若全圜界與圜心角所乘之圜分丁先生言歐几里得六卷中多研察有比例之線竟不及有比例之面故因其義類增益數題用補闕如左云竇復增一題竊辨于首仍以題㫖從先生舊題隨類附演以廣其用俱稱今者以别于先生舊增也今增題圜與圜為其徑與徑再加之比例解曰甲乙丙丁戊己兩圜其徑甲丙丁己題言甲乙丙與丁戊己為甲丙與丁己再加之比例論曰如云不然當言甲乙丙圜與小于丁戊己之庚辛壬圜或大于丁戊己之癸子丑圜為甲丙與丁己再加之比例也五卷界說二十增若言庚辛壬是者試置庚辛壬圜于丁戊己圜內為同心次于外圜內作丁亥戊未己申酉戌多邊切形其多邊為偶數又等而全不至內圜也四卷十六補題次于甲乙丙圜內作甲午乙寅丙卯辰己多邊切形與丁戊己圜內切形相似四卷十六補題可推其兩圜內兩徑上有丁亥戊未己與甲午乙寅丙相似之兩多邊形則為兩相似邊再加之本篇二十比例也而甲丙與丁己兩線為兩形之相似邊據如彼論即甲午乙寅丙與丁亥戊未己兩形甲乙丙與庚辛壬兩圜同為甲丙與丁己兩線再加之比例也甲乙丙半圜大于甲午乙寅丙形將庚辛壬半圜亦大于丁亥戊未己形乎則分大于全乎若言癸子丑是者亦如前論甲午乙寅丙與丁亥戊未己兩形甲乙丙與癸子丑兩圜同為甲丙與丁己兩線再加之比例也反之即癸子丑與甲乙丙兩圜之比例為丁己與甲丙兩徑再加之比例也設他圜乾兊離令癸子丑與甲乙丙之比例若丁戊己與乾兊離五卷界說增則丁戊己與乾兊離兩圜亦宜為丁己與甲丙兩徑再加之比例也癸子丑既大于丁戊己即甲乙丙亦大于乾兊離而丁戊己與小于甲乙丙之乾兊離兩圜能為丁己與甲丙兩徑再加之比例乎前己駁有兩圜其第一與他圜之小于第二者不得為元圜兩徑再加之比例夫甲乙丙不得與圜之大于丁戊己者小于丁戊己者為甲丙與丁己再加之比例則止有元兩圜為其元兩徑再加之比例一系全圜與全圜半圜與半圜相當分與相當分任相與為比例皆等蓋諸比例皆兩徑再加之比例故二系三邊直角形對直角邊為徑所作圜與餘兩邊為徑所作兩圜并等半圜與兩半圜并等圜分與相似兩圜分并等本篇卅一可推三系三線為連比例以為徑所作三圜亦為連比例推此可求各圜之相與為比例者又可以圜求各圜之相與為比例者本篇十九二十之系可推一增題直線形求減所命分其所減所存各作形與所設形相似而體勢等法曰如甲直線形求減三分之一其所減所存各作形與所設乙形相似而體勢等先作丙丁形與甲等與乙相似而體勢等本篇草五次任于其一邊如丙戊上作丙己戊半圜次分丙戊為三平分而取其一庚戊次從庚作己庚為丙戊之垂線本篇九次作己丙己戊兩線末于己丙己戊上作己辛己壬兩形各與丙丁相似而體勢等本篇十八即所求論曰丙己戊角形既負半圜為直角三卷卅一即丙丁直線形與己辛己壬相似之兩形并等本篇卅而于等甲之丙丁形減己壬存己辛兩形各與丙丁相似而體勢等則與乙相似而體勢等今欲顯己壬為丙丁三分之一者試觀丙庚己丙己戊兩角形既相似本篇八即丙庚與庚己之比例若丙己與己戊也本篇四夫丙庚庚己庚戊三線為連比例即丙庚與庚戊為丙庚與庚己再加之比例本篇八之系而己辛與己壬兩形亦為丙己與己戊兩相似邊再加之比例本篇十九二十即丙庚與庚戊兩線之比例若己辛與己戊兩形也兩比例為兩同理比例之再加故合之則丙戊與庚戊之比例若等己辛己壬兩形并之丙丁與己壬矣丙戊三倍于庚戊則丙丁亦三倍于己壬而己壬為等甲之丙丁三分之一若直線形求減之不論所減所存何形其法更易一卷四一如甲形求減三分之一先作乙丙平行線形與甲等次分乙丁為三平分而取其一戊丁末從戊作己戊線與丙丁平行即戊丙形為等甲之乙丙形三分之一本篇一今附若于大圜求減所設小圜則以圜徑當形邊餘法同前如上圖又今附依此法可方一初月形方初月形者謂作直角方形與初月形等如甲乙丙丁圜其界上有附圜四分之一之乙壬丙戊初月形而求作一直角方形與初月形等先從乙丙作甲乙丙丁內切圜直角方形三卷六次用方形法四平分之即其一為所求方形與初月形等何者甲乙丙半圜與甲乙乙丙上兩半圜并等本增題之今附甲乙乙丙兩線自相等即其上兩半圜亦自相等而庚乙壬丙分圜形為大半圜之半即與乙己丙戊小半圜等此兩率者各減一同用之乙己丙壬圜小分其所存乙壬丙戊初月形與庚乙丙角形等而庚己丙辛直角方形與庚乙丙角形亦等則與乙壬丙戊初月形亦等依顯甲乙丙丁直角方形與大圜界上四初月形并等二增題兩直線形求别作一直線形為連比例法曰甲與乙丙丁兩直線形求别作一直線形為連比例先作一戊己庚直線形與甲等與乙丙丁相似而體勢等本篇草五次以兩形相似之各一邊如戊己乙丙為前中率線而求其連比例之末率線為辛壬本篇十一末于本篇十八辛壬上作辛壬癸形與兩形相似而體勢等即所求論曰戊己乙丙辛壬三線既為連比例即其上三形相似而體勢等者亦為連比例本篇草二今附有兩圜求别作一圜為連比例則以圜徑當形邊依上法作之三增題三直線形求别作一直線形為斷比例法曰一甲二乙丙丁戊三己庚辛三直線形求别作一直線形為斷比例先作壬癸子丑形與甲等本篇草五與乙丁相似而體勢等次以三形之任各一邊如壬癸乙丙己庚為三率求其斷比例之末率本篇十二線為寅卯末于寅卯上作寅卯本篇十八辰形與己庚辛相似而體勢等即所求論曰四線既為斷比例即其線上形本篇草二相似而體勢等者亦為斷比例今附有三圜求别作一圜為斷比例亦以圜徑當形邊依上法作之四增題兩直線形求别作一形為連比例之中率法曰甲與乙丙丁兩直線形求别作一形為連比例之中率先作戊己庚直線形與甲等與乙丙丁本篇草五相似而體勢等次求戊己乙丙本篇十三兩直線連比例之中率為辛壬本篇十八末于辛壬上作辛壬癸形與戊己乙丙上形相似而體勢等即所求論曰戊己辛壬乙丙三線既為連比例即各線上戊己庚辛壬癸乙丙丁三形亦為連比例本篇草二又法曰甲乙兩直線形求别作一形為連比例之中率先作丁丙己戊平行線形任直斜角與甲等一卷四五次作庚戊壬辛平行線形與乙等與丁己形相似而體勢等本篇草五次置兩平行線形以戊角相聨而丁戊戊壬為一直線即庚戊戊己亦一直線一卷十五增末從兩形引長各邊成丙子辛癸平行線形即兩餘方形俱為丁己庚壬兩形之中率論曰丁己庚壬兩形既相似而體勢等即丁戊與己戊之比例若戊壬與戊庚也更之即丁戊與戊壬若己戊與戊庚也夫丁戊與戊壬兩線之比例亦若丁己與戊癸兩形己戊與戊庚兩線之比例又若戊癸與庚壬兩形則戊癸為丁己庚壬之中率矣又論曰丁己庚壬兩形既相似而體勢等即同依本篇草六丙辛對角線而子戊戊癸兩餘方形自相等則丁己與戊癸兩形之比例若子戊與庚壬兩形何者此兩比例皆若丁戊與戊壬也則子戊戊癸皆丁己庚壬之中率也今附若兩圜求作一圜為連比例之中率亦以圜徑當形邊依上前法作之五增一直線形求分作兩直線形俱與所設形相似而體勢等其比例若所設兩幾何之比例法曰甲直線形求分作兩直線形俱與所設丁形相似而體勢等其比例若所設兩幾何如乙線與本篇草五丙線之比例先作戊己庚辛直線形與甲等與丁相似而體勢等次分法任用其一邊如戊辛兩分之于壬令戊壬與壬辛之比例若乙與丙也先以乙丙兩線聯為一直線次截戊壬與壬辛若乙與丙見本篇十次于戊辛上作戊癸辛半圜次從壬作癸壬為戊辛之垂線次作戊癸癸辛線相聨末于戊癸癸辛上作戊丑子癸本篇十八癸卯寅辛兩形與戊庚形俱相似而體勢等即此兩形并與甲等又各與丁相似而體勢等其比例又若乙與丙論曰戊癸辛既負半圜為直角三卷卅一即戊子癸寅本篇卅一兩形并與等戊庚之甲等又戊壬與壬癸之比例若戊癸與癸辛俱在直角兩旁故見本篇四戊壬壬癸壬辛三線為連比例即戊壬與壬辛為戊壬與壬癸再加之比例本篇八之系而戊子與癸寅兩形亦為戊本篇二十癸與癸辛兩相似邊再加之比例則戊壬與壬辛之比例亦若戊子與癸寅也兩比例為兩同理比例之再加故夫戊壬與壬辛元若乙與丙也則戊子與癸寅亦若乙與丙也今附若一圜求分作兩圜其比例若所設兩幾何亦以圜徑當形邊依上法作之六增題一直線形求分作兩直線形俱與所設形相似而體勢等其兩分形兩相似邊之比例若所設兩幾何之比例法曰甲直線形求分作兩直線形本篇十一俱與所設丁形相似而體勢等其兩分形兩相似邊之比例若所設兩幾何如乙線與丙線之比例先以乙與丙兩線求其連比例之末率為戊次作己庚辛直線形與甲等與丁相似而體勢等次任用其一邊如己辛兩分之于壬令己壬與壬辛之比例若乙與戊也本篇十次于己辛線上作己癸辛半圜次從壬作壬癸為己辛之垂線次作己癸癸辛兩線相聨未于己癸癸辛上作己子癸癸丑辛兩形俱與丁相似而體勢等即此兩形并與等甲之己庚辛等而己癸癸辛兩相似邊之比例若乙與丙論曰己癸辛既負半圜為直角三卷卅即己子癸癸本篇卅一丑辛兩形并與等己庚辛之甲等又己壬與壬癸之比例若己癸與癸辛俱在直角兩旁故見本篇四己壬壬癸壬辛三線為連比例即己壬與壬辛為己壬與壬癸再加之比例本篇八之系夫己壬與壬癸之比例既若己子癸癸丑辛兩形相似邊之己癸與癸辛而乙與戊元若己壬與壬辛乙與戊元為乙與丙再加之比例則己癸癸辛之比例若乙與丙今附若一圜求分作兩圜其兩圜徑之比例若所所設兩幾何倣此七增題兩直線形求并作一直線形與所設形相似而體勢等法曰甲乙兩直線形求并作一形與本篇草五所設丙形相似而體勢等先作戊丁己形與甲等作己庚辛形與乙等又各與丙相似而體勢等次置兩本篇卅一形令相似之戊己己辛兩邊聨為直角次作戊辛線相聨末依戊辛線作戊辛壬與丙相似而體勢等即與上兩形并等如所求一卷四五又法曰作一平行方形與甲乙兩形并等次作戊辛壬角形與平行方形等又與丙相似而體勢等即所求今附若兩圜求并作一圜亦以圜徑當形邊依上法作之八增題圜內兩合線交而相分其所分之線彼此互相視解曰甲乙丙丁圜內有甲丙乙丁兩合線交而相分于戊題言所分之甲戊戊丙乙戊戊丁為互相視之線者謂甲戊與戊丁若乙戊與戊丙也又甲戊與乙戊若戊丁與戊丙也論曰甲戊偕戊丙與乙戊偕戊丁兩矩內直角形等三卷卅五即等角旁之兩邊為互相視之邊本篇十四九增題圜外任取一㸃從㸃出兩直線皆割圜至規內其兩全線與兩規外線彼此互相視若從㸃作一切圜線則切圜線為各割圜全線與其規外線之各中率解曰甲乙丙丁圜外任取戊㸃從戊作戊丁戊丙兩割圜至規內之線遇圜界于甲于乙題言戊丙戊乙戊丁戊甲互相視者謂戊丙與戊丁若戊甲與戊乙也又戊丙與戊甲若戊丁與戊乙也論曰試從戊作戊己線切圜于己即戊丙偕戊乙三卷卅六矩內直角形與戊己上直角方形等又戊丁偕戊甲矩內直角形與戊己上直角方形亦等即戊丙偕戊乙與戊丁偕戊甲兩矩內直角形自相等而等角旁之兩邊為互相視之邊本篇十四又戊丙偕戊乙戊丁偕戊甲兩矩內直角形各與戊己上直角方三卷卅六形等即戊丙戊己戊乙三線為連比例戊丁戊己戊甲三線亦為連比例而戊己為各全線與其規外線之各中率本篇十七十增題兩直線相遇作角從兩線之各一界互下垂線而每方為兩線一自界至相遇處一自界至垂線則各相對之兩線皆彼此互相視解曰甲乙丙乙兩線相遇于乙作甲乙丙角從甲作丙乙之垂線從丙作甲乙之垂線若甲乙丙為鈍角即如前圖兩垂線當至甲乙丙乙之各引出線上為甲丁為丙戊其甲戊丙丁交而相分于乙也若甲乙丙為鋭角即如後圖甲丁丙戊兩垂線當在甲乙丙乙之內交而相分于己也題言兩圖之甲乙乙戊丙乙乙丁皆彼此互相視者謂甲乙與乙丙若丁乙與乙戊也又甲乙與丁乙若乙丙與乙戊也論曰甲乙丁角形之甲乙丁甲丁乙兩角與丙乙戊角形之丙乙戊丙戊乙兩角各等兩為直角兩于前圖為交角于後圖為同角故即兩形為等角形而甲乙與丁乙若乙丙與乙戊也本篇四更之則甲乙與乙丙若丁乙與乙戊也又論曰依前圖可推後圖之甲丁丙戊交而相分于己其甲己己丁丙己己戊亦彼此互相視蓋甲己戊丙己丁既為等角形即甲己與己戊若丙己與己丁也本篇四更之則甲己與丙己若己戊與己丁也十一增題平行線形內兩直線與兩邊平行相交而分元形為四平行線形此四形任相與為比例皆等解曰甲乙丙丁平行線形內作戊己庚辛兩線與甲丁丁丙各平行而交于壬題言所分之戊庚庚己乙壬壬丙四形任相與為比例皆等論曰戊壬與壬己兩線之比例既若戊庚與庚己兩形本篇一又若乙壬與壬丙兩形即戊庚與庚己五卷十二亦若乙壬與壬丙也依顯乙壬與戊庚亦若壬丙與庚己也十二增題凡四邊形之對角兩線交而相分其所分四三角形任相與為比例皆等解曰甲乙丙丁四邊形之甲丙乙丁兩對角線交相分于戊題言所分甲戊丁乙戊丙甲戊乙丁戊丙四三角形任相與為比例皆等論曰甲戊與戊丙兩線之比例若甲戊丁與丁戊丙兩角形又若甲戊乙與乙戊丙兩角形本篇一即甲戊丁與丁戊丙兩角形亦若甲戊乙與乙戊丙也依顯甲戊乙與甲戊丁亦若乙戊丙與丁戊丙也十三增題三角形任于一邊任取一㸃從㸃求作一線分本形為兩形其兩形之比例若所設兩幾何之比例先法曰甲乙丙角形任于一邊如乙丙上任取一㸃為丁求從丁作一線分本形為兩形其兩形之比例若所設兩幾何如戊線與己線之比例先以乙丙線兩分之于庚令乙庚與庚丙之比例若戊與己本篇十其庚與丁若同㸃即作丁甲線則乙丁與丁丙兩線之比例若乙丁甲與丁丙甲兩角形也本篇一是丁甲線所分兩形之比例若戊與己次法曰若庚在丁丙之內亦作丁甲線次從庚作庚辛線與丁甲平行次作丁辛線相聨即丁辛線分本形為兩形其比例若戊與己者謂乙丁辛甲無法四邊形與丁丙辛角之比例若乙庚與庚丙也亦若戊與己也論曰試作庚甲線即辛庚甲庚辛丁兩角形等一卷卅七次每加一丙庚辛角形即丙庚甲丙辛丁兩角形亦等則甲乙丙全形與丙庚甲角形之比例若甲乙丙與丙辛丁也五卷七分之則乙庚甲角形與丙庚甲角形之比例若乙丁辛甲無法四邊形與五卷十七丙辛丁角形也乙庚甲與丙庚甲兩角形之比例既若乙庚與庚丙本篇一則乙丁辛甲無法四邊形與丙辛丁角形之比例亦若乙庚與庚丙也則亦若戊與己也後法曰若庚在乙丁之內亦作丁甲線次從庚作庚辛線與丁甲平行次作丁辛線相聨即丁辛線分本形為兩形其比例若戊與己者謂乙丁辛角形與丁丙甲辛無法四邊之比例若乙庚與庚丙也亦若戊與己也論曰試作庚甲線如前推顯辛庚甲庚辛丁兩角一卷卅七形等次每加一乙庚辛角形即乙庚甲與乙辛丁兩角形亦等則甲乙丙全形與乙庚甲角形之比例若甲乙丙與乙辛丁也五卷七分之則丙庚甲角形與乙庚甲角形之比例若丁丙甲辛無法四邊形與乙辛丁角形也五卷十七反之則乙庚甲角形與丙庚甲角形之比例若乙辛丁角形與丁丙甲辛無法四邊形也乙庚甲與丙庚甲之比例既若乙庚與庚丙本篇則乙丁辛角形與丁丙甲辛無法四邊形之比例亦若乙庚與庚丙也則亦若戊與己也系凡角形任于一邊任取一㸃從㸃求減命分之一如前法作多倍大之比例即得其所作倍數每少于命分之一如求減四分之一即作三倍大之比例減五分之一即作四倍大之比例也則全形與所減分之比例其倍數若命分之數也十四增題一直線形求别作一直線形相似而體勢等其小大之比例如所設兩幾何之比例法曰甲直線形求别作直線形相似而體勢等其本篇十二甲形與所作形小大之比例若所設兩幾何如乙與丙兩線之比例先以乙丙及任用甲之一邊如丁戊三線求其斷比例之末率為己次求本篇十三丁戊及己之中率線為庚辛末從庚辛上作壬直線形與甲相似而體勢等即甲與壬之比例若乙與丙論曰丁戊庚辛己三線為連比例即一丁戊與三己之比例若相似而體勢等之甲與壬本篇十九二十之系若先設大甲求作小壬若乙與丙其法同如上圖用此法可依此直線形加作兩倍大三倍四五倍大以至無窮之他形亦可依此直線形減作二分之一三分四五分之一以至無窮之他形其此形與他形皆相似而體勢等有用法作直角方形平行線形及各形之相加相減者如甲乙丙丁直角方形求别作五倍大之他形先以甲乙線引長之以甲乙為度截取五分至戊令乙至戊五倍大于甲乙也次以甲戊兩平分于己次以己為心甲戊為界作甲庚戊半圜其乙丙線直行遇圜界于庚即乙庚為所求方形之一邊也末作乙庚辛己直角方形即五倍大于甲丙向者乙庚既為戊乙乙甲之中率線本篇十三之系即一戊乙與三乙甲之比例若二庚乙上直角方形與三甲乙上直角方形之比例也本篇二十之系戊乙既五倍于乙甲則乙辛亦五倍于甲丙若戊乙為乙甲之六倍則乙辛亦甲丙之六倍若戊乙為乙甲三分之一則乙辛亦甲丙三分之一相加相減倣此以至無窮如甲乙丙丁平行直角形求别作二倍大之他形相似而體勢等先以甲乙線引長之以甲乙為度截取二分至戊令乙至戊二倍大于甲乙也次以甲戊兩平分于己次以己為心甲戊為界作甲庚戊半圜其丙乙線直行遇圜界于庚即乙庚為所求直角形之一邊也次于甲戊線上截取甲辛與乙庚等從辛作辛壬線與乙丙平行次作甲丙對角線引長之與辛壬線遇于壬末作丁癸癸壬成甲辛壬癸平行直角形即二倍大于甲丙又相似而體勢等何者戊乙乙庚乙甲三線既為連比例本篇十三之系如前論一戊乙與三乙甲之比例若二等乙庚之甲辛上平行直角形甲壬與三甲乙上平行直角形甲丙也本篇二十之系戊乙既二倍于甲乙則甲壬亦二倍于甲丙用此法凡甲乙上不論何等形與乙庚上形相似而體勢等者其乙庚上形皆二倍大于甲乙上形相加相減俱倣此以至無窮今附若用前法作圜則乙庚徑上圜亦二倍大于甲乙徑上圜相加相減倣此以至無窮以上用法與本增題同但此用法隨作隨得中率線不費尋求致為簡易耳十五增題諸三角形求作內切直角方形法曰如甲乙丙鋭角形求作內切直角方形先從本篇甲角作甲丁為乙丙之垂線次以甲丁線兩分于戊令甲戊與戊丁之比例若甲丁與乙丙十一增題末從戊作己庚線與乙丙平行從己從庚作己辛庚壬兩線皆與戊丁平行即得己壬形如所求若直角鈍角形則從直角鈍角作垂線餘法同如第二第三圖是論曰己戊庚線既與乙丙平行即乙丁與丁丙若己戊與戊庚也本篇四之增題合之即乙丙與丁丙若己庚與戊庚也又丁丙與甲丁若戊庚與甲戊甲丁丙與甲戊庚為等角形故見本篇四之系平之即乙丙與甲丁若己一卷卅四庚與甲戊也又甲丁與乙丙若甲戊與戊丁平之即乙丙與乙丙若己庚與戊丁也乙丙與乙丙同線必等即己庚與戊丁必等而己庚與辛壬又等戊丁與己辛庚壬亦等則己庚庚壬壬辛辛己四邊俱等又戊丁辛既直角即己辛丁亦直角一卷草九其餘亦皆直角而己壬為直角方形又法曰若直角三邊形求依乙角作本篇十內切直角方形則以垂線甲乙兩分于丁令甲丁與丁乙之比例若甲乙與乙丙次從丁作丁戊直線與乙丙平行從戊作戊己直線與甲乙平行即得丁己形如所求論曰乙丙與甲乙既若丁戊與甲丁甲乙丙甲丁戊為等角形故見本篇四之系而甲乙與乙丙又若甲丁與丁乙平之即乙丙與乙丙若丁戊與丁乙也乙丙與乙丙同線必等即丁戊與丁乙必等而丁己為直角方形今附如上三邊直角形依乙角作內切直角方形其方形邊必為甲丁己丙兩分餘邊之中率何者甲丁與丁戊若戊己與己丙故本篇四之系
